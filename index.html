// ============ LEITURA DOS ARQUIVOS (com deduplicação) ============
function FIN_lerArquivo(input, tipo){
  const file = input.files[0]; if(!file) return;
  const st = document.getElementById('st-'+tipo);
  st.textContent = 'Lendo...';
  // relatório de serviços é CSV (latin-1) — lê como texto
  if (tipo === 'servicos') {
    const reader = new FileReader();
    reader.onload = async e => {
      try {
        try { await finCarregarDoSheets(['coletas'], true); } catch(e){}
        FIN_processarServicos(e.target.result, st);
        finSalvar(); finAtualizarTudo();
        document.getElementById('ub-servicos').classList.add('ok');
        await finSincronizarAposUpload('coletas', st);
      } catch(err) { st.innerHTML='Erro ao ler: '+err.message; st.style.color='var(--vermelho)'; }
    };
    reader.readAsText(file, 'ISO-8859-1'); // latin-1
    return;
  }
  const reader = new FileReader();
  reader.onload = async e => {
    try{
      const arr = new Uint8Array(e.target.result);
      let wb;
      try {
        wb = XLSX.read(arr, {type:'array', cellStyles:false, cellHTML:false, cellFormula:false, sheetStubs:false, bookVBA:false});
      } catch(err1) {
        wb = await FIN_lerViaRecompactacaoNativa(arr);
      }
      // garante que a memória tem TODOS os meses já salvos antes de processar o novo arquivo
      // (senão, ao reescrever a aba, perderíamos meses que estavam só no Sheets)
      const tipoBase = (tipo==='comissao') ? 'fechamentos' : tipo;
      try { await finCarregarDoSheets([tipoBase], true); } catch(e){}
      if(tipo==='pagar') FIN_processarPagar(wb, st);
      else if(tipo==='receber') FIN_processarReceber(wb, st, 'receber');
      else if(tipo==='recebeReceb') FIN_processarReceber(wb, st, 'recebeReceb');
      else if(tipo==='comissao') FIN_processarComissao(wb, st, file.name);
      else if(tipo==='faturamento') FIN_processarFaturamentoVar(wb, st);
      finSalvar(); finAtualizarTudo();
      document.getElementById('ub-'+tipo).classList.add('ok');
      // envia pro Sheets (compartilhado). 'comissao' guarda em FINdados.fechamentos.
      const tipoDados = tipoBase;
      await finSincronizarAposUpload(tipoDados, st);
    }catch(err){
      st.innerHTML='Não consegui ler o arquivo. <b>Dica:</b> abra no Excel/Google Sheets e use "Salvar como" → .xlsx, depois suba de novo.<br><span style="font-size:11px;">Detalhe: '+err.message+'</span>';
      st.style.color='var(--vermelho)';
    }
  };
  reader.readAsArrayBuffer(file);
}

// Recompacta um .xlsx "meio quebrado" sem depender de biblioteca externa.
async function FIN_lerViaRecompactacaoNativa(arr){
  const arquivos = await FIN_descompactarZipNativo(arr);
  return XLSX.read(FIN_montarZipSimples(arquivos), {type:'array', cellStyles:false, cellFormula:false, bookVBA:false});
}

// lê as entradas de um ZIP usando DecompressionStream (nativo do navegador)
async function FIN_descompactarZipNativo(bytes){
  const dv = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
  const td = new TextDecoder();
  const arquivos = {};
  let i = 0;
  while (i < bytes.length - 4) {
    const sig = dv.getUint32(i, true);
    if (sig !== 0x04034b50) break;
    const method = dv.getUint16(i+8, true);
    const compSize = dv.getUint32(i+18, true);
    const nameLen = dv.getUint16(i+26, true);
    const extraLen = dv.getUint16(i+28, true);
    const nameStart = i + 30;
    const nome = td.decode(bytes.subarray(nameStart, nameStart+nameLen));
    const dataStart = nameStart + nameLen + extraLen;
    const comp = bytes.subarray(dataStart, dataStart + compSize);
    if (!nome.endsWith('/')) {
      let conteudo;
      if (method === 0) conteudo = comp.slice();
      else if (method === 8) conteudo = await FIN_inflaRaw(comp);
      else conteudo = comp.slice();
      arquivos[nome] = conteudo;
    }
    i = dataStart + compSize;
  }
  if (!Object.keys(arquivos).length) throw new Error('não foi possível abrir o arquivo (formato inesperado).');
  return arquivos;
}

async function FIN_inflaRaw(bytes){
  const ds = new DecompressionStream('deflate-raw');
  const stream = new Response(new Blob([bytes])).body.pipeThrough(ds);
  const buf = await new Response(stream).arrayBuffer();
  return new Uint8Array(buf);
}

// remonta um ZIP simples (tudo STORE) que o SheetJS lê sem problema
function FIN_montarZipSimples(arquivos){
  const enc = new TextEncoder();
  const partes = []; const central = []; let offset = 0; let nCentral = 0;
  function u16(n){ return [n&255,(n>>8)&255]; }
  function u32(n){ return [n&255,(n>>8)&255,(n>>16)&255,(n>>24)&255]; }
  function crc32(buf){ let c=~0; for(let i=0;i<buf.length;i++){ c^=buf[i]; for(let k=0;k<8;k++) c=(c>>>1)^(0xEDB88320&-(c&1)); } return ~c>>>0; }
  for (const nome in arquivos){
    const nomeB = enc.encode(nome);
    const data = arquivos[nome];
    const crc = crc32(data);
    const lh = [...u32(0x04034b50),...u16(20),...u16(0),...u16(0),...u16(0),...u16(0),...u32(crc),...u32(data.length),...u32(data.length),...u16(nomeB.length),...u16(0)];
    partes.push(new Uint8Array(lh), nomeB, data);
    const ch = [...u32(0x02014b50),...u16(20),...u16(20),...u16(0),...u16(0),...u16(0),...u16(0),...u32(crc),...u32(data.length),...u32(data.length),...u16(nomeB.length),...u16(0),...u16(0),...u16(0),...u16(0),...u32(0),...u32(offset)];
    central.push(new Uint8Array(ch), nomeB);
    offset += lh.length + nomeB.length + data.length; nCentral++;
  }
  let centralSize=0; central.forEach(p=>centralSize+=p.length);
  const eocd = new Uint8Array([...u32(0x06054b50),...u16(0),...u16(0),...u16(nCentral),...u16(nCentral),...u32(centralSize),...u32(offset),...u16(0)]);
  const todas=[...partes,...central,eocd];
  let tam=0; todas.forEach(p=>tam+=p.length);
  const out=new Uint8Array(tam); let pos=0;
  todas.forEach(p=>{ out.set(p,pos); pos+=p.length; });
  return out;
}

function finAchaCol(cols, ...termos){
  return cols.find(c => { const u=finLc(c).toUpperCase(); return termos.every(t=>u.includes(t.toUpperCase())); });
}

function FIN_processarPagar(wb, st){
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
  if(!rows.length){ st.textContent='Planilha vazia.'; return; }
  const cols = Object.keys(rows[0]);
  const cTit=finAchaCol(cols,'Título')||finAchaCol(cols,'Titulo');
  const cPag=finAchaCol(cols,'Pagamento');
  // cada arquivo é o retrato completo de UM mês. Substitui só os meses presentes no arquivo
  // (mantém os outros meses já carregados). Assim dá pra acumular maio, junho... sem duplicar.
  const mesesNoArquivo = new Set();
  rows.forEach(r=>{ const ym=finYmDeData(finLc(r[cPag])); if(ym) mesesNoArquivo.add(ym); });
  if (mesesNoArquivo.size) FINdados.pagar = FINdados.pagar.filter(x=>!mesesNoArquivo.has(x._mesPagamento||finYmDeData(x.pagamento)));
  const jaTem = new Set(FINdados.pagar.map(x=>String(x.titulo)));
  let novos=0;
  rows.forEach(r=>{
    const tit = String(r[cTit]||'').trim();
    if(!tit || jaTem.has(tit)) return;
    FINdados.pagar.push({
      titulo:tit,
      fornecedor:finLc(r[finAchaCol(cols,'Fornecedor')]),
      centro:finLc(r[finAchaCol(cols,'Custo')])||'(sem centro)',
      despesa:finLc(r[finAchaCol(cols,'Despesa')]),
      situacao:finLc(r[finAchaCol(cols,'Situação')]||r[finAchaCol(cols,'Situacao')]),
      competencia:finLc(r[finAchaCol(cols,'Competência')]||r[finAchaCol(cols,'Competencia')]),
      emissao:finLc(r[finAchaCol(cols,'Emissão')]||r[finAchaCol(cols,'Emissao')]),
      vencimento:finLc(r[finAchaCol(cols,'Vencimento')]),
      pagamento:finLc(r[finAchaCol(cols,'Pagamento')]),
      valor:parseFloat(r[finAchaCol(cols,'Valor')])||0,
      pago:parseFloat(r[finAchaCol(cols,'Vlr. Pago')]||r[finAchaCol(cols,'Pago')])||0,
      saldo:parseFloat(r[finAchaCol(cols,'Saldo')])||0,
      _mesPagamento: finYmDeData(finLc(r[finAchaCol(cols,'Pagamento')]))||''
    });
    jaTem.add(tit); novos++;
  });
  st.textContent = `${novos} títulos novos adicionados (${FINdados.pagar.length} no total).`; st.style.color='var(--verde-medio)';
}

function FIN_processarReceber(wb, st, destino){
  destino = destino || 'receber';
  let ws=null;
  for(const nome of wb.SheetNames){
    const test=XLSX.utils.sheet_to_json(wb.Sheets[nome],{defval:''});
    if(test.length && Object.keys(test[0]).some(c=>finLc(c).toUpperCase()==='CLIENTE')){ ws=wb.Sheets[nome]; break; }
  }
  if(!ws) ws=wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws,{defval:''});
  if(!rows.length){ st.textContent='Planilha vazia.'; return; }
  const cols=Object.keys(rows[0]);
  const cTit=finAchaCol(cols,'Título')||finAchaCol(cols,'Titulo');
  const cEmi=finAchaCol(cols,'Emissão')||finAchaCol(cols,'Emissao');
  // cada arquivo é o retrato completo de UM mês. Substitui só os meses presentes (por emissão),
  // mantendo os outros meses já carregados.
  const mesesNoArquivo = new Set();
  rows.forEach(r=>{ const ym=finYmDeData(finLc(r[cEmi])); if(ym) mesesNoArquivo.add(ym); });
  if (mesesNoArquivo.size) FINdados[destino] = FINdados[destino].filter(x=>!mesesNoArquivo.has(x._mesEmissao||finYmDeData(x.emissao)));
  const alvo2 = FINdados[destino];
  const jaTem=new Set(alvo2.map(x=>String(x.titulo)));
  let novos=0;
  rows.forEach(r=>{
    const tit=String(r[cTit]||'').trim();
    if(!tit || jaTem.has(tit)) return;
    const cliRaw=finLc(r[finAchaCol(cols,'Cliente')]);
    const cnpjM=cliRaw.match(/(\d{2}\.?\d{3}\.?\d{3}\/?\d{4}-?\d{2})/);
    alvo2.push({
      titulo:tit,
      cnpj:cnpjM?cnpjM[1]:'',
      cliente:cliRaw.replace(/\(?(CNPJ|CPF)[:\s]*[\d.\/-]+\)?/gi,'').trim(),
      situacao:finLc(r[finAchaCol(cols,'Situação')]||r[finAchaCol(cols,'Situacao')]),
      competencia:finLc(r[finAchaCol(cols,'Competência')]||r[finAchaCol(cols,'Competencia')]),
      emissao:finLc(r[finAchaCol(cols,'Emissão')]||r[finAchaCol(cols,'Emissao')]),
      vencimento:finLc(r[finAchaCol(cols,'Vencimento')]),
      valor:parseFloat(r[finAchaCol(cols,'Valor')])||0,
      recebido:parseFloat(r[finAchaCol(cols,'Vlr. Recebido')]||r[finAchaCol(cols,'Recebido')])||0,
      saldo:parseFloat(r[finAchaCol(cols,'Saldo')])||0,
      // impostos e líquido (o relatório já traz cada um)
      iss:finN(r[finAchaCol(cols,'ISS')]),
      inss:finN(r[finAchaCol(cols,'INSS')]),
      pis:finN(r[finAchaCol(cols,'Pis')]||r[finAchaCol(cols,'PIS')]),
      cofins:finN(r[finAchaCol(cols,'Cofins')]||r[finAchaCol(cols,'COFINS')]),
      csll:finN(r[finAchaCol(cols,'Csll')]||r[finAchaCol(cols,'CSLL')]),
      ir:finN(r[finAchaCol(cols,'IR')]),
      desconto:finN(r[finAchaCol(cols,'Desconto')]),
      liquido:finN(r[finAchaCol(cols,'Vlr. Líquido')]||r[finAchaCol(cols,'Vlr. Liquido')]||r[finAchaCol(cols,'Líquido')]),
      _mesEmissao: finYmDeData(finLc(r[finAchaCol(cols,'Emissão')]||r[finAchaCol(cols,'Emissao')]))||''
    });
    jaTem.add(tit); novos++;
  });
  st.textContent=`${novos} títulos carregados (substituiu o anterior).`; st.style.color='var(--verde-medio)';
}

// extrai o mês/ano (YYYY-MM) do nome do arquivo de comissão.
// Aceita "05_2026_Maio_2026.xlsx", "Maio 2026", "2026-05", "05-2026", etc.
function FIN_mesDoNomeArquivo(nome){
  const s = String(nome||'').toLowerCase().replace(/\.xlsx?$/,'');
  const anoM = s.match(/20\d{2}/);
  const ano = anoM ? anoM[0] : String(new Date().getFullYear());
  // tenta nome do mês por extenso
  for (const nm in FIN_MESES) { if (s.includes(nm)) return ano+'-'+FIN_MESES[nm]; }
  // tenta número de mês (01..12) próximo ao início ou junto do ano
  const numM = s.match(/(?:^|[^0-9])(0[1-9]|1[0-2])(?:[^0-9]|$)/);
  if (numM) return ano+'-'+numM[1];
  return ano+'-00'; // não identificado
}

function FIN_processarComissao(wb, st, nomeArquivo){
  const jaTem=new Set(FINdados.fechamentos.map(x=>x.chave));
  let novos=0;
  // extrai mês/ano do NOME DO ARQUIVO (ex: "05_2026_Maio_2026.xlsx" -> 2026-05)
  const mesArquivo = FIN_mesDoNomeArquivo(nomeArquivo || '');
  wb.SheetNames.forEach(nomeAba=>{
    if(nomeAba.toLowerCase()==='rascunho') return;
    const consultor=nomeAba;
    const grade=XLSX.utils.sheet_to_json(wb.Sheets[nomeAba],{header:1,defval:''});
    let hrow=-1;
    for(let i=0;i<grade.length;i++){ if(grade[i].some(v=>finLc(v).toUpperCase()==='CLIENTE')){ hrow=i; break; } }
    if(hrow<0) return;
    const cab=grade[hrow].map(v=>finLc(v).toUpperCase());
    const iCli=cab.findIndex(c=>c==='CLIENTE');
    const iData=cab.findIndex(c=>c.includes('DATA'));
    const iTipo=cab.findIndex(c=>c.includes('TIPO'));
    const iVal=cab.findIndex(c=>c.includes('VALOR'));
    for(let i=hrow+1;i<grade.length;i++){
      const cli=finLc(grade[i][iCli]); const tipo=finLc(grade[i][iTipo]).toUpperCase();
      const su=cli.toUpperCase();
      if(!cli || su.startsWith('TOTAL') || su.startsWith('___') || su.includes('ROBERTO FERNANDES') || su.includes('ANDREA')) continue;
      if(!tipo || tipo.includes('CARTEIRA')) continue;
      const valor=parseFloat(grade[i][iVal])||0;
      const dataRaw=grade[i][iData];
      // aditivos e eventuais recicláveis: aparecem pro diretor, mas NÃO entram no total comercial
      const foraDoTotal = tipo.includes('ADITIVO') || (tipo.includes('RECIC'));
      const chave = (mesArquivo||'')+'|'+consultor+'|'+finNormNome(cli)+'|'+tipo+'|'+valor;
      if(jaTem.has(chave)) continue;
      FINdados.fechamentos.push({ chave, consultor, cliente:cli, tipo, valor, data:finLc(dataRaw), mesArq:nomeAba, mesRef: mesArquivo, foraDoTotal });
      jaTem.add(chave); novos++;
    }
  });
  st.textContent=`${novos} fechamentos novos adicionados (${FINdados.fechamentos.length} no total).`; st.style.color='var(--verde-medio)';
}

// processa o relatório de serviços (CSV). Conta Qtde-Serviço (equipamentos) e Qtde-Taxa (peso ton,
// só p/ caçamba/roll-on/compactadora). Ignora cabeçalhos repetidos e linhas de resumo.
// Deduplica por Num. Interno (identificador único de cada coleta).
function FIN_processarServicos(texto, st){
  // parse CSV simples (separador ;) — o relatório não tem aspas escapando ;
  const linhas = texto.split(/\r?\n/).filter(l=>l.trim());
  if (!linhas.length) { st.textContent='Arquivo vazio.'; return; }
  const parseLinha = l => l.split(';').map(c=>c.trim().replace(/^"|"$/g,''));
  // usa o PRIMEIRO cabeçalho pra achar os índices (é o único com todas as colunas)
  const cab = parseLinha(linhas[0]).map(c=>c.replace(/\uFEFF/g,''));
  const norm = s => String(s).toLowerCase().replace(/ç/g,'c').replace(/ã|á|à/g,'a').replace(/é|ê/g,'e').replace(/í/g,'i').replace(/ó|ô/g,'o').replace(/ú/g,'u');
  const acha = termo => cab.findIndex(c => norm(c).includes(norm(termo)));
  const iCli=acha('cliente'), iCnpj=acha('cnpj'), iData=acha('data'), iClasse=acha('classe'),
        iStatus=acha('status'), iEquip=acha('tipo de equip'), iResiduo=acha('residuo'),
        iEnd=acha('end. de coleta'), iNum=acha('num. interno');
  // Qtde - Serviço e Qtde - Taxa (cuidado: tem "Qtde. de Equip." que não serve).
  // casa por "qtde"+"serv"/"taxa" sem depender do acento de "serviço" (encoding varia).
  let iQServ=-1, iQTaxa=-1;
  cab.forEach((c,i)=>{ const n=norm(c); if(n.includes('qtde')&&n.includes('serv')) iQServ=i; if(n.includes('qtde')&&n.includes('taxa')) iQTaxa=i; });

  const jaTem = new Set(FINdados.coletas.map(x=>x.num));
  const numColsCab = cab.length;
  const reNum = /^\d{2}\.\d{3}\.\d{3}\/\d{4}-\d{2}$/;
  const reData = /^(\d{2})\/(\d{2})\/(\d{2,4})/;
  const EQUIP_PESO = ['cacamba','caçamba','roll on','roll-on','rollon','compactadora'];
  const num2 = v => { let s=String(v||'').replace(/\./g,'').replace(',','.').replace(/[^\d.-]/g,''); const n=parseFloat(s); return isNaN(n)?0:n; };
  let novos=0, ignoradas=0;
  linhas.slice(1).forEach(l=>{
    const row = parseLinha(l);
    // linha válida = tem colunas suficientes, CNPJ e data no formato certo, status concluído/liberado
    if (row.length < numColsCab-2) { ignoradas++; return; }
    const cnpj = (row[iCnpj]||'').trim();
    if (!reNum.test(cnpj)) { ignoradas++; return; }
    const md = String(row[iData]||'').match(reData);
    if (!md) { ignoradas++; return; }
    const status = norm(row[iStatus]||'');
    if (!status.includes('conclu') && !status.includes('liberad')) { ignoradas++; return; }
    const numInterno = (row[iNum]||'').trim() || (cnpj+'|'+row[iData]+'|'+row[iEquip]+'|'+Math.random());
    if (jaTem.has(numInterno)) return; // dedup
    // data -> ISO e semana do calendário (segunda a domingo)
    let ano = md[3].length===2 ? '20'+md[3] : md[3];
    const dataISO = `${ano}-${md[2]}-${md[1]}`;
    const dt = new Date(parseInt(ano), parseInt(md[2])-1, parseInt(md[1]));
    const equip = (row[iEquip]||'').trim();
    const ehPeso = EQUIP_PESO.some(e=>norm(equip).includes(norm(e)));
    FINdados.coletas.push({
      num: numInterno,
      cnpj, cliente:(row[iCli]||'').trim(),
      equip, classe:(row[iClasse]||'').trim(), residuo:(row[iResiduo]||'').trim(),
      endereco:(row[iEnd]||'').trim(),
      data: dataISO, ym: `${ano}-${md[2]}`, semana: FIN_semanaDoMes(dt),
      qtdeServ: num2(row[iQServ]),
      pesoTon: ehPeso ? num2(row[iQTaxa]) : 0
    });
    jaTem.add(numInterno); novos++;
  });
  st.textContent = `${novos} coletas novas (${FINdados.coletas.length} no total).`; st.style.color='var(--verde-medio)';
}

// número da semana dentro do mês por BLOCOS FIXOS DE DIAS (opção A):
// dias 1-7 = sem1, 8-14 = sem2, 15-21 = sem3, 22-28 = sem4, 29+ = sem5.
// Blocos iguais em todo mês -> alinham entre meses (dia 1-7 de maio vs dia 1-7 de junho).
function FIN_semanaDoMes(dt){
  return Math.min(5, Math.floor((dt.getDate()-1)/7) + 1);
}
// rótulo amigável da semana (mostra os dias do bloco)
function FIN_rotSemana(s){
  const faixas={1:'dias 1–7',2:'dias 8–14',3:'dias 15–21',4:'dias 22–28',5:'dia 29+'};
  return `Semana ${s} (${faixas[s]||''})`;
}

// ============ SAÚDE FINANCEIRA ============
function finYmDeData(s){ const m=finLc(s).match(/(\d{2})\/(\d{2})\/(\d{2,4})/); if(!m) return ''; let ano=m[3].length===2?'20'+m[3]:m[3]; return `${ano}-${m[2]}`; }
// mês de pagamento robusto: usa o campo pré-calculado se existir (sobrevive ao Sheets), senão parseia a data
function finMesPag(x){ return x._mesPagamento || finYmDeData(x.pagamento); }
function FIN_renderSaude(){
  const p=document.getElementById('p-saude');
  if(!FINdados.pagar.length && !FINdados.receber.length){ p.innerHTML='<div class="card"><div class="vazio">Suba os relatórios de Pagar e Receber primeiro.</div></div>'; return; }
  const baseData = (window._saudeBase||'emissao');
  const receita={}, receitaBruta={}, despesa={};
  // mês da receita: usa o campo pré-calculado _mesEmissao (sobrevive ao ir/voltar do Sheets);
  // se não houver, cai no parse da data de emissão.
  FINdados.receber.filter(r=>!String(r.situacao||'').toLowerCase().includes('cancel')).forEach(r=>{
    const ym = baseData==='competencia' ? finCompYM(r.competencia) : (r._mesEmissao || finYmDeData(r.emissao));
    // receita pelo LÍQUIDO (o que de fato entra, já sem impostos). Se o título não tiver líquido, cai no bruto.
    const valLiq = (r.liquido!=null && r.liquido!=='' && r.liquido!==0) ? r.liquido : r.valor;
    if(ym){ receita[ym]=(receita[ym]||0)+valLiq; receitaBruta[ym]=(receitaBruta[ym]||0)+(r.valor||0); }
  });
  // despesa = contas a pagar, por _mesPagamento (pré-calculado) ou parse da data de pagamento
  FINdados.pagar.filter(r=>!String(r.situacao||'').toLowerCase().includes('cancel')).forEach(r=>{
    const ym = baseData==='competencia' ? finCompYM(r.competencia) : (r._mesPagamento || finYmDeData(r.pagamento));
    if(ym){ despesa[ym]=(despesa[ym]||0)+r.valor; }
  });
  const meses=[...new Set([...Object.keys(receita),...Object.keys(despesa)])].filter(Boolean).sort();
  const mesSel = window._saudeMes || 'todos';
  const mesesMostrar = mesSel==='todos' ? meses : meses.filter(m=>m===mesSel);
  let totR=0,totD=0,totBruto=0;
  let linhas=mesesMostrar.map(m=>{ const rv=receita[m]||0, dv=despesa[m]||0, res=rv-dv; totR+=rv; totD+=dv; totBruto+=(receitaBruta[m]||0);
    return `<tr><td>${finRotMes(m)}</td><td>${finFmtM(rv)}</td><td>${finFmtM(dv)}</td><td class="${res>=0?'pos':'neg'}">${finFmtM(res)}</td><td class="${res>=0?'pos':'neg'}">${rv?(res/rv*100).toFixed(1):'0'}%</td></tr>`;
  }).join('');
  const totRes=totR-totD;
  const maiorCentro=(()=>{ const c={}; FINdados.pagar.forEach(x=>c[x.centro]=(c[x.centro]||0)+x.valor); return Object.entries(c).sort((a,b)=>b[1]-a[1])[0]; })();
  p.innerHTML=`
    <div class="filtros">
      <span style="font-size:13px;color:var(--cinza-600);">Mês:</span>
      <select onchange="window._saudeMes=this.value;FIN_renderSaude()">
        <option value="todos" ${mesSel==='todos'?'selected':''}>Todos (evolução)</option>
        ${meses.map(m=>`<option value="${m}" ${m===mesSel?'selected':''}>${finRotMes(m)}</option>`).join('')}
      </select>
      <span style="font-size:13px;color:var(--cinza-600);">Base:</span>
      <select onchange="window._saudeBase=this.value;FIN_renderSaude()">
        <option value="emissao" ${baseData==='emissao'?'selected':''}>Emissão/Pagamento (bate com os relatórios)</option>
        <option value="competencia" ${baseData==='competencia'?'selected':''}>Competência (mês do serviço)</option>
      </select>
      <button class="btn sec" onclick="window.print()" style="margin-left:auto;"><i class="ti ti-printer"></i> Exportar / Imprimir</button>
    </div>
    <div class="kpis">
      <div class="kpi"><div class="num">${finFmtM(totBruto)}</div><div class="lbl">Receita bruta</div></div>
      <div class="kpi" style="border-top-color:var(--verde-medio);"><div class="num" style="color:var(--verde-escuro);">${finFmtM(totR)}</div><div class="lbl">Receita líquida (sem impostos)</div></div>
      <div class="kpi verm"><div class="num">${finFmtM(totD)}</div><div class="lbl">Despesa total</div></div>
      <div class="kpi ${totRes>=0?'':'verm'}"><div class="num">${finFmtM(totRes)}</div><div class="lbl">Resultado (sobre o líquido)</div></div>
      <div class="kpi"><div class="num">${totR?(totRes/totR*100).toFixed(1):'0'}%</div><div class="lbl">Margem (sobre o líquido)</div></div>
    </div>
    <div class="card">
      <h2>Receita vs Despesa por mês</h2>
      <table><thead><tr><th>Mês</th><th>Receita</th><th>Despesa</th><th>Resultado</th><th>Margem</th></tr></thead>
      <tbody>${linhas||'<tr><td colspan="5" class="vazio">Sem FINdados no período.</td></tr>'}</tbody></table>
    </div>
    <div class="card">
      <h2>Leitura automática</h2>
      <p style="font-size:14px;line-height:1.7;color:var(--cinza-700);">
        No período carregado, a receita <b>líquida</b> (já sem impostos) somou <b>${finFmtM(totR)}</b> e a despesa <b>${finFmtM(totD)}</b>,
        resultando em <b class="${totRes>=0?'pos':'neg'}">${totRes>=0?'superávit':'déficit'} de ${finFmtM(Math.abs(totRes))}</b>
        (margem de ${totR?(totRes/totR*100).toFixed(1):'0'}%).
        ${maiorCentro?`O centro de custo de maior peso foi <b>${maiorCentro[0]}</b> (${finFmtM(maiorCentro[1])}).`:''}
      </p>
    </div>`;
}

// ============ CONTAS A PAGAR ============
function FIN_renderPagar(){
  const p=document.getElementById('p-pagar');
  if(!FINdados.pagar.length){ p.innerHTML='<div class="card"><div class="vazio">Suba o relatório de Contas a Pagar.</div></div>'; return; }
  // exclui cancelados
  const base = FINdados.pagar.filter(x=>!String(x.situacao||'').toLowerCase().includes('cancel'));
  // meses disponíveis (por data de pagamento)
  const meses=[...new Set(base.map(x=>finMesPag(x)).filter(Boolean))].sort();
  const mesSel = window._pagMes || 'todos';
  const centroSel = window._pagCentro || 'todos';
  // lista de centros (pra o filtro)
  const centrosLista=[...new Set(base.map(x=>x.centro))].sort();
  // aplica filtros
  let lista = base.slice();
  if(mesSel!=='todos') lista = lista.filter(x=>finMesPag(x)===mesSel);
  if(centroSel!=='todos') lista = lista.filter(x=>x.centro===centroSel);
  // total por centro (da lista filtrada)
  const porCentro={}; lista.forEach(x=>porCentro[x.centro]=(porCentro[x.centro]||0)+x.valor);
  const centros=Object.entries(porCentro).sort((a,b)=>b[1]-a[1]);
  const totalP=centros.reduce((s,c)=>s+c[1],0);
  // análise mensal por centro (usa a base toda, por pagamento)
  const mesesAll=[...new Set(base.map(x=>finMesPag(x)).filter(Boolean))].sort();
  let analise='';
  if(mesesAll.length>=2){
    const piv={}; base.forEach(x=>{ const ym=finMesPag(x); if(!ym)return; if(centroSel!=='todos'&&x.centro!==centroSel)return; piv[x.centro]=piv[x.centro]||{}; piv[x.centro][ym]=(piv[x.centro][ym]||0)+x.valor; });
    let head='<tr><th>Centro de custo</th>'+mesesAll.map(m=>`<th>${finRotMes(m)}</th><th>Δ%</th>`).join('')+'</tr>';
    let body=Object.entries(piv).sort((a,b)=>{const sa=Object.values(a[1]).reduce((x,y)=>x+y,0);const sb=Object.values(b[1]).reduce((x,y)=>x+y,0);return sb-sa;}).map(([c,mv])=>{
      let ant=null; let tds=mesesAll.map(m=>{ const v=mv[m]||0; let d=''; if(ant!=null&&ant!==0) d=((v-ant)/ant*100); ant=v; return `<td>${v?finFmtM(v):'—'}</td><td class="${d===''?'':(d>=0?'neg':'pos')}">${d===''?'—':(d>=0?'+':'')+d.toFixed(0)+'%'}</td>`; }).join('');
      return `<tr><td><b>${c}</b></td>${tds}</tr>`;
    }).join('');
    analise=`<div class="card"><h2>Análise mensal por centro de custo</h2><div style="overflow-x:auto;"><table><thead>${head}</thead><tbody>${body}</tbody></table></div>
      <p style="font-size:12px;color:var(--cinza-500);margin-top:8px;">Δ% = variação vs o mês anterior. Verde = caiu, vermelho = subiu.</p></div>`;
  }
  p.innerHTML=`
    <div class="filtros">
      <span style="font-size:13px;color:var(--cinza-600);">Mês (pagamento):</span>
      <select onchange="window._pagMes=this.value;FIN_renderPagar()">
        <option value="todos" ${mesSel==='todos'?'selected':''}>Todos</option>
        ${meses.map(m=>`<option value="${m}" ${m===mesSel?'selected':''}>${finRotMes(m)}</option>`).join('')}
      </select>
      <span style="font-size:13px;color:var(--cinza-600);">Centro de custo:</span>
      <select onchange="window._pagCentro=this.value;FIN_renderPagar()">
        <option value="todos" ${centroSel==='todos'?'selected':''}>Todos</option>
        ${centrosLista.map(c=>`<option value="${c.replace(/"/g,'')}" ${c===centroSel?'selected':''}>${c}</option>`).join('')}
      </select>
      <button class="btn sec" onclick="window.print()" style="margin-left:auto;"><i class="ti ti-printer"></i> Exportar / Imprimir</button>
    </div>
    <div class="kpis">
      <div class="kpi verm"><div class="num">${finFmtM(totalP)}</div><div class="lbl">Total a pagar${mesSel!=='todos'?' · '+finRotMes(mesSel):''}${centroSel!=='todos'?' · '+centroSel:''}</div></div>
      <div class="kpi"><div class="num">${lista.length}</div><div class="lbl">títulos</div></div>
    </div>
    <div class="card">
      <h2>Despesa por centro de custo</h2>
      <table><thead><tr><th>Centro de custo</th><th>Total</th><th>% do total</th></tr></thead><tbody>
      ${centros.map(([c,v])=>`<tr><td>${c}</td><td>${finFmtM(v)}</td><td>${totalP?(v/totalP*100).toFixed(1):'0'}%<div class="barra"><div style="width:${totalP?(v/totalP*100).toFixed(1):0}%"></div></div></td></tr>`).join('')}
      <tr style="background:var(--cinza-100);"><td><b>TOTAL</b></td><td><b>${finFmtM(totalP)}</b></td><td></td></tr>
      </tbody></table>
    </div>
    ${analise}`;
}

// ============ CONTAS A RECEBER ============
function FIN_renderReceber(){
  const p=document.getElementById('p-receber');
  const temEmit = FINdados.receber.length, temReceb = FINdados.recebeReceb.length;
  if(!temEmit && !temReceb){ p.innerHTML='<div class="card"><div class="vazio">Suba os relatórios de Contas a Receber (Emitidos e/ou Recebidos).</div></div>'; return; }
  const semCancel = x=>!String(x.situacao||'').toLowerCase().includes('cancel');
  // mês de emissão robusto: usa o campo pré-calculado (sobrevive ao Sheets); senão parseia a data
  const mesEmiss = x => x._mesEmissao || finYmDeData(x.emissao);
  // EMITIDOS: base por emissão
  const baseEmit = FINdados.receber.filter(semCancel);
  // RECEBIDOS: base do relatório de recebidos
  const baseReceb = FINdados.recebeReceb.filter(semCancel);
  // meses disponíveis (emissão dos emitidos)
  const meses=[...new Set(baseEmit.map(mesEmiss).filter(Boolean))].sort();
  const mesSel = window._recMes || 'todos';
  // filtra emitidos por emissão
  const listaEmit = mesSel==='todos' ? baseEmit : baseEmit.filter(x=>mesEmiss(x)===mesSel);
  const emitido = listaEmit.reduce((s,x)=>s+x.valor,0);
  const aberto = listaEmit.reduce((s,x)=>s+x.saldo,0);
  // impostos e líquido (dos emitidos do período)
  const tISS = listaEmit.reduce((s,x)=>s+(x.iss||0),0);
  const tINSS = listaEmit.reduce((s,x)=>s+(x.inss||0),0);
  const tPIS = listaEmit.reduce((s,x)=>s+(x.pis||0),0);
  const tCOFINS = listaEmit.reduce((s,x)=>s+(x.cofins||0),0);
  const tCSLL = listaEmit.reduce((s,x)=>s+(x.csll||0),0);
  const tIR = listaEmit.reduce((s,x)=>s+(x.ir||0),0);
  const totalImpostos = tISS+tINSS+tPIS+tCOFINS+tCSLL+tIR;
  // líquido: usa a coluna "Vlr. Líquido" da planilha. Se algum título vier sem, cai pro bruto-impostos daquele título.
  const liquido = listaEmit.reduce((s,x)=>s + (x.liquido || (x.valor - (x.iss||0)-(x.inss||0)-(x.pis||0)-(x.cofins||0)-(x.csll||0)-(x.ir||0)-(x.desconto||0))), 0);
  // recebido: filtra também pelo mês selecionado (por emissão do recebido)
  const listaReceb = mesSel==='todos' ? baseReceb : baseReceb.filter(x=>mesEmiss(x)===mesSel);
  const recebidoTotal = listaReceb.reduce((s,x)=>s+(x.recebido||x.valor),0);
  const porSit={}; listaEmit.forEach(x=>porSit[x.situacao||'—']=(porSit[x.situacao||'—']||0)+x.valor);
  const cardImposto = (nome,val,pctBase)=>`<div class="kpi" style="border-top-color:var(--laranja);"><div class="num" style="font-size:20px;color:var(--laranja);">${finFmtM(val)}</div><div class="lbl">${nome}${pctBase&&emitido>0?` · ${(val/emitido*100).toFixed(1)}%`:''}</div></div>`;
  p.innerHTML=`
    <div class="filtros">
      <span style="font-size:13px;color:var(--cinza-600);">Mês (emissão):</span>
      <select onchange="window._recMes=this.value;FIN_renderReceber()">
        <option value="todos" ${mesSel==='todos'?'selected':''}>Todos</option>
        ${meses.map(m=>`<option value="${m}" ${m===mesSel?'selected':''}>${finRotMes(m)}</option>`).join('')}
      </select>
      <button class="btn sec" onclick="window.print()" style="margin-left:auto;"><i class="ti ti-printer"></i> Exportar / Imprimir</button>
    </div>
    <div class="kpis">
      <div class="kpi" style="border-top-color:var(--verde-medio);"><div class="num" style="color:var(--verde-escuro);">${finFmtM(liquido)}</div><div class="lbl"><b>Líquido no mês</b> (o que de fato entra)</div></div>
      <div class="kpi"><div class="num" style="font-size:22px;">${finFmtM(emitido)}</div><div class="lbl">Bruto emitido (faturado)</div></div>
      <div class="kpi" style="border-top-color:var(--laranja);"><div class="num" style="font-size:22px;color:var(--laranja);">${finFmtM(totalImpostos)}</div><div class="lbl">Total de impostos${emitido>0?` · ${(totalImpostos/emitido*100).toFixed(1)}%`:''}</div></div>
      <div class="kpi" style="border-top-color:var(--verde-claro);"><div class="num" style="font-size:22px;color:var(--verde-medio);">${temReceb?finFmtM(recebidoTotal):'—'}</div><div class="lbl">Recebido no mês (caixa)</div></div>
      <div class="kpi verm"><div class="num" style="font-size:22px;">${finFmtM(aberto)}</div><div class="lbl">Em aberto (dos emitidos)</div></div>
    </div>
    <div class="card"><h2>Impostos detalhados${mesSel!=='todos'?' · '+finRotMes(mesSel):''}</h2>
      <div class="kpis">
        ${cardImposto('ISS',tISS,true)}
        ${cardImposto('INSS',tINSS,true)}
        ${cardImposto('PIS',tPIS,true)}
        ${cardImposto('COFINS',tCOFINS,true)}
        ${cardImposto('CSLL',tCSLL,true)}
        ${cardImposto('IR',tIR,true)}
      </div>
      <div style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--cinza-300);font-size:13px;color:var(--cinza-700);">
        Bruto <b>${finFmtM(emitido)}</b> − impostos <b>${finFmtM(totalImpostos)}</b> = Líquido <b style="color:var(--verde-escuro);">${finFmtM(liquido)}</b>
      </div>
    </div>
    <div class="aviso" style="background:var(--verde-claro-bg);color:var(--verde-escuro);"><i class="ti ti-info-circle"></i>
      O <b>Líquido</b> vem da coluna "Vlr. Líquido" do relatório (o que de fato entra depois dos impostos).
      ${!temReceb?'<br><b>Falta subir o relatório de Recebidos</b> pra ver o valor recebido.':''}
      ${!temEmit?'<br><b>Falta subir o relatório de Emitidos.</b>':''}
    </div>
    <div class="card"><h2>Emitidos por situação de pagamento${mesSel!=='todos'?' · '+finRotMes(mesSel):''}</h2>
      <p style="font-size:12px;color:var(--cinza-500);margin-bottom:8px;">"Fechado" = título já pago/quitado. "Aberto" = ainda não pago (no prazo ou atrasado).</p>
      <table><thead><tr><th>Situação</th><th>Valor emitido</th></tr></thead><tbody>
      ${Object.entries(porSit).map(([s,v])=>{ const nome = s.toLowerCase()==='fechado'?'Fechado (pago)':s.toLowerCase()==='aberto'?'Aberto (a receber)':s; return `<tr><td>${nome}</td><td>${finFmtM(v)}</td></tr>`; }).join('')||'<tr><td colspan=2 class="vazio">Sem emitidos.</td></tr>'}
      </tbody></table>
    </div>`;
}

// ============ COLETAS (acompanhamento semanal + mensal) ============
function FIN_renderColetas(){
  const p=document.getElementById('p-coletas');
  if(!FINdados.coletas.length){ p.innerHTML='<div class="card"><div class="vazio">Suba o Relatório de Serviços (.csv) na aba Relatórios.</div></div>'; return; }
  // meses disponíveis
  const meses=[...new Set(FINdados.coletas.map(c=>c.ym))].sort();
  const modo = window._coletaModo || 'semana';
  const rotYM = ym=>{ const [a,m]=ym.split('-'); return (FIN_MESNOME[m]||m)+'/'+a.slice(2); };
  p.innerHTML=`
    <div class="filtros">
      <select onchange="window._coletaModo=this.value;FIN_renderColetas()">
        <option value="semana" ${modo==='semana'?'selected':''}>Comparar por semana (entre 2 meses)</option>
        <option value="mes" ${modo==='mes'?'selected':''}>Visão mensal por cliente</option>
      </select>

  else FIN_renderColetaMes(meses, rotYM);

// agrupa coletas por chave, somando qtde e peso
function FIN_agrupaColetas(filtro){
  const g={};
  FINdados.coletas.filter(filtro).forEach(c=>{
    // agrupa por NOME do cliente (junta todas as unidades/CNPJs da mesma empresa) + equipamento + classe.
    // Antes usava CNPJ, mas clientes como PUC têm vários CNPJs por unidade, e a numeração muda
    // entre relatórios — isso fazia a mesma empresa parecer que "parou" numa unidade e "nasceu" em outra.
    const nomeChave = FIN_finNormNomeCli(c.cliente);
    const chave=nomeChave+'||'+c.equip+'||'+c.classe;
    if(!g[chave]) g[chave]={cliente:c.cliente,cnpj:c.cnpj,equip:c.equip,classe:c.classe,residuo:c.residuo,qtde:0,peso:0};
    g[chave].qtde+=c.qtdeServ; g[chave].peso+=c.pesoTon;
  });
  return g;
}
// normaliza o nome do cliente pra juntar unidades (remove sufixos de unidade, acentos, etc)
function FIN_finNormNomeCli(s){
  return String(s||'').toUpperCase()
    .replace(/[ÁÀÂÃ]/g,'A').replace(/[ÉÊ]/g,'E').replace(/[Í]/g,'I').replace(/[ÓÔÕ]/g,'O').replace(/[Ú]/g,'U').replace(/Ç/g,'C')
    .replace(/\s*[-–]\s*(UNIDADE|UNID|FILIAL|MATRIZ|CAMPUS|BLOCO|PREDIO).*$/i,'')
    .replace(/[^A-Z0-9 ]/g,'').replace(/\s+/g,' ').trim();
}

function FIN_renderColetaSemana(meses, rotYM){
  const area=document.getElementById('coleta-area');
  if(meses.length<2){ area.innerHTML='<div class="card"><div class="aviso">Suba pelo menos 2 meses pra comparar semanas (ex: junho e julho).</div></div>'; return; }
  // seletores de mês A (base) e B (comparação) + semana
  const mesA = window._coletaMesA || meses[meses.length-2];
  const mesB = window._coletaMesB || meses[meses.length-1];
  const semanas=[...new Set(FINdados.coletas.filter(c=>c.ym===mesA||c.ym===mesB).map(c=>Number(c.semana)))].sort((a,b)=>a-b);
  const sem = Number(window._coletaSem || semanas[0]);
  // agrupa por cliente+equip+classe em cada mês, só na semana escolhida (compara semana como número)
  const gA=FIN_agrupaColetas(c=>c.ym===mesA && Number(c.semana)===sem);
  const gB=FIN_agrupaColetas(c=>c.ym===mesB && Number(c.semana)===sem);
  const chaves=[...new Set([...Object.keys(gA),...Object.keys(gB)])];
  // monta linhas com variação
  let linhas=chaves.map(k=>{
    const a=gA[k], b=gB[k]; const base=a||b;
    const qa=a?a.qtde:0, qb=b?b.qtde:0;
    const varPct = qa===0 ? (qb>0?null:0) : ((qb-qa)/qa*100);
    return {cliente:base.cliente, equip:base.equip, classe:base.classe, qa, qb, varPct, peso_a:a?a.peso:0, peso_b:b?b.peso:0};
  }).sort((x,y)=>{ // quem mais caiu primeiro
    const vx=x.varPct===null?999:x.varPct, vy=y.varPct===null?999:y.varPct; return vx-vy;
  });
  // filtro de exibição
  const filtroEx = window._coletaFiltro || 'movimento';
  let linhasEx = linhas;
  if(filtroEx==='movimento') linhasEx = linhas.filter(l=>l.qa>0 && l.qb>0); // tem nos 2 meses
  else if(filtroEx==='caiu') linhasEx = linhas.filter(l=>l.qa>0 && l.qb<l.qa); // caiu (inclui zerou)
  else if(filtroEx==='parou') linhasEx = linhas.filter(l=>l.qa>0 && l.qb===0); // parou de vez
  else if(filtroEx==='novos') linhasEx = linhas.filter(l=>l.qa===0 && l.qb>0); // clientes novos
  // else 'todos' -> tudo
  const nMovimento=linhas.filter(l=>l.qa>0&&l.qb>0).length, nParou=linhas.filter(l=>l.qa>0&&l.qb===0).length, nNovos=linhas.filter(l=>l.qa===0&&l.qb>0).length;
  area.innerHTML=`
    <div class="filtros" style="margin-bottom:10px;">
      <span style="font-size:13px;color:var(--cinza-600);">Comparar</span>
      <select onchange="window._coletaMesA=this.value;FIN_renderColetas()">${meses.map(m=>`<option value="${m}" ${m===mesA?'selected':''}>${rotYM(m)}</option>`).join('')}</select>
      <span style="font-size:13px;color:var(--cinza-600);">com</span>
      <select onchange="window._coletaMesB=this.value;FIN_renderColetas()">${meses.map(m=>`<option value="${m}" ${m===mesB?'selected':''}>${rotYM(m)}</option>`).join('')}</select>
      <span style="font-size:13px;color:var(--cinza-600);">·</span>
      <select onchange="window._coletaSem=parseInt(this.value);FIN_renderColetas()">${semanas.map(s=>`<option value="${s}" ${s===sem?'selected':''}>${FIN_rotSemana(s)}</option>`).join('')}</select>
    </div>
    <div class="filtros" style="margin-bottom:10px;">
      <span style="font-size:13px;color:var(--cinza-600);">Mostrar:</span>
      <select onchange="window._coletaFiltro=this.value;FIN_renderColetas()">
        <option value="movimento" ${filtroEx==='movimento'?'selected':''}>Com movimento nos 2 meses (${nMovimento})</option>
        <option value="caiu" ${filtroEx==='caiu'?'selected':''}>Só quem caiu</option>
        <option value="parou" ${filtroEx==='parou'?'selected':''}>Só quem parou de coletar (${nParou})</option>
        <option value="novos" ${filtroEx==='novos'?'selected':''}>Só clientes novos (${nNovos})</option>
        <option value="todos" ${filtroEx==='todos'?'selected':''}>Todos</option>
      </select>
      <button class="btn sec" onclick="window.print()" style="margin-left:auto;"><i class="ti ti-printer"></i> Exportar</button>
    </div>
    <div class="card">
      <h2>${FIN_rotSemana(sem)}: ${rotYM(mesA)} vs ${rotYM(mesB)}</h2>
      <p style="font-size:12px;color:var(--cinza-500);margin-bottom:8px;">Ordenado pelos que mais caíram. Verde = subiu, vermelho = caiu. Mostrando ${linhasEx.length} de ${linhas.length}.</p>
      <table><thead><tr><th>Cliente</th><th>Equipamento / Resíduo</th><th>${rotYM(mesA)}</th><th>${rotYM(mesB)}</th><th>Variação</th></tr></thead><tbody>
      ${linhasEx.map(l=>{
        const cor = l.varPct===null?'':(l.varPct>0.5?'pos':l.varPct<-0.5?'neg':'');
        const vtxt = l.varPct===null?'<span class="badge" style="background:var(--verde-claro-bg);color:var(--verde-escuro);">novo</span>':(l.qb===0?'<span class="neg">parou</span>':(l.varPct>0?'+':'')+l.varPct.toFixed(0)+'%');
        const pa = l.peso_a?` <span style="color:var(--cinza-400);font-size:11px;">(${l.peso_a.toFixed(1)}t)</span>`:'';
        const pb = l.peso_b?` <span style="color:var(--cinza-400);font-size:11px;">(${l.peso_b.toFixed(1)}t)</span>`:'';
        return `<tr><td><b>${l.cliente}</b></td><td style="font-size:12px;color:var(--cinza-600);">${l.equip}<br>${l.classe}</td><td>${l.qa}${pa}</td><td>${l.qb}${pb}</td><td class="${cor}">${vtxt}</td></tr>`;
      }).join('')||'<tr><td colspan=5 class="vazio">Nenhum cliente neste filtro.</td></tr>'}
      </tbody></table>
    </div>`;
}

function FIN_renderColetaMes(meses, rotYM){
  const area=document.getElementById('coleta-area');
  const mes = window._coletaMesUnico || meses[meses.length-1];
  const mesAnt = meses[meses.indexOf(mes)-1];
  const g=FIN_agrupaColetas(c=>c.ym===mes);
  const gAnt = mesAnt ? FIN_agrupaColetas(c=>c.ym===mesAnt) : {};
  // agrupa por cliente (junta os equipamentos/resíduos dentro)
  const porCliente={};
  Object.keys(g).forEach(k=>{ const it=g[k]; if(!porCliente[it.cnpj]) porCliente[it.cnpj]={cliente:it.cliente,itens:[],totalQ:0,totalP:0}; 
    const ant=gAnt[k]; porCliente[it.cnpj].itens.push({equip:it.equip,classe:it.classe,qtde:it.qtde,peso:it.peso,qtdeAnt:ant?ant.qtde:null});
    porCliente[it.cnpj].totalQ+=it.qtde; porCliente[it.cnpj].totalP+=it.peso;
  });
  const lista=Object.values(porCliente).sort((a,b)=>b.totalQ-a.totalQ);
  area.innerHTML=`
    <div class="filtros" style="margin-bottom:10px;">
      <span style="font-size:13px;color:var(--cinza-600);">Mês</span>
      <select onchange="window._coletaMesUnico=this.value;FIN_renderColetas()">${meses.map(m=>`<option value="${m}" ${m===mes?'selected':''}>${rotYM(m)}</option>`).join('')}</select>
      ${mesAnt?`<span style="font-size:12px;color:var(--cinza-500);">(comparando com ${rotYM(mesAnt)})</span>`:''}
    </div>
    ${lista.map(cl=>`
      <div class="card" style="padding:14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <b style="font-size:14px;">${cl.cliente}</b>
          <span style="font-size:12px;color:var(--cinza-500);">${cl.totalQ} equip.${cl.totalP?` · ${cl.totalP.toFixed(1)}t`:''}</span>
        </div>
        <table><tbody>
        ${cl.itens.map(it=>{
          let vtxt='';
          if(it.qtdeAnt!=null && it.qtdeAnt>0){ const v=(it.qtde-it.qtdeAnt)/it.qtdeAnt*100; vtxt=`<span class="${v>0.5?'pos':v<-0.5?'neg':''}">${v>0?'+':''}${v.toFixed(0)}%</span> <span style="color:var(--cinza-400);font-size:11px;">(era ${it.qtdeAnt})</span>`; }
          else if(it.qtdeAnt===null && mesAnt){ vtxt='<span class="badge" style="background:var(--verde-claro-bg);color:var(--verde-escuro);">novo</span>'; }
          return `<tr><td style="font-size:12px;">${it.equip} · ${it.classe}</td><td style="text-align:right;"><b>${it.qtde}</b>${it.peso?` <span style="color:var(--cinza-400);font-size:11px;">${it.peso.toFixed(1)}t</span>`:''}</td><td style="text-align:right;">${vtxt}</td></tr>`;
        }).join('')}
        </tbody></table>
      </div>
    `).join('')}`;
}

// ============ VARIAÇÃO DE FATURAMENTO (relatório geral de todos os clientes) ============
function FIN_processarFaturamentoVar(wb, st){
  // acha a aba com FINdados (SourceData ou a que tiver "Cliente")
  let ws=null;
  for(const nome of wb.SheetNames){
    const t=XLSX.utils.sheet_to_json(wb.Sheets[nome],{header:1,defval:''});
    if(t.length && t.some(r=>r.some(v=>finLc(v).toLowerCase()==='cliente'))){ ws=wb.Sheets[nome]; break; }
  }
  if(!ws) ws=wb.Sheets[wb.SheetNames.find(n=>n.toLowerCase()==='sourcedata')||wb.SheetNames[0]];
  const grade=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  // acha o cabeçalho (linha com "Cliente")
  let hrow=grade.findIndex(r=>r.some(v=>finLc(v).toLowerCase()==='cliente'));
  if(hrow<0){ st.textContent='Não achei a coluna Cliente.'; st.style.color='var(--vermelho)'; return; }
  const cab=grade[hrow].map(v=>finLc(v));
  const iCli=cab.findIndex(c=>c.toLowerCase()==='cliente');
  // meses = colunas que são nome de mês
  const idxMeses=[]; const nomesMeses=[];
  cab.forEach((c,i)=>{ if(FIN_MESES[c.toLowerCase().trim()]){ idxMeses.push(i); nomesMeses.push(c.trim()); } });
  if(!idxMeses.length){ st.textContent='Não achei colunas de mês (Abril, Maio...).'; st.style.color='var(--vermelho)'; return; }
  // substitui tudo (é um retrato completo, não incremental como os títulos)
  FINdados.faturamento=[];
  let n=0;
  for(let i=hrow+1;i<grade.length;i++){
    const cli=finLc(grade[i][iCli]);
    if(!cli || /^\d+$/.test(cli) || cli.toLowerCase().startsWith('total')) continue;
    const valores={};
    idxMeses.forEach((idx,k)=>{ valores[nomesMeses[k]]=finParseValorBR(grade[i][idx]); });
    FINdados.faturamento.push({ cliente:cli, valores });
    n++;
  }
  window._fatVarMeses = nomesMeses;
  st.textContent=`${n} clientes carregados (meses: ${nomesMeses.join(', ')}).`; st.style.color='var(--verde-medio)';
}

function FIN_renderFaturamentoVar(){
  const p=document.getElementById('p-faturamento');
  if(!FINdados.faturamento.length){ p.innerHTML='<div class="card"><div class="vazio">Suba o relatório de Variação de Faturamento (.xlsx) na aba Relatórios.</div></div>'; return; }
  const meses = window._fatVarMeses || Object.keys(FINdados.faturamento[0].valores);
  const mesAtual = window._fatVarMes || meses[meses.length-1];
  const iAtual = meses.indexOf(mesAtual);
  const mesAnt = iAtual>0 ? meses[iAtual-1] : null;
  const ordem = window._fatVarOrdem || 'var-menor';
  const busca = (window._fatVarBusca||'').toLowerCase();
  // monta linhas
  let linhas = FINdados.faturamento.map(c=>{
    const atual = c.valores[mesAtual]||0;
    const ant = mesAnt ? (c.valores[mesAnt]||0) : null;
    const varPct = (ant && ant!==0) ? ((atual-ant)/ant*100) : (atual>0&&ant===0?null:0);
    return {cliente:c.cliente, atual, ant, varPct};
  });
  if(busca) linhas=linhas.filter(l=>l.cliente.toLowerCase().includes(busca));
  // ordenação
  if(ordem==='maior') linhas.sort((a,b)=>b.atual-a.atual);
  else if(ordem==='menor') linhas.sort((a,b)=>a.atual-b.atual);
  else if(ordem==='var-menor') linhas.sort((a,b)=>(a.varPct==null?999:a.varPct)-(b.varPct==null?999:b.varPct));
  else if(ordem==='var-maior') linhas.sort((a,b)=>(b.varPct==null?-999:b.varPct)-(a.varPct==null?-999:a.varPct));
  else linhas.sort((a,b)=>a.cliente.localeCompare(b.cliente));
  const totAtual=linhas.reduce((s,l)=>s+l.atual,0);
  const totAnt=mesAnt?linhas.reduce((s,l)=>s+(l.ant||0),0):0;
  const varTot=totAnt?((totAtual-totAnt)/totAnt*100):0;
  const caindo=linhas.filter(l=>l.varPct!==null&&l.varPct<-0.5).length;
  p.innerHTML=`
    <div class="filtros">
      <span style="font-size:13px;color:var(--cinza-600);">Mês:</span>
      <select onchange="window._fatVarMes=this.value;FIN_renderFaturamentoVar()">${meses.map(m=>`<option value="${m}" ${m===mesAtual?'selected':''}>${m}</option>`).join('')}</select>
      <input type="text" placeholder="Buscar cliente..." value="${window._fatVarBusca||''}" oninput="window._fatVarBusca=this.value;FIN_renderFaturamentoVar()" style="padding:7px 10px;border:1.5px solid var(--cinza-300);border-radius:8px;font-size:13px;">
      <select onchange="window._fatVarOrdem=this.value;FIN_renderFaturamentoVar()" style="margin-left:auto;">
        <option value="var-menor" ${ordem==='var-menor'?'selected':''}>Variação: menor → maior (quem caiu)</option>
        <option value="var-maior" ${ordem==='var-maior'?'selected':''}>Variação: maior → menor</option>
        <option value="maior" ${ordem==='maior'?'selected':''}>Maior faturamento</option>
        <option value="menor" ${ordem==='menor'?'selected':''}>Menor faturamento</option>
        <option value="nome" ${ordem==='nome'?'selected':''}>Nome (A-Z)</option>
      </select>
      <button class="btn sec" onclick="window.print()"><i class="ti ti-printer"></i> Exportar</button>
    </div>
    <div class="kpis">
      <div class="kpi"><div class="num">${finFmtM(totAtual)}</div><div class="lbl">Faturamento ${mesAtual}</div></div>
      ${mesAnt?`<div class="kpi ${varTot>=0?'':'verm'}"><div class="num" style="color:${varTot>=0?'var(--verde-medio)':'var(--vermelho)'};">${varTot>=0?'+':''}${varTot.toFixed(1)}%</div><div class="lbl">vs ${mesAnt}</div></div>`:''}
      <div class="kpi verm"><div class="num">${caindo}</div><div class="lbl">clientes em queda</div></div>
    </div>
    <div class="card">
      <h2>Faturamento por cliente${mesAnt?` — ${mesAnt} → ${mesAtual}`:` — ${mesAtual}`}</h2>
      <p style="font-size:12px;color:var(--cinza-500);margin-bottom:8px;">Ordenado por quem mais caiu. Mostrando ${Math.min(linhas.length,300)} de ${linhas.length}.</p>
      <table><thead><tr><th>Cliente</th>${mesAnt?`<th>${mesAnt}</th>`:''}<th>${mesAtual}</th>${mesAnt?'<th>Variação</th>':''}</tr></thead><tbody>
      ${linhas.slice(0,300).map(l=>{
        let varCol='';
        if(mesAnt){ if(l.varPct===null) varCol='<td><span class="badge" style="background:var(--verde-claro-bg);color:var(--verde-escuro);">novo</span></td>';
          else { const cor=l.varPct>0.5?'pos':l.varPct<-0.5?'neg':''; varCol=`<td class="${cor}">${l.varPct>0?'+':''}${l.varPct.toFixed(1)}%</td>`; } }
        return `<tr><td><b>${l.cliente}</b></td>${mesAnt?`<td style="color:var(--cinza-600);">${finFmtM(l.ant)}</td>`:''}<td><b>${finFmtM(l.atual)}</b></td>${varCol}</tr>`;
      }).join('')}
      </tbody></table>
    </div>`;
}

// Alimentado por upload manual (localStorage deste navegador). Acesso: admin/diretor + financeiro.
// Carrega o SheetJS sob demanda (só quando o módulo é aberto).
let _finSheetJSCarregado = false;
function FIN_garantirSheetJS(cb){
  if (_finSheetJSCarregado || window.XLSX) { _finSheetJSCarregado = true; return cb(); }
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload = () => { _finSheetJSCarregado = true; cb(); };
  s.onerror = () => { cb(); }; // se falhar, o parser nativo ainda tenta
  document.head.appendChild(s);
}
const FIN_HTML_RELATORIOS = '\n    <div class="card" style="background:#fff;border:1px solid var(--cinza-200);border-radius:14px;padding:20px;margin-bottom:16px;">\n      <h2 style="color:var(--verde-escuro);font-size:16px;margin:0 0 10px;">Suba os relatórios</h2>\n      <div style="background:#eef4fb;color:#2c5282;border-radius:8px;padding:10px;font-size:12.5px;margin-bottom:14px;"><i class="ti ti-info-circle"></i> Os dados ficam só neste navegador. O sistema soma só o que veio a mais (não conta título repetido).</div>\n      <div class="upload-box" id="ub-pagar"><label for="f-pagar"><i class="ti ti-file-spreadsheet" style="font-size:22px;display:block;margin-bottom:6px;"></i> Contas a Pagar (.xlsx)</label><input type="file" id="f-pagar" accept=".xlsx" onchange="FIN_lerArquivo(this,\'pagar\')"><div id="st-pagar" style="font-size:12px;color:var(--cinza-500);margin-top:6px;"></div><div style="margin-top:8px;"><span onclick="FIN_limparTipo(\'pagar\')" style="font-size:11px;color:var(--vermelho);cursor:pointer;"><i class="ti ti-trash"></i> Limpar só este</span></div></div>\n      <div class="upload-box" id="ub-receber"><label for="f-receber"><i class="ti ti-file-spreadsheet" style="font-size:22px;display:block;margin-bottom:6px;"></i> Contas a Receber — <b>EMITIDOS no mês</b> (filtro Emissão)</label><input type="file" id="f-receber" accept=".xlsx" onchange="FIN_lerArquivo(this,\'receber\')"><div id="st-receber" style="font-size:12px;color:var(--cinza-500);margin-top:6px;"></div><div style="margin-top:8px;"><span onclick="FIN_limparTipo(\'receber\')" style="font-size:11px;color:var(--vermelho);cursor:pointer;"><i class="ti ti-trash"></i> Limpar só este</span></div></div>\n      <div class="upload-box" id="ub-recebeReceb"><label for="f-recebeReceb"><i class="ti ti-cash" style="font-size:22px;display:block;margin-bottom:6px;"></i> Contas a Receber — <b>RECEBIDOS no mês</b> (filtro Recebimento)</label><input type="file" id="f-recebeReceb" accept=".xlsx" onchange="FIN_lerArquivo(this,\'recebeReceb\')"><div id="st-recebeReceb" style="font-size:12px;color:var(--cinza-500);margin-top:6px;"></div><div style="margin-top:8px;"><span onclick="FIN_limparTipo(\'recebeReceb\')" style="font-size:11px;color:var(--vermelho);cursor:pointer;"><i class="ti ti-trash"></i> Limpar só este</span></div></div>\n      <div class="upload-box" id="ub-comissao"><label for="f-comissao"><i class="ti ti-file-spreadsheet" style="font-size:22px;display:block;margin-bottom:6px;"></i> Planilha de Comissões (uma aba por consultor)</label><input type="file" id="f-comissao" accept=".xlsx" onchange="FIN_lerArquivo(this,\'comissao\')"><div id="st-comissao" style="font-size:12px;color:var(--cinza-500);margin-top:6px;"></div><div style="margin-top:8px;"><span onclick="FIN_limparTipo(\'fechamentos\')" style="font-size:11px;color:var(--vermelho);cursor:pointer;"><i class="ti ti-trash"></i> Limpar só este</span></div></div>\n      <div class="upload-box" id="ub-servicos"><label for="f-servicos"><i class="ti ti-recycle" style="font-size:22px;display:block;margin-bottom:6px;"></i> Relatório de Serviços (coletas — .csv)</label><input type="file" id="f-servicos" accept=".csv" onchange="FIN_lerArquivo(this,\'servicos\')"><div id="st-servicos" style="font-size:12px;color:var(--cinza-500);margin-top:6px;"></div><div style="margin-top:8px;"><span onclick="FIN_limparTipo(\'coletas\')" style="font-size:11px;color:var(--vermelho);cursor:pointer;"><i class="ti ti-trash"></i> Limpar só este</span></div></div>\n      <div class="upload-box" id="ub-faturamento"><label for="f-faturamento"><i class="ti ti-chart-line" style="font-size:22px;display:block;margin-bottom:6px;"></i> Variação de Faturamento (todos os clientes — .xlsx)</label><input type="file" id="f-faturamento" accept=".xlsx" onchange="FIN_lerArquivo(this,\'faturamento\')"><div id="st-faturamento" style="font-size:12px;color:var(--cinza-500);margin-top:6px;"></div><div style="margin-top:8px;"><span onclick="FIN_limparTipo(\'faturamento\')" style="font-size:11px;color:var(--vermelho);cursor:pointer;"><i class="ti ti-trash"></i> Limpar só este</span></div></div>\n      <div style="margin-top:12px;"><button class="ficha-btn-secundario" onclick="FIN_limparTudo()"><i class="ti ti-trash"></i> Limpar tudo</button></div>\n    </div>\n    <div class="card" style="background:#fff;border:1px solid var(--cinza-200);border-radius:14px;padding:20px;"><h2 style="color:var(--verde-escuro);font-size:16px;margin:0 0 10px;">O que já está acumulado</h2><div id="resumo-acumulado">Nenhum relatório carregado ainda.</div></div>\n';
function renderFinanceiro(area, subId){
  area.innerHTML = '<div class="placeholder"><i class="ti ti-loader"></i><h2>Carregando...</h2></div>';
  FIN_garantirSheetJS(async function(){
    finCarregar(); // cache local (instantâneo)

    // A tela de RELATÓRIOS é só upload — abre na hora, sem esperar o Sheets.
    // O resumo "o que já está acumulado" é preenchido em segundo plano.
    if (subId === 'fin-relatorios'){
      area.innerHTML = '<div id="fin-wrap">' + FIN_HTML_RELATORIOS + '</div>';
      finAtualizarTudo(); // mostra o que já tem no cache local, na hora
      // atualiza o resumo com os dados do Sheets quando chegarem (não trava a tela)
      finCarregarDoSheets(['pagar','receber','recebeReceb','fechamentos','coletas','faturamento'])
        .then(()=>{ if (document.getElementById('resumo-acumulado')) finAtualizarTudo(); })
        .catch(()=>{});
      return;
    }

    // demais telas: carrega só os tipos que precisa (em paralelo, com cache)
    const TIPOS_POR_TELA = {
      'fin-saude':       ['pagar','receber'],
      'fin-pagar':       ['pagar'],
      'fin-receber':     ['receber','recebeReceb'],
      'fin-coletas':     ['coletas'],
    };
    try { await finCarregarDoSheets(TIPOS_POR_TELA[subId] || []); } catch(e){ /* segue com o cache local */ }
    const mapa = {
      'fin-saude':      { id:'p-saude',      fn: FIN_renderSaude },
      'fin-pagar':      { id:'p-pagar',      fn: FIN_renderPagar },
      'fin-receber':    { id:'p-receber',    fn: FIN_renderReceber },
      'fin-coletas':    { id:'p-coletas',    fn: FIN_renderColetas },
    };
    const alvo = mapa[subId];
    if (!alvo){ area.innerHTML = '<div class="sem-acesso">Tela não encontrada.</div>'; return; }
    area.innerHTML = '<div id="fin-wrap"><div id="'+alvo.id+'"></div></div>';
    try { alvo.fn(); } catch(e){ area.innerHTML = '<div class="sem-acesso">Erro ao renderizar: '+e.message+'</div>'; }
  });
}
