async function gerarRelatorioPDF() {
  const cons = (document.getElementById('rel-cons')||{}).value||'';
  const ini = (document.getElementById('rel-ini')||{}).value||'';
  const fim = (document.getElementById('rel-fim')||{}).value||'';
  if (!ini || !fim) { alert('Escolha o período (de/até).'); return; }
  const dIni = new Date(ini+'T00:00:00'), dFim = new Date(fim+'T23:59:59');

  // buscar mudanças de etapa e atividades
  const [re, ra, rcli, rctr] = await Promise.all([
    buscarDados('Historico_Etapas'), buscarDados('Atividades_Cliente'),
    buscarDados('Clientes'), buscarDados('Contratos')
  ]);
  let etapas = (re.ok?re.linhas:[]).map(e=>({...e,_d:parseDataReaj(e['DATA'])})).filter(e=>e._d&&e._d>=dIni&&e._d<=dFim);
  let ativs = (ra.ok?ra.linhas:[]).map(a=>({...a,_d:parseDataReaj(a['DATA_REGISTRO'])})).filter(a=>a._d&&a._d>=dIni&&a._d<=dFim);
  // clientes e contratos abertos no período (pela DATA_CADASTRO)
  let clientes = (rcli.ok?rcli.linhas:[]).map(c=>({...c,_d:parseDataReaj(c['DATA_CADASTRO'])})).filter(c=>c._d&&c._d>=dIni&&c._d<=dFim);
  let contratos = (rctr.ok?rctr.linhas:[]).map(c=>({...c,_d:parseDataReaj(c['DATA_CADASTRO'])})).filter(c=>c._d&&c._d>=dIni&&c._d<=dFim);
  if (cons) {
    etapas = etapas.filter(e=>e['CONSULTOR']===cons);
    ativs = ativs.filter(a=>a['REGISTRADO_POR']===cons);
    clientes = clientes.filter(c=>c['CONSULTOR']===cons);
    contratos = contratos.filter(c=>c['CONSULTOR']===cons);
  }

  // juntar tudo num só fluxo cronológico
  let eventos = [];
  etapas.forEach(e=>eventos.push({ d:e._d, txt:`<b>${e['CLIENTE']}</b> passou de <i>${e['ETAPA_ANTERIOR']||'—'}</i> para <b>${e['ETAPA_NOVA']}</b>`, cons:e['CONSULTOR'], tipo:'Etapa' }));
  ativs.forEach(a=>eventos.push({ d:a._d, txt:`<b>${a['CLIENTE']||'—'}</b>: ${a['TIPO']} — ${a['TITULO']||''}${a['DATA_AGENDADA']?' (agendada p/ '+fmtDataBR(a['DATA_AGENDADA'])+')':''}`, cons:a['REGISTRADO_POR'], tipo:a['TIPO'] }));
  eventos.sort((a,b)=>a.d-b.d);

  const periodo = ini===fim ? fmtDataBR(ini) : `${fmtDataBR(ini)} a ${fmtDataBR(fim)}`;

  let linhas = eventos.map(ev=>`<tr><td style="padding:7px 10px;border-bottom:1px solid #eee;white-space:nowrap;color:#555;font-size:12px;">${ev.d.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</td><td style="padding:7px 10px;border-bottom:1px solid #eee;font-size:12px;"><span style="display:inline-block;background:#f0f7ec;color:#2d5a3d;border-radius:4px;padding:1px 6px;font-size:10px;margin-right:6px;">${ev.tipo}</span>${ev.txt}</td>${cons?'':`<td style="padding:7px 10px;border-bottom:1px solid #eee;font-size:12px;color:#666;">${ev.cons||'—'}</td>`}</tr>`).join('');
  if (!eventos.length) linhas = `<tr><td colspan="3" style="padding:20px;text-align:center;color:#999;">Nenhuma atividade no período.</td></tr>`;

  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Relatório Ecotrans</title>
    <style>body{font-family:Arial,sans-serif;color:#222;padding:30px;} h1{color:#2d5a3d;font-size:20px;margin:0;} .sub{color:#666;font-size:13px;margin:4px 0 20px;} table{width:100%;border-collapse:collapse;} th{background:#2d5a3d;color:white;text-align:left;padding:8px 10px;font-size:12px;}</style>
    </head><body>
    <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #8bc34a;padding-bottom:12px;margin-bottom:16px;">
      <div><h1>Ecotrans Ambiental</h1><div class="sub">Relatório de atividades comerciais</div></div>
      <div style="text-align:right;font-size:12px;color:#666;">${cons||'Todos os consultores'}<br>${periodo}</div>
    </div>
    <table><thead><tr><th>Quando</th><th>Atividade</th>${cons?'':'<th>Consultor</th>'}</tr></thead><tbody>${linhas}</tbody></table>
    <h2 style="color:#2d5a3d;font-size:15px;border-bottom:2px solid #8bc34a;padding-bottom:4px;margin:22px 0 8px;">Clientes abertos no período (${clientes.length})</h2>
    ${clientes.length ? `<table><thead><tr><th>Cliente</th><th>CNPJ</th><th>Tipo</th>${cons?'':'<th>Consultor</th>'}</tr></thead><tbody>${clientes.map(c=>`<tr><td style="padding:6px 10px;border-bottom:1px solid #eee;font-size:12px;">${c['CLIENTE']||'—'}</td><td style="padding:6px 10px;border-bottom:1px solid #eee;font-size:12px;">${c['CNPJ']||'—'}</td><td style="padding:6px 10px;border-bottom:1px solid #eee;font-size:12px;">${c['TIPO']||'—'}</td>${cons?'':`<td style="padding:6px 10px;border-bottom:1px solid #eee;font-size:12px;">${c['CONSULTOR']||'—'}</td>`}</tr>`).join('')}</tbody></table>` : '<p style="color:#999;font-size:12px;">Nenhum cliente aberto no período.</p>'}
    <h2 style="color:#2d5a3d;font-size:15px;border-bottom:2px solid #8bc34a;padding-bottom:4px;margin:22px 0 8px;">Contratos abertos no período (${contratos.length})</h2>
    ${contratos.length ? `<table><thead><tr><th>Cliente</th><th>Nº Contrato</th><th>Vencimento</th>${cons?'':'<th>Consultor</th>'}</tr></thead><tbody>${contratos.map(c=>`<tr><td style="padding:6px 10px;border-bottom:1px solid #eee;font-size:12px;">${c['CLIENTE']||'—'}</td><td style="padding:6px 10px;border-bottom:1px solid #eee;font-size:12px;">${c['Nº CTO']||'—'}</td><td style="padding:6px 10px;border-bottom:1px solid #eee;font-size:12px;">${fmtDataBR(c['VENC.'])}</td>${cons?'':`<td style="padding:6px 10px;border-bottom:1px solid #eee;font-size:12px;">${c['CONSULTOR']||'—'}</td>`}</tr>`).join('')}</tbody></table>` : '<p style="color:#999;font-size:12px;">Nenhum contrato aberto no período.</p>'}
    <div style="margin-top:20px;font-size:11px;color:#999;">Gerado em ${new Date().toLocaleString('pt-BR')} · ${eventos.length} registros</div>
    <script>setTimeout(function(){window.print();},400);<\/script>
    </body></html>`);
  win.document.close();
}

function calcResultados() {
  const ini = (document.getElementById('rt-ini')||{}).value;
  const fim = (document.getElementById('rt-fim')||{}).value;
  const dIni = new Date(ini+'T00:00:00'), dFim = new Date(fim+'T23:59:59');
  const corpo = document.getElementById('rt-corpo');

  const movs = (window._histEtapas||[]).map(e=>({...e,_d:parseDataReaj(e['DATA'])})).filter(e=>e._d&&e._d>=dIni&&e._d<=dFim);
  const temHistorico = movs.length > 0;
  const leadsPeriodo = kanbanLeads.filter(l=>{ const d=parseDataReaj(l['DATA_CONTATO']); return d&&d>=dIni&&d<=dFim; });

  if (!temHistorico) {
    const ativos = kanbanLeads.filter(l=>l['ETAPA']!=='Cobertura');
    const emProposta = ativos.filter(l=>l['ETAPA']==='Proposta Enviada').length;
    const emFechado = ativos.filter(l=>l['ETAPA']==='Fechado').length;
    const emProspec = ativos.filter(l=>{ const e=String(l['ETAPA']).toLowerCase(); return e.includes('prospec')||e.includes('indica'); }).length;
    const emContato = ativos.filter(l=>l['ETAPA']==='Em Contato').length;
    const emDeclinado = ativos.filter(l=>l['ETAPA']==='Declinado').length;
    corpo.innerHTML = `
      <div style="background:var(--amarelo-bg);border-radius:12px;padding:16px;margin-bottom:16px;font-size:13px;color:#8a6d00;line-height:1.6;">
        <i class="ti ti-info-circle"></i> <b>As taxas de conversão por período ainda não estão disponíveis.</b> Elas dependem do registro de movimentação dos cards (de uma etapa para outra), que começa a contar agora que o Apps Script foi republicado. Conforme a equipe arrastar os cards no Funil, as taxas vão aparecer aqui. Por enquanto, mostro a <b>foto atual do funil</b>:
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;">
        <div class="kpi-card" style="border-top:3px solid var(--cinza-500);"><div class="kpi-num" style="color:var(--cinza-600);">${emProspec}</div><div class="kpi-lbl">Em prospecção</div></div>
        <div class="kpi-card" style="border-top:3px solid #185FA5;"><div class="kpi-num" style="color:#185FA5;">${emContato}</div><div class="kpi-lbl">Em contato</div></div>
        <div class="kpi-card" style="border-top:3px solid #BA7517;"><div class="kpi-num" style="color:#BA7517;">${emProposta}</div><div class="kpi-lbl">Proposta enviada</div></div>
        <div class="kpi-card" style="border-top:3px solid var(--verde-ok);"><div class="kpi-num" style="color:var(--verde-ok);">${emFechado}</div><div class="kpi-lbl">Fechado</div></div>
        <div class="kpi-card" style="border-top:3px solid var(--vermelho);"><div class="kpi-num" style="color:var(--vermelho);">${emDeclinado}</div><div class="kpi-lbl">Declinado</div></div>
      </div>`;
    return;
  }

  const totalLeads = leadsPeriodo.length;
  const propostas = movs.filter(m=>m['ETAPA_NOVA']==='Proposta Enviada').length;
  const fechados = movs.filter(m=>m['ETAPA_NOVA']==='Fechado').length;
  const prospParaProp = movs.filter(m=>{ const a=String(m['ETAPA_ANTERIOR']||'').toLowerCase(); return (a.includes('prospec')||a.includes('indica')) && m['ETAPA_NOVA']==='Proposta Enviada'; }).length;
  const totalProspec = leadsPeriodo.filter(l=>{ const e=String(l['ETAPA']).toLowerCase(); return e.includes('prospec')||e.includes('indica'); }).length;

  const pct = (a,b)=> b>0 ? (a/b*100) : 0;
  const taxaLeadProposta  = pct(propostas, totalLeads);
  const taxaPropFechado   = pct(fechados, propostas);
  const taxaProspProposta = pct(prospParaProp, totalProspec);

  function cardTaxa(titulo, num, den, taxa, cor, exemplo) {
    const semBase = den===0;
    return `<div style="background:white;border:1px solid var(--cinza-200);border-radius:12px;padding:20px;border-top:3px solid ${cor};">
      <div style="font-size:13px;color:var(--cinza-600);margin-bottom:8px;">${titulo}</div>
      <div style="font-size:34px;font-weight:700;font-family:var(--fonte-display);color:${semBase?'var(--cinza-400)':cor};">${semBase?'\u2014':taxa.toFixed(1)+'%'}</div>
      <div style="font-size:13px;color:var(--cinza-700);margin-top:4px;">${num} de ${den}</div>
      <div style="font-size:11px;color:var(--cinza-500);margin-top:8px;">${exemplo}</div>
    </div>`;
  }

  corpo.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;">
      ${cardTaxa('Leads \u2192 Proposta enviada', propostas, totalLeads, taxaLeadProposta, 'var(--verde-escuro)', `${propostas} propostas de ${totalLeads} leads novos no período`)}
      ${cardTaxa('Propostas \u2192 Fechamento', fechados, propostas, taxaPropFechado, 'var(--verde-ok)', `${fechados} fechados de ${propostas} propostas no período`)}
      ${cardTaxa('Indicações \u2192 Proposta', prospParaProp, totalProspec, taxaProspProposta, '#BA7517', `${prospParaProp} indicações viraram proposta de ${totalProspec}`)}
    </div>
    <div style="background:white;border:1px solid var(--cinza-200);border-radius:12px;padding:20px;margin-top:18px;">
      <h3 style="font-family:var(--fonte-display);font-size:15px;margin:0 0 14px;">Resumo do período (${fmtDataBR(ini)} a ${fmtDataBR(fim)})</h3>
      <table style="width:100%;font-size:13px;border-collapse:collapse;">
        <tr style="border-bottom:1px solid var(--cinza-100);"><td style="padding:8px 0;color:var(--cinza-700);">Leads novos no período</td><td style="text-align:right;font-weight:600;">${totalLeads}</td></tr>
        <tr style="border-bottom:1px solid var(--cinza-100);"><td style="padding:8px 0;color:var(--cinza-700);">Movidos para "Proposta Enviada"</td><td style="text-align:right;font-weight:600;">${propostas}</td></tr>
        <tr style="border-bottom:1px solid var(--cinza-100);"><td style="padding:8px 0;color:var(--cinza-700);">Movidos para "Fechado"</td><td style="text-align:right;font-weight:600;color:var(--verde-ok);">${fechados}</td></tr>
        <tr><td style="padding:8px 0;color:var(--cinza-700);">Prospecções no período</td><td style="text-align:right;font-weight:600;">${totalProspec}</td></tr>
      </table>
    </div>`;
}

// aplica a etapa escolhida no seletor do card
async function mudarEtapaPeloSeletor(idLead) {
  const sel = document.getElementById('lead-etapa');

  const etapa = sel.value;
  // etapas que abrem um modal próprio (precificação, proposta, motivo) — NÃO fechar a ficha aqui
  const abreModal = (etapa==='Proposta Solicitada' || etapa==='Proposta Enviada' || etapa==='Declinado' || etapa==='Fechado' || etapa==='Cobertura');
  await mudarEtapaLead(idLead, etapa);
  if (!abreModal) fecharFicha();
}

// arquiva (manda pra lixeira) um lead cadastrado errado — só quem tem permissão
async function arquivarLead(idLead, cliente) {
  if (!podeArquivarLead()) return;
  if (!confirm(`Arquivar o lead "${cliente}"?\n\nEle sai do funil e vai para a Lixeira de Leads, de onde pode ser recuperado.`)) return;
  try {
    const resp = await fetch(API_URL, { method:'POST', body: JSON.stringify({
      acao:'arquivarLead', token: sessaoToken, dados:{ idLead: String(idLead), nomeUsuario: usuarioAtual.nome }
    })});
    const r = await resp.json();
    if (!r.ok) { alert('Erro: '+(r.erro||'verifique se o Apps Script foi republicado.')); return; }
    kanbanLeads = (kanbanLeads||[]).filter(l => String(l['ID_LEAD'])!==String(idLead));
    fecharFicha();
    aplicarKanban();
    const av = document.createElement('div');
    av.textContent = 'Lead arquivado (está na Lixeira).';
    av.style.cssText = 'position:fixed;bottom:20px;right:20px;background:var(--verde-escuro);color:white;padding:10px 18px;border-radius:8px;font-size:13px;z-index:9999;';
    document.body.appendChild(av); setTimeout(()=>av.remove(), 2500);
  } catch(e) { alert('Erro de conexão.'); }
}

// salva o consultor reatribuído de um lead (só gestão — ver podeEditarConsultorLead)
async function salvarConsultorLead(idLead) {
  const sel = document.getElementById('lead-consultor');
  if (!sel) return;
  const consultor = sel.value;
  sel.disabled = true;
  try {
    const resp = await fetch(API_URL, { method:'POST', body: JSON.stringify({
      acao:'atualizarConsultorLead', token: sessaoToken, dados:{ idLead: String(idLead), consultor }
    })});
    const r = await resp.json();
    sel.disabled = false;
    if (!r.ok) { alert('Erro: '+(r.erro||'verifique se o Apps Script foi republicado.')); return; }
    const lead = (kanbanLeads||[]).find(l => String(l['ID_LEAD'])===String(idLead));
    if (lead) lead['CONSULTOR'] = consultor;
    aplicarKanban();
    const av = document.createElement('div');
    av.textContent = 'Consultor atualizado!';
    av.style.cssText = 'position:fixed;bottom:20px;right:20px;background:var(--verde-escuro);color:white;padding:10px 18px;border-radius:8px;font-size:13px;z-index:9999;';
    document.body.appendChild(av); setTimeout(()=>av.remove(), 2000);
  } catch(e) { sel.disabled = false; alert('Erro de conexão. Confirme que o Apps Script foi republicado.'); }
}

// carrega as atividades já registradas para este lead/cliente
async function carregarHistoricoLead(cliente, cnpj) {
  const area = document.getElementById('lead-hist');
  if (!area) return;
  try {
    const r = await buscarDados('Atividades_Cliente');
    const todas = r.ok ? r.linhas : [];
    const alvo = String(cnpj||'').replace(/\D/g,'');
    const minhas = todas.filter(a =>
      (alvo && String(a['CNPJ']||'').replace(/\D/g,'')===alvo) ||
      String(a['CLIENTE']||'').toLowerCase()===String(cliente||'').toLowerCase()
    );
    if (!minhas.length) { area.innerHTML = '<div style="font-size:12px;color:var(--cinza-500);padding:8px 0;border-top:1px solid var(--cinza-100);">Nenhuma atividade registrada ainda.</div>'; return; }
    minhas.sort((a,b)=>{ const da=parseDataReaj(a['DATA_REGISTRO']), db=parseDataReaj(b['DATA_REGISTRO']); return (db||0)-(da||0); });
    let html = '<div style="border-top:1px solid var(--cinza-100);padding-top:12px;"><div style="font-size:12px;font-weight:600;color:var(--cinza-600);margin-bottom:8px;">Histórico de atividades</div>';
    minhas.slice(0,20).forEach(a => {
      html += `<div style="padding:8px 10px;background:var(--cinza-100);border-radius:8px;margin-bottom:6px;">
        <div style="font-size:12px;font-weight:600;color:var(--cinza-900);">${a['TIPO']||''} · ${a['TITULO']||''}</div>
        ${a['DESCRICAO']?`<div style="font-size:12px;color:var(--cinza-600);margin-top:2px;">${a['DESCRICAO']}</div>`:''}
        <div style="font-size:11px;color:var(--cinza-500);margin-top:3px;">${fmtDataBR(a['DATA_REGISTRO'])}${a['REGISTRADO_POR']?' · '+a['REGISTRADO_POR']:''}${a['DATA_AGENDADA']?' · agendado p/ '+fmtDataBR(a['DATA_AGENDADA']):''}</div>
      </div>`;
    });
    area.innerHTML = html + '</div>';
  } catch(e) { area.innerHTML = ''; }
}

// ---- Cancelar cliente (move para Cancelados) ----
const MOTIVOS_CANCELAMENTO = ["Preço","Concorrência","Encerramento de atividades","Mudança de endereço","Insatisfação com serviço","Redução de custos","Terceirização","Inadimplência","Fim de contrato","Outros"];
function abrirFormCancelar(cnpj, cliente) {
  const cont = document.getElementById('ficha-container');
  cont.innerHTML = `
    <div class="ficha-overlay" onclick="if(event.target===this)fecharFicha()">
      <div class="ficha" style="width:460px;">
        <div class="ficha-topo" style="background:linear-gradient(135deg,#c53030,#9b2020);">
          <button class="fechar" onclick="fecharFicha()"><i class="ti ti-x"></i></button>
          <div class="nome"><i class="ti ti-circle-x"></i> Cancelar cliente</div><div class="cnpj">${cliente}</div></div>
        <div class="ficha-corpo">
          <div style="background:var(--vermelho-bg);border-radius:8px;padding:10px;margin-bottom:14px;font-size:12.5px;color:var(--vermelho);">
            <i class="ti ti-alert-triangle"></i> O cliente será registrado na aba Cancelamentos com a data e o motivo. Os dados do contrato são herdados automaticamente.
          </div>
          <div style="margin-bottom:12px;"><label style="font-size:13px;color:var(--cinza-700);display:block;margin-bottom:5px;">Data do cancelamento *</label>
            <input type="date" id="cc-data" style="width:100%;padding:9px;border:1.5px solid var(--cinza-300);border-radius:8px;"></div>
          <div style="margin-bottom:12px;"><label style="font-size:13px;color:var(--cinza-700);display:block;margin-bottom:5px;">Motivo *</label>
            <select id="cc-motivo" style="width:100%;padding:9px;border:1.5px solid var(--cinza-300);border-radius:8px;"><option value="">— selecione —</option>${MOTIVOS_CANCELAMENTO.map(m=>`<option>${m}</option>`).join('')}</select></div>
          <div style="margin-bottom:12px;"><label style="font-size:13px;color:var(--cinza-700);display:block;margin-bottom:5px;">Observação (opcional)</label>
            <textarea id="cc-obs" rows="2" style="width:100%;padding:9px;border:1.5px solid var(--cinza-300);border-radius:8px;font-family:var(--fonte-corpo);"></textarea></div>
          <div style="border-top:1px solid var(--cinza-200);padding-top:12px;margin-bottom:12px;font-size:12px;font-weight:600;color:var(--cinza-600);">Dados da rescisão (opcional)</div>
          <div style="margin-bottom:12px;"><label style="font-size:13px;color:var(--cinza-700);display:block;margin-bottom:5px;">Quem enviou a rescisão</label>
            <input type="text" id="cc-quem" placeholder="nome da pessoa do cliente" style="width:100%;padding:9px;border:1.5px solid var(--cinza-300);border-radius:8px;"></div>
          <div style="margin-bottom:12px;"><label style="font-size:13px;color:var(--cinza-700);display:block;margin-bottom:5px;">Assunto / nome do e-mail recebido</label>
            <input type="text" id="cc-assunto" placeholder="ex: Rescisão contrato - Cliente X" style="width:100%;padding:9px;border:1.5px solid var(--cinza-300);border-radius:8px;"></div>
          <div style="margin-bottom:14px;"><label style="font-size:13px;color:var(--cinza-700);display:block;margin-bottom:5px;">Texto do e-mail</label>
            <textarea id="cc-emailtexto" rows="4" placeholder="cole aqui o conteúdo do e-mail de rescisão" style="width:100%;padding:9px;border:1.5px solid var(--cinza-300);border-radius:8px;font-family:var(--fonte-corpo);"></textarea></div>
          <div class="ficha-botoes">
            <button class="ficha-btn-primario" style="background:var(--vermelho);" onclick="salvarCancelamento('${cnpj.replace(/'/g,'')}','${cliente.replace(/'/g,'')}')"><i class="ti ti-check"></i> Confirmar cancelamento</button>
            <button class="ficha-btn-secundario" onclick="fecharFicha()">Voltar</button>
          </div>
          <div id="cc-msg"></div>
        </div>
      </div>
    </div>`;
}
async function salvarCancelamento(cnpj, cliente) {
  const dataCancelamento = document.getElementById('cc-data').value;
  const motivoSel = document.getElementById('cc-motivo').value;
  const obs = document.getElementById('cc-obs').value;
  if (!dataCancelamento) { document.getElementById('cc-msg').innerHTML='<div class="sem-acesso" style="margin-top:10px;">Informe a data do cancelamento.</div>'; return; }
  if (!motivoSel) { document.getElementById('cc-msg').innerHTML='<div class="sem-acesso" style="margin-top:10px;">Escolha o motivo.</div>'; return; }
  const motivo = obs ? `${motivoSel} — ${obs}` : motivoSel;
  const rescisaoQuem = (document.getElementById('cc-quem')||{}).value || '';
  const rescisaoAssunto = (document.getElementById('cc-assunto')||{}).value || '';
  const rescisaoTexto = (document.getElementById('cc-emailtexto')||{}).value || '';
  document.getElementById('cc-msg').innerHTML = '<div style="text-align:center;padding:10px;color:var(--cinza-500);">Registrando...</div>';
  try {
    const resp = await fetch(API_URL, { method:'POST', body: JSON.stringify({
      acao:'cancelarCliente', token: sessaoToken,
      dados:{ cnpj, cliente, dataCancelamento, motivo, rescisaoQuem, rescisaoAssunto, rescisaoTexto, consultor: (fichaClienteAtual&&fichaClienteAtual['CONSULTOR'])||'' }
    })});
    const r = await resp.json();
    if (!r.ok) { document.getElementById('cc-msg').innerHTML=`<div class="sem-acesso">${r.erro}</div>`; return; }
    cacheCanc = null;
    document.getElementById('cc-msg').innerHTML = '<div style="background:var(--verde-ok-bg);border-radius:8px;padding:10px;margin-top:10px;color:var(--verde-ok);font-size:13px;"><i class="ti ti-circle-check"></i> Cliente cancelado e registrado na aba Cancelamentos.</div>';
    setTimeout(fecharFicha, 1800);
  } catch(e) { document.getElementById('cc-msg').innerHTML='<div class="sem-acesso">Erro de conexão.</div>'; }
}

// ---- Retomar sessão ao abrir ----
checarSessao();
