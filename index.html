// itens de precificação (Roberto pode precificar serviço por serviço)
function addItemPreco(descInicial) {
  const cont = document.getElementById('pr-itens');
  if (!cont) return;
  const idx = (window._itensPreco = window._itensPreco || []).length;
  window._itensPreco.push(idx);
  const div = document.createElement('div');
  div.id = 'pr-item-'+idx;
  div.style.cssText = 'display:flex;gap:6px;margin-bottom:8px;align-items:center;';
  div.innerHTML = `
    <input type="text" id="pri-desc-${idx}" value="${(descInicial||'').replace(/"/g,'&quot;')}" placeholder="descrição do serviço/item" style="flex:1;padding:8px;border:1.5px solid var(--cinza-300);border-radius:8px;font-size:12.5px;">
    <input type="text" id="pri-val-${idx}" oninput="recalcTotalPreco()" placeholder="R$" style="width:110px;padding:8px;border:1.5px solid var(--cinza-300);border-radius:8px;font-size:12.5px;">
    <button onclick="document.getElementById('pr-item-${idx}').remove();recalcTotalPreco();" style="border:none;background:none;color:var(--vermelho);cursor:pointer;font-size:16px;" title="Remover"><i class="ti ti-trash"></i></button>`;
  cont.appendChild(div);
}
function parseValor(s){ return parseFloat(String(s||'').replace(/[^\d,.-]/g,'').replace(/\./g,'').replace(',','.'))||0; }
function recalcTotalPreco() {
  let total = 0;
  document.querySelectorAll('[id^="pri-val-"]').forEach(inp => total += parseValor(inp.value));
  const el = document.getElementById('pr-total');
  if (el) el.textContent = fmtMoeda(total);
}
async function enviarRespostaPreco(id) {
  // soma os itens precificados
  let total = 0; const detalhes = [];
  document.querySelectorAll('[id^="pr-item-"]').forEach(div => {
    const i = div.id.replace('pr-item-','');
    const d = (document.getElementById('pri-desc-'+i)||{}).value || '';
    const v = parseValor((document.getElementById('pri-val-'+i)||{}).value);
    if (v > 0) { total += v; detalhes.push(`${d||'item'}: ${fmtMoeda(v)}`); }
  });
  const obsManual = document.getElementById('rp-obs').value;
  if (total <= 0) { document.getElementById('rp-msg').innerHTML='<div class="sem-acesso" style="margin-top:10px;">Informe ao menos um item com valor.</div>'; return; }
  const preco = total;
  const obs = (detalhes.length>1 ? 'Itens — '+detalhes.join(' · ')+'. ' : '') + (obsManual||'');
  document.getElementById('rp-msg').innerHTML = '<div style="text-align:center;padding:10px;color:var(--cinza-500);">Enviando...</div>';
  try {
    const resp = await fetch(API_URL, { method:'POST', body: JSON.stringify({
      acao:'responderPreco', token: sessaoToken, dados:{ id, preco, obs }
    })});
    const r = await resp.json();
    if (!r.ok) { document.getElementById('rp-msg').innerHTML=`<div class="sem-acesso">${r.erro}</div>`; return; }
    document.getElementById('rp-msg').innerHTML = '<div style="background:var(--verde-ok-bg);border-radius:8px;padding:10px;margin-top:10px;color:var(--verde-ok);font-size:13px;"><i class="ti ti-circle-check"></i> Preço enviado! O vendedor e a Danielly verão.</div>';
    setTimeout(()=>{ fecharFicha(); renderPrecificacao(document.getElementById('area-conteudo')); }, 1800);
  } catch(e) { document.getElementById('rp-msg').innerHTML='<div class="sem-acesso">Erro de conexão.</div>'; }
}

function filtrarLeadsRelatorio() {
  const cons = document.getElementById('rf-consultor').value;
  const sit = document.getElementById('rf-situacao').value;
  const de = document.getElementById('rf-de').value;
  const ate = document.getElementById('rf-ate').value;
  const dDe = de ? new Date(de+'T00:00:00') : null;
  const dAte = ate ? new Date(ate+'T23:59:59') : null;
  let lista = (kanbanLeads||[]).slice();
  if (cons) lista = lista.filter(l => l['CONSULTOR']===cons);
  if (sit) lista = lista.filter(l => (l['ETAPA']||'')===sit);
  if (dDe || dAte) lista = lista.filter(l => { const d = parseDataReaj(l['DATA_CONTATO']); if(!d) return false; if(dDe&&d<dDe) return false; if(dAte&&d>dAte) return false; return true; });
  // ordena por situação e cliente
  lista.sort((a,b)=> String(a['ETAPA']||'').localeCompare(String(b['ETAPA']||'')) || String(a['CLIENTE']||'').localeCompare(String(b['CLIENTE']||'')));
  return lista;
}

function rotEtapa(e){ return e==='Indicação/Prospecção' ? 'Pendente' : (e||'—'); }

  if (t.length < 2) { box.style.display='none'; return; }
  const achados = (cacheClientes||[]).filter(c => String(c['CLIENTE']||'').toLowerCase().includes(t)).slice(0, 20);
  if (!achados.length) { box.innerHTML='<div style="padding:8px;font-size:12px;color:var(--cinza-500);">Nenhum cliente encontrado.</div>'; box.style.display='block'; return; }
  box.innerHTML = achados.map(c=>`<div onclick="selecionarClienteLead('${(c['CNPJ']||'').replace(/'/g,'')}','${(c['CLIENTE']||'').replace(/'/g,"\\'")}')" style="padding:8px 10px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--cinza-100);" onmouseover="this.style.background='var(--cinza-100)'" onmouseout="this.style.background='white'"><b>${c['CLIENTE']}</b><br><span style="font-size:11px;color:var(--cinza-500);">${c['CNPJ']||''}${c['CONSULTOR']?' · '+c['CONSULTOR']:''}</span></div>`).join('');
  box.style.display='block';
}

async function salvarLead() {
  const cliente = document.getElementById('nl-cliente').value;
  if (!cliente) { document.getElementById('nl-msg').innerHTML='<div class="sem-acesso" style="margin-top:10px;">Informe o cliente.</div>'; return; }
  const cnpj = (document.getElementById('nl-cnpj')||{}).value || '';
  const cnpjL = cnpj.replace(/\D/g,'');

  // checagem de duplicidade: carregar todos os leads (sem filtro de dono, pois prospecção é compartilhada)
  let todos = [];
  try { const rt = await buscarDados('CRM_Leads'); todos = rt.ok ? rt.linhas : []; } catch(e) {}
  const ehRecompraCliente = document.getElementById('nl-fonte').value === 'Cliente';
  // 1) CNPJ igual -> BLOQUEIA (não deixa prospectar o mesmo cliente)
  //    EXCEÇÃO: fonte "Cliente" é recompra de um cliente que já existe — aí é permitido.
  if (cnpjL && !ehRecompraCliente) {
    const jaExiste = todos.find(l => String(l['CNPJ']||'').replace(/\D/g,'') === cnpjL);
    if (jaExiste) {
      document.getElementById('nl-msg').innerHTML = `<div class="sem-acesso" style="margin-top:10px;"><i class="ti ti-ban"></i> Já existe um lead com este CNPJ: <b>${jaExiste['CLIENTE']}</b> (consultor: ${jaExiste['CONSULTOR']||'—'}). Não é possível prospectar o mesmo cliente.</div>`;
      return;
    }
  }
  // se é recompra, também não avisa sobre nome parecido (é esperado que exista)
  if (!ehRecompraCliente) {
  // 2) nome parecido (de outro consultor) -> AVISA mas deixa criar
  const norm = s => String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9 ]/g,'').trim();
  const nc = norm(cliente);
  const parecido = todos.find(l => { const ln = norm(l['CLIENTE']); return ln && (ln.includes(nc) || nc.includes(ln)) && nc.length>4; });
  if (parecido && !window._avisouParecido) {
    window._avisouParecido = true;
    document.getElementById('nl-msg').innerHTML = `<div style="background:var(--amarelo-bg);border-radius:8px;padding:10px;margin-top:10px;color:#8a6d00;font-size:13px;"><i class="ti ti-alert-triangle"></i> Atenção: já existe um lead parecido — <b>${parecido['CLIENTE']}</b> (consultor: ${parecido['CONSULTOR']||'—'}). Se for o mesmo cliente, alinhe com o colega. Clique em "Criar lead" de novo para confirmar.</div>`;
    return;
  }
  window._avisouParecido = false;
  } // fim do if (!ehRecompraCliente)

  const ehCobertura = document.getElementById('nl-cobertura').value==='sim';
  const campos = {
    'CLIENTE': cliente, 'CNPJ': cnpj, 'ETAPA': ehCobertura ? 'Cobertura' : document.getElementById('nl-etapa').value,
    'CONSULTOR': (document.getElementById('nl-consultor')||{}).value || usuarioAtual.nome, 'FONTE': document.getElementById('nl-fonte').value,
    'CONTA_INDICADORES': ehCobertura ? 'Não' : 'Sim', 'DATA_CONTATO': (document.getElementById('nl-data') && document.getElementById('nl-data').value) ? fmtDataBR(document.getElementById('nl-data').value) : fmtDataBR(new Date().toISOString()),
    'RESPONSAVEL': document.getElementById('nl-resp').value, 'EMAIL': document.getElementById('nl-email').value,
    'TELEFONE': document.getElementById('nl-tel').value,
    'EMPRESA_COLETA_ATUAL': document.getElementById('nl-transp').value,
    'ENDERECO': (document.getElementById('nl-endereco')||{}).value || '',
    'CEP': (document.getElementById('nl-cep')||{}).value || '',
    'FREQUENCIA': (document.getElementById('nl-freq')||{}).value || '',
    'RESIDUO': (document.getElementById('nl-residuo')||{}).value || '',
    'CATEGORIA_RESIDUO': (document.getElementById('nl-acond')||{}).value || '',
    'OBSERVACOES': document.getElementById('nl-obs').value,
    'INFO_ADICIONAL': (document.getElementById('nl-infoadd')||{}).value || '',
    'NOVO': 'Sim'
  };
  document.getElementById('nl-msg').innerHTML = '<div style="text-align:center;padding:10px;color:var(--cinza-500);">Criando...</div>';
  try {
    const resp = await fetch(API_URL, { method:'POST', body: JSON.stringify({ acao:'novoLead', token: sessaoToken, dados:{ campos } })});
    const r = await resp.json();
    if (!r.ok) { document.getElementById('nl-msg').innerHTML=`<div class="sem-acesso">${r.erro}</div>`; return; }
    // se é recompra (fonte Cliente), registra no histórico do cliente (aparece nas tratativas da ficha)
    if (ehRecompraCliente) {
      try {
        await fetch(API_URL, { method:'POST', body: JSON.stringify({
          acao:'registrarAtividade', token: sessaoToken,
          dados:{ cnpj: cnpj||'', cliente, tipo:'Recompra', titulo:'Novo lead de recompra (fonte: Cliente)',
            descricao: `Lead de recompra criado. Etapa: ${campos['ETAPA']}. Consultor: ${campos['CONSULTOR']}.` + (campos['OBSERVACOES']?(' Obs: '+campos['OBSERVACOES']):''),
            registradoPor: usuarioAtual.nome }
        })});
      } catch(e) { /* não bloqueia a criação do lead se o registro falhar */ }
    }
    const etapaEscolhida = campos['ETAPA'];
    kanbanLeads = null; // forçar recarga
    document.getElementById('nl-msg').innerHTML = '<div style="background:var(--verde-ok-bg);border-radius:8px;padding:10px;margin-top:10px;color:var(--verde-ok);font-size:13px;"><i class="ti ti-circle-check"></i> Lead criado!</div>';
    // se foi criado já como Declinado, abre o modal de motivo de perda
    if (etapaEscolhida === 'Declinado') {
      await carregarLeads(true);
      const novo = (kanbanLeads||[]).find(l => String(l['CLIENTE'])===String(cliente));
      fecharFicha();
      renderKanban(document.getElementById('area-conteudo'));
      if (novo) setTimeout(()=>abrirModalMotivoPerda(novo['ID_LEAD']), 400);
      return;
    }
    setTimeout(()=>{ fecharFicha(); renderKanban(document.getElementById('area-conteudo')); }, 1500);
  } catch(e) { document.getElementById('nl-msg').innerHTML='<div class="sem-acesso">Erro de conexão.</div>'; }
}

let cacheContratos = null;
async function renderContratos(area) {
  area.innerHTML = `<div class="placeholder"><i class="ti ti-loader"></i><h2>Carregando contratos...</h2></div>`;
  const r = await buscarDados('Contratos');
  let lista = r.ok ? r.linhas : [];
  // preencher consultor faltante cruzando com RGG/SIGOR por CNPJ (dono vem da planilha SP Regula/MTR)
  if (!cacheRGG) { const rr = await buscarDados('Clientes_RGG'); cacheRGG = rr.ok?rr.linhas:[]; }
  if (!cacheSIGOR) { const rs = await buscarDados('SIGOR'); cacheSIGOR = rs.ok?rs.linhas:[]; }
  const mapaCons = {};
  [...cacheRGG, ...cacheSIGOR].forEach(d => { const c = String(d['CNPJ']||'').replace(/\D/g,''); if (c && d['CONSULTOR']) mapaCons[c] = d['CONSULTOR']; });
  lista.forEach(ct => { if (!ct['CONSULTOR'] || !String(ct['CONSULTOR']).trim()) { const c = String(ct['CNPJ']||'').replace(/\D/g,''); if (mapaCons[c]) ct['CONSULTOR'] = mapaCons[c]; } });
  // filtro da CARTEIRA: vendedoras + Danielly + Rogério veem só os próprios contratos
  if (veSomenteProprios_Carteira()) lista = lista.filter(l => ehMeuRegistro(l['CONSULTOR']));
  cacheContratos = lista;
  area.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;">
      <div class="barra-busca" style="flex:1;margin-bottom:0;min-width:240px;">
        <i class="ti ti-search"></i><input type="text" id="ctr-busca" placeholder="Buscar contrato por cliente..." oninput="filtraContratos()">
        <span class="contagem">${lista.length} contratos</span>
      </div>
      <button class="btn-importar" onclick="abrirFormContrato()"><i class="ti ti-plus"></i> Novo contrato</button>
    </div>
    <div class="filtros">
      <span class="filtro-chip ativo" id="cf-todos" onclick="setFiltroContrato('todos',this)">Todos</span>
      <span class="filtro-chip" id="cf-vencer" onclick="setFiltroContrato('vencer',this)">Próximos de vencer (90d)</span>
      <span class="filtro-chip" id="cf-semauto" onclick="setFiltroContrato('semauto',this)">Sem renovação automática</span>
      <span class="filtro-chip" id="cf-vencidos" onclick="setFiltroContrato('vencidos',this)">Vencidos</span>
    </div>
    <div id="ctr-resultado"></div>`;
  window._filtroContrato = 'todos';
  filtraContratos();
}
function setFiltroContrato(f, el) { window._filtroContrato=f; document.querySelectorAll('[id^="cf-"]').forEach(c=>c.classList.remove('ativo')); if(el)el.classList.add('ativo'); filtraContratos(); }
function filtraContratos() {
  const termo = ((document.getElementById('ctr-busca')||{}).value||'').toLowerCase();
  const f = window._filtroContrato || 'todos';
  // vencimento EFETIVO: se há aditivo com novo vencimento, ele manda; senão o vencimento original.
  // (antes olhava só o 'VENC.' e por isso o contrato seguia vencido mesmo com aditivo)
  function vencEfetivo(c) {
    return c['VIGENCIA_ATUALIZADA'] || c['VENC. ADITIVO'] || c['VENC.'] || '';
  }
  function diasVenc(c) { const d = parseDataReaj(vencEfetivo(c)); return d ? Math.round((d-Date.now())/(1000*60*60*24)) : null; }
  function semAuto(c) { const r = String(c['RENOVAÇÃO AUTOMÁTICA']||'').toLowerCase(); return !r.includes('sim') && !r.includes('aut'); }
  let lista = cacheContratos.filter(c => !termo || String(c['CLIENTE']||'').toLowerCase().includes(termo));
  if (f==='vencer') lista = lista.filter(c => { const d=diasVenc(c); return d!=null && d>=0 && d<=90; });
  else if (f==='vencidos') lista = lista.filter(c => { const d=diasVenc(c); return d!=null && d<0; });
  else if (f==='semauto') lista = lista.filter(c => semAuto(c));
  lista.sort((a,b)=>{ const da=diasVenc(a), db=diasVenc(b); return (da==null?99999:da)-(db==null?99999:db); });
  const res = document.getElementById('ctr-resultado');
  if (!lista.length) { res.innerHTML = '<div class="sem-acesso">Nenhum contrato encontrado.</div>'; return; }
  let html = '<div class="grid-cards">';
  lista.slice(0,150).forEach(c => {
    const d = diasVenc(c);
    const temAditivo = !!(c['VIGENCIA_ATUALIZADA'] || c['VENC. ADITIVO']);
    const urgente = semAuto(c) && d!=null && d<=90;
    const venceLogo = d!=null && d>=0 && d<=90;
    const vencido = d!=null && d<0;
    const cardCls = vencido?'cancelado':urgente?'':'ativo-status';
    html += `<div class="card-cli ${cardCls}" onclick="abrirFicha('${String(c['CNPJ']||'').replace(/'/g,'')}')" style="${urgente?'border:1.5px solid var(--laranja);':''}">
      <div class="card-cli-topo">
        <div class="card-cli-avatar" style="${urgente?'background:var(--laranja);':''}">${iniciais(c['CLIENTE'])}</div>
        <div style="min-width:0;"><div class="card-cli-nome">${c['CLIENTE']||'—'}</div><div class="card-cli-cnpj">Contrato ${c['Nº CTO']||'—'}</div></div>
      </div>
      <div class="card-cli-tags">
        ${urgente?`<span class="tag" style="background:var(--laranja-bg);color:var(--laranja);"><i class="ti ti-alert-triangle"></i> Urgência</span>`:''}
        ${vencido?`<span class="tag" style="background:var(--vermelho-bg);color:var(--vermelho);">Vencido</span>`:venceLogo?`<span class="tag" style="background:var(--amarelo-bg);color:var(--amarelo);">Vence em ${d}d</span>`:''}
        ${temAditivo?`<span class="tag" style="background:var(--verde-claro-bg);color:var(--verde-escuro);"><i class="ti ti-file-plus"></i> Com aditivo</span>`:''}
        ${semAuto(c)?`<span class="tag tag-eventual">Sem renov. auto</span>`:`<span class="tag tag-contrato">Renov. automática</span>`}
        ${c['ÍNDICE']?`<span class="tag tag-grupo">${c['ÍNDICE']}</span>`:''}
      </div>
      <div class="card-cli-linha borda"><span>Vencimento${temAditivo?' (aditivo)':''}</span><b>${fmtDataBR(vencEfetivo(c))}</b></div>
      <div class="card-cli-linha"><span>Consultor</span><span>${c['CONSULTOR']||'—'}</span></div>
    </div>`;
  });
  res.innerHTML = html + '</div>';
}

    })});
    const r = await resp.json();
    if (!r.ok) { alert('Erro: '+(r.erro||'ação não reconhecida — verifique se o Apps Script foi republicado com a versão mais nova.')); return; }
    // atualizar cache local
    cacheClientes = null;

    abrirFormContrato(cliente, cnpj);

}

async function renderAgenda(area, viewInicial) {

  // filtro de vendedor (Mafe/Danielly/Roberto/Rogério veem todos; vendedor vê só os seus)
  const podeFiltrar = ['admin','diretor','supervisor','assistente'].includes(usuarioAtual.perfil);
  const consultores = [...new Set(cacheAgenda.map(a=>a['REGISTRADO_POR']).filter(Boolean))];

  area.innerHTML = `
    <div class="ag-toolbar">
      <div class="ag-nav">
        <button onclick="agNavegar(-1)"><i class="ti ti-chevron-left"></i></button>
        <button onclick="agHoje()" style="width:auto;padding:0 12px;font-size:13px;">Hoje</button>
        <button onclick="agNavegar(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div class="ag-titulo" id="ag-titulo"></div>
      <div class="ag-views" style="margin-left:auto;">
        <button class="${agView==='mes'?'ativo':''}" onclick="agSetView('mes')">Mês</button>
        <button class="${agView==='semana'?'ativo':''}" onclick="agSetView('semana')">Semana</button>
        <button class="${agView==='dia'?'ativo':''}" onclick="agSetView('dia')">Dia</button>
      </div>
      ${podeFiltrar?`<select class="filtro-sel" id="ag-vendedor" onchange="agFiltrar()"><option value="">Todos</option>${consultores.map(c=>`<option ${c===agFiltroVendedor?'selected':''}>${c}</option>`).join('')}</select>`:''}
      <button class="btn-importar" onclick="abrirFormCompromisso()"><i class="ti ti-plus"></i> Compromisso</button>
    </div>
    <div id="ag-corpo"></div>`;
  agRender();
}

function agFiltrar() { agFiltroVendedor = (document.getElementById('ag-vendedor')||{}).value||''; agRender(); }
function agSetView(v) { agView = v; document.querySelectorAll('.ag-views button').forEach(b=>b.classList.toggle('ativo', b.textContent.toLowerCase()===(v==='mes'?'mês':v))); agRender(); }
function agNavegar(dir) {
  if (agView==='mes') agData.setMonth(agData.getMonth()+dir);
  else if (agView==='semana') agData.setDate(agData.getDate()+7*dir);
  else agData.setDate(agData.getDate()+dir);
  agData = new Date(agData); agRender();
}
function agHoje() { agData = new Date(); agRender(); }

function agEventos() {
  let evs = cacheAgenda.map(a => ({...a, _d: parseDataReaj(a['DATA_AGENDADA'])})).filter(a=>a._d);
  if (veSomenteProprios()) evs = evs.filter(a => ehMeuRegistro(a['REGISTRADO_POR']));
  else if (agFiltroVendedor) evs = evs.filter(a => a['REGISTRADO_POR']===agFiltroVendedor);
  return evs;
}
function classeEv(tipo) { const t=String(tipo||'').toLowerCase(); if(t.includes('visita'))return 'visita'; if(t.includes('reuni'))return 'reuniao'; return ''; }

const MESES_PT = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
const DOW_PT = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

function agRender() {
  const titulo = document.getElementById('ag-titulo');
  const corpo = document.getElementById('ag-corpo');
  const evs = agEventos();
  if (agView === 'mes') {
    titulo.textContent = MESES_PT[agData.getMonth()] + ' ' + agData.getFullYear();
    corpo.innerHTML = agRenderMes(evs);
  } else if (agView === 'semana') {
    const ini = new Date(agData); ini.setDate(ini.getDate()-ini.getDay());
    const fim = new Date(ini); fim.setDate(fim.getDate()+6);
    titulo.textContent = `${ini.getDate()}/${ini.getMonth()+1} – ${fim.getDate()}/${fim.getMonth()+1}`;
    corpo.innerHTML = agRenderLista(evs, ini, fim);
  } else {
    titulo.textContent = `${agData.getDate()} de ${MESES_PT[agData.getMonth()]}`;
    const d0 = new Date(agData); d0.setHours(0,0,0,0);
    const d1 = new Date(agData); d1.setHours(23,59,59,999);
    corpo.innerHTML = agRenderLista(evs, d0, d1);
  }
}

function agRenderMes(evs) {
  const ano = agData.getFullYear(), mes = agData.getMonth();
  const primeiro = new Date(ano, mes, 1);
  const inicio = new Date(primeiro); inicio.setDate(1 - primeiro.getDay());
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  let html = '<div class="ag-grid-mes">';
  DOW_PT.forEach(d => html += `<div class="ag-dow">${d}</div>`);
  let cur = new Date(inicio);
  for (let i=0;i<42;i++) {
    const fora = cur.getMonth()!==mes;
    const ehHoje = cur.getTime()===hoje.getTime();
    const doDia = evs.filter(e => e._d.getDate()===cur.getDate() && e._d.getMonth()===cur.getMonth() && e._d.getFullYear()===cur.getFullYear());
    html += `<div class="ag-dia ${fora?'fora':''} ${ehHoje?'hoje':''}">
      <div class="num">${cur.getDate()}</div>
      ${doDia.slice(0,3).map(e=>`<div class="ag-ev ${classeEv(e['TIPO'])}" title="${e['TITULO']||''}">${e['CLIENTE']||e['TITULO']||'evento'}</div>`).join('')}
      ${doDia.length>3?`<div style="font-size:10px;color:var(--cinza-500);margin-top:2px;">+${doDia.length-3}</div>`:''}
    </div>`;
    cur.setDate(cur.getDate()+1);
  }
  html += '</div>';
  return html;
}

function agRenderLista(evs, ini, fim) {
  const doPeriodo = evs.filter(e => e._d>=ini && e._d<=fim).sort((a,b)=>a._d-b._d);
  if (!doPeriodo.length) return `<div class="sem-acesso" style="background:var(--verde-claro-bg);border-color:var(--verde-claro);color:var(--verde-escuro);"><i class="ti ti-calendar-off"></i> Nenhum compromisso neste período.</div>`;
  // agrupar por dia
  let html = '';
  let diaAtual = '';
  doPeriodo.forEach(e => {
    const dia = `${e._d.getDate()}/${e._d.getMonth()+1} (${DOW_PT[e._d.getDay()]})`;
    if (dia !== diaAtual) { html += `<div style="font-weight:600;color:var(--cinza-700);margin:14px 0 8px;font-size:14px;">${dia}</div>`; diaAtual = dia; }
    const cls = classeEv(e['TIPO']);
    html += `<div class="ag-lista-item" style="${cls==='visita'?'border-left-color:#185fa5;':cls==='reuniao'?'border-left-color:#ba7517;':''}">
      <div class="ag-hora"><i class="ti ti-${cls==='visita'?'map-pin':cls==='reuniao'?'users':'point'}"></i> ${e['TIPO']||'Atividade'}</div>
      <div style="flex:1;">
        <div style="font-weight:600;color:var(--cinza-900);font-size:14px;">${e['CLIENTE']||e['TITULO']||'—'}</div>
        ${e['TITULO']?`<div style="font-size:13px;color:var(--cinza-700);">${e['TITULO']}</div>`:''}
        ${e['DESCRICAO']?`<div style="font-size:12px;color:var(--cinza-500);margin-top:2px;">${e['DESCRICAO']}</div>`:''}
        <div style="font-size:11px;color:var(--cinza-500);margin-top:3px;">${e['REGISTRADO_POR']||''} ${String(e['STATUS'])==='Pendente'?'· <span style="color:var(--laranja);">pendente</span>':'· <span style="color:var(--verde-ok);">ok</span>'}</div>
      </div>
    </div>`;
  });
  return html;
}

function abrirFormCompromisso() {

          <div style="margin-bottom:12px;"><label style="font-size:13px;color:var(--cinza-700);">Cliente</label>
            <input type="text" id="cp-cliente" list="cp-lista" style="width:100%;padding:9px;border:1.5px solid var(--cinza-300);border-radius:8px;">

            <input type="date" id="cp-data" style="width:100%;padding:9px;border:1.5px solid var(--cinza-300);border-radius:8px;"></div>

            <button class="ficha-btn-primario" onclick="salvarCompromisso()"><i class="ti ti-check"></i> Agendar</button>
            <button class="ficha-btn-secundario" onclick="fecharFicha()">Cancelar</button>
          </div>

}
async function salvarCompromisso() {
  const tipo = document.getElementById('cp-tipo').value;
  const cliente = document.getElementById('cp-cliente').value;
  const data = document.getElementById('cp-data').value;
  const titulo = document.getElementById('cp-titulo').value;
  if (!data) { document.getElementById('cp-msg').innerHTML='<div class="sem-acesso" style="margin-top:10px;">Informe a data.</div>'; return; }
  const c = (cacheClientes||[]).find(x=>String(x['CLIENTE'])===cliente);
  document.getElementById('cp-msg').innerHTML = '<div style="text-align:center;padding:10px;color:var(--cinza-500);">Agendando...</div>';
  try {
    const resp = await fetch(API_URL, { method:'POST', body: JSON.stringify({
      acao:'registrarAtividade', token: sessaoToken,
      dados:{ cnpj: c?c['CNPJ']:'', cliente, tipo, titulo, descricao:'', dataAgendada: data, registradoPor: usuarioAtual.nome }
    })});
    const r = await resp.json();
    if (!r.ok) { document.getElementById('cp-msg').innerHTML=`<div class="sem-acesso">${r.erro}</div>`; return; }
    cacheAgenda = null;
    document.getElementById('cp-msg').innerHTML = '<div style="background:var(--verde-ok-bg);border-radius:8px;padding:10px;margin-top:10px;color:var(--verde-ok);font-size:13px;"><i class="ti ti-circle-check"></i> Compromisso agendado!</div>';
    setTimeout(()=>{ fecharFicha(); renderAgenda(document.getElementById('area-conteudo')); }, 1500);
  } catch(e) { document.getElementById('cp-msg').innerHTML='<div class="sem-acesso">Erro de conexão.</div>'; }
}

async function renderPropostas(area) {
  area.innerHTML = `<div class="placeholder"><i class="ti ti-loader"></i><h2>Carregando propostas...</h2></div>`;
  await carregarLeads();
  // propostas = leads com proposta enviada ou nº/valor de proposta
  const props = kanbanLeads.filter(l => l['ETAPA']==='Proposta Enviada' || l['N_PROPOSTA'] || l['VALOR_R$']);
  function valorNum(v){ if(v==null||v==='')return 0; if(typeof v==='number')return v; let s=String(v).replace(/[^\d,.-]/g,''); if(s.includes(',')&&s.lastIndexOf(',')>s.lastIndexOf('.'))s=s.replace(/\./g,'').replace(',','.'); const n=parseFloat(s); return isNaN(n)?0:n; }
  const totalPropostas = props.reduce((s,l)=>s+valorNum(l['VALOR_R$']),0);
  const fechadas = kanbanLeads.filter(l=>l['ETAPA']==='Fechado');

  let html = `
    <div class="kpi-funil" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));">
      <div class="kpi-card" style="border-top:3px solid #BA7517;"><div class="kpi-num" style="color:#BA7517;">${props.length}</div><div class="kpi-lbl">Propostas enviadas</div></div>
      <div class="kpi-card" style="border-top:3px solid var(--verde-escuro);"><div class="kpi-num" style="font-size:20px;color:var(--verde-escuro);">${fmtMoeda(totalPropostas)}</div><div class="kpi-lbl">Valor em propostas</div></div>
      <div class="kpi-card" style="border-top:3px solid var(--verde-ok);"><div class="kpi-num" style="color:var(--verde-ok);">${fechadas.length}</div><div class="kpi-lbl">Fechadas</div></div>
    </div>
    <div class="barra-busca" style="margin-top:16px;"><i class="ti ti-search"></i><input type="text" id="prop-busca" placeholder="Buscar por cliente ou nº da proposta..." oninput="filtraPropostas()"><span class="contagem">${props.length} propostas</span></div>
    <div id="prop-res"></div>`;
  area.innerHTML = html;
  window._propostas = props;
  filtraPropostas();
}
function filtraPropostas() {
  const termo = ((document.getElementById('prop-busca')||{}).value||'').toLowerCase();
  let lista = (window._propostas||[]).filter(l=>!termo || String(l['CLIENTE']||'').toLowerCase().includes(termo) || String(l['N_PROPOSTA']||'').toLowerCase().includes(termo));
  const res = document.getElementById('prop-res');
  if (!lista.length) { res.innerHTML='<div class="sem-acesso">Nenhuma proposta encontrada.</div>'; return; }
  let html = '<div class="grid-cards">';
  lista.slice(0,150).forEach(l => {
    html += `<div class="reaj-card r60" style="cursor:default;border-left-color:#BA7517;">
      <div class="reaj-topo"><div style="min-width:0;"><div class="reaj-nome">${l['CLIENTE']||'—'}</div><div class="reaj-cnpj">${l['CONSULTOR']||''}${l['N_PROPOSTA']?' · proposta '+l['N_PROPOSTA']:''}</div></div>
      ${l['VALOR_R$']?`<span class="reaj-pill" style="background:#FAEEDA;color:#BA7517;">${fmtMoeda(l['VALOR_R$'])}</span>`:''}</div>
      <div class="reaj-linhas"><div><span>Etapa</span><b style="font-size:12px;">${l['ETAPA']||'—'}</b></div>${l['DATA_ENVIO_PROPOSTA']?`<div><span>Enviada</span><b style="font-size:12px;">${fmtDataBR(l['DATA_ENVIO_PROPOSTA'])}</b></div>`:''}</div>
    </div>`;
  });
  res.innerHTML = html + '</div>';
}

function filtraAtividadesCRM() {

      <span style="color:${pend?'var(--laranja)':'var(--verde-ok)'};font-size:18px;"><i class="ti ${ico[a['TIPO']]||'ti-point'}"></i></span>

    </div>`;

async function renderRelatoriosCRM(area) {
  area.innerHTML = `<div class="placeholder"><i class="ti ti-loader"></i><h2>Carregando relatórios...</h2></div>`;
  await carregarLeads();
  const leads = kanbanLeads.filter(l=>l['ETAPA']!=='Cobertura');

  const fechados = leads.filter(l=>l['ETAPA']==='Fechado').length;
  const declinados = leads.filter(l=>l['ETAPA']==='Declinado').length;
  const conversao = total ? (fechados/total*100) : 0;

  // por consultor
  const porCons = {};
  leads.forEach(l=>{ const c=l['CONSULTOR']||'—'; if(!porCons[c])porCons[c]={total:0,fechados:0}; porCons[c].total++; if(l['ETAPA']==='Fechado')porCons[c].fechados++; });

  leads.forEach(l=>{ const f=l['FONTE']||'—'; porFonte[f]=(porFonte[f]||0)+1; });

  const etapas = ['Indicação/Prospecção','Em Contato','Proposta Enviada','Fechado','Declinado'];
  const porEtapa = {}; etapas.forEach(e=>porEtapa[e]=leads.filter(l=>l['ETAPA']===e).length);
  const maxEtapa = Math.max(...Object.values(porEtapa),1);

  const consultoresUnq = [...new Set(kanbanLeads.map(l=>l['CONSULTOR']).filter(Boolean))].sort();
  const hojeISO = new Date().toISOString().slice(0,10);

  let html = `

        <div><label style="font-size:12px;color:var(--cinza-600);display:block;margin-bottom:3px;">De</label>
          <input type="date" id="rel-ini" value="${hojeISO}" class="filtro-sel"></div>
        <div><label style="font-size:12px;color:var(--cinza-600);display:block;margin-bottom:3px;">Até</label>
          <input type="date" id="rel-fim" value="${hojeISO}" class="filtro-sel"></div>
        <button class="btn-importar" onclick="gerarRelatorioPDF()"><i class="ti ti-download"></i> Baixar PDF</button>
      </div>
      <div style="font-size:11px;color:var(--cinza-500);margin-top:8px;">O PDF traz as mudanças de etapa e as atividades (visitas, ligações...) do consultor no período.</div>
    </div>

    <div class="kpi-funil" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr));">
      <div class="kpi-card" style="border-top:3px solid var(--verde-escuro);"><div class="kpi-num">${total}</div><div class="kpi-lbl">Leads ativos</div></div>
      <div class="kpi-card" style="border-top:3px solid var(--verde-ok);"><div class="kpi-num" style="color:var(--verde-ok);">${fechados}</div><div class="kpi-lbl">Fechados</div></div>
      <div class="kpi-card" style="border-top:3px solid var(--vermelho);"><div class="kpi-num" style="color:var(--vermelho);">${declinados}</div><div class="kpi-lbl">Declinados</div></div>
      <div class="kpi-card" style="border-top:3px solid var(--verde-medio);"><div class="kpi-num" style="color:var(--verde-medio);">${conversao.toFixed(1)}%</div><div class="kpi-lbl">Taxa de conversão</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px;">
      <div style="background:white;border:1px solid var(--cinza-200);border-radius:12px;padding:18px;">
        <h3 style="font-family:var(--fonte-display);font-size:15px;margin:0 0 14px;">Funil por etapa</h3>
        ${etapas.map(e=>`<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--cinza-600);margin-bottom:3px;"><span>${e}</span><b>${porEtapa[e]}</b></div>
          <div style="background:var(--cinza-100);border-radius:5px;height:10px;"><div style="width:${porEtapa[e]/maxEtapa*100}%;height:100%;background:var(--verde-medio);border-radius:5px;"></div></div></div>`).join('')}
      </div>
      <div style="background:white;border:1px solid var(--cinza-200);border-radius:12px;padding:18px;">
        <h3 style="font-family:var(--fonte-display);font-size:15px;margin:0 0 14px;">Leads por fonte</h3>
        ${Object.entries(porFonte).sort((a,b)=>b[1]-a[1]).map(([f,n])=>`<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--cinza-600);margin-bottom:3px;"><span>${f}</span><b>${n}</b></div>
          <div style="background:var(--cinza-100);border-radius:5px;height:10px;"><div style="width:${n/maxFonte*100}%;height:100%;background:var(--verde-claro);border-radius:5px;"></div></div></div>`).join('')}
      </div>
    </div>

    <div style="background:white;border:1px solid var(--cinza-200);border-radius:12px;padding:18px;margin-top:16px;">
      <h3 style="font-family:var(--fonte-display);font-size:15px;margin:0 0 14px;">Desempenho por consultor</h3>
      <table style="width:100%;font-size:13px;border-collapse:collapse;">
        <thead><tr style="color:var(--cinza-600);text-align:left;"><th style="padding:6px 0;">Consultor</th><th style="text-align:center;">Leads</th><th style="text-align:center;">Fechados</th><th style="text-align:center;">Conversão</th></tr></thead>
        <tbody>${Object.entries(porCons).sort((a,b)=>b[1].fechados-a[1].fechados).map(([c,d])=>`<tr style="border-top:1px solid var(--cinza-100);"><td style="padding:8px 0;font-weight:600;">${c}</td><td style="text-align:center;">${d.total}</td><td style="text-align:center;color:var(--verde-ok);font-weight:600;">${d.fechados}</td><td style="text-align:center;">${d.total?(d.fechados/d.total*100).toFixed(0):0}%</td></tr>`).join('')}</tbody>
      </table>
    </div>`;
  area.innerHTML = html;
}

async function gerarRelatorioPDF() {
  const cons = (document.getElementById('rel-cons')||{}).value||'';
  const ini = (document.getElementById('rel-ini')||{}).value||'';
  const fim = (document.getElementById('rel-fim')||{}).value||'';
  if (!ini || !fim) { alert('Escolha o período (de/até).'); return; }
  const dIni = new Date(ini+'T00:00:00'), dFim = new Date(fim+'T23:59:59');

  // buscar mudanças de etapa e atividades
  const [re, ra, rcli, rctr] = await Promise.all([
    buscarDados('Historico_Etapas'), buscarDados('Atividades_Cliente'),
    buscarDados('Clientes'), buscarDados('Contratos')
  ]);
  let etapas = (re.ok?re.linhas:[]).map(e=>({...e,_d:parseDataReaj(e['DATA'])})).filter(e=>e._d&&e._d>=dIni&&e._d<=dFim);
  let ativs = (ra.ok?ra.linhas:[]).map(a=>({...a,_d:parseDataReaj(a['DATA_REGISTRO'])})).filter(a=>a._d&&a._d>=dIni&&a._d<=dFim);
  // clientes e contratos abertos no período (pela DATA_CADASTRO)
  let clientes = (rcli.ok?rcli.linhas:[]).map(c=>({...c,_d:parseDataReaj(c['DATA_CADASTRO'])})).filter(c=>c._d&&c._d>=dIni&&c._d<=dFim);
  let contratos = (rctr.ok?rctr.linhas:[]).map(c=>({...c,_d:parseDataReaj(c['DATA_CADASTRO'])})).filter(c=>c._d&&c._d>=dIni&&c._d<=dFim);
  if (cons) {
    etapas = etapas.filter(e=>e['CONSULTOR']===cons);
    ativs = ativs.filter(a=>a['REGISTRADO_POR']===cons);
    clientes = clientes.filter(c=>c['CONSULTOR']===cons);
    contratos = contratos.filter(c=>c['CONSULTOR']===cons);
  }

  // juntar tudo num só fluxo cronológico
  let eventos = [];
  etapas.forEach(e=>eventos.push({ d:e._d, txt:`<b>${e['CLIENTE']}</b> passou de <i>${e['ETAPA_ANTERIOR']||'—'}</i> para <b>${e['ETAPA_NOVA']}</b>`, cons:e['CONSULTOR'], tipo:'Etapa' }));
  ativs.forEach(a=>eventos.push({ d:a._d, txt:`<b>${a['CLIENTE']||'—'}</b>: ${a['TIPO']} — ${a['TITULO']||''}${a['DATA_AGENDADA']?' (agendada p/ '+fmtDataBR(a['DATA_AGENDADA'])+')':''}`, cons:a['REGISTRADO_POR'], tipo:a['TIPO'] }));
  eventos.sort((a,b)=>a.d-b.d);

  const periodo = ini===fim ? fmtDataBR(ini) : `${fmtDataBR(ini)} a ${fmtDataBR(fim)}`;

  let linhas = eventos.map(ev=>`<tr><td style="padding:7px 10px;border-bottom:1px solid #eee;white-space:nowrap;color:#555;font-size:12px;">${ev.d.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</td><td style="padding:7px 10px;border-bottom:1px solid #eee;font-size:12px;"><span style="display:inline-block;background:#f0f7ec;color:#2d5a3d;border-radius:4px;padding:1px 6px;font-size:10px;margin-right:6px;">${ev.tipo}</span>${ev.txt}</td>${cons?'':`<td style="padding:7px 10px;border-bottom:1px solid #eee;font-size:12px;color:#666;">${ev.cons||'—'}</td>`}</tr>`).join('');
  if (!eventos.length) linhas = `<tr><td colspan="3" style="padding:20px;text-align:center;color:#999;">Nenhuma atividade no período.</td></tr>`;

  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Relatório Ecotrans</title>
    <style>body{font-family:Arial,sans-serif;color:#222;padding:30px;} h1{color:#2d5a3d;font-size:20px;margin:0;} .sub{color:#666;font-size:13px;margin:4px 0 20px;} table{width:100%;border-collapse:collapse;} th{background:#2d5a3d;color:white;text-align:left;padding:8px 10px;font-size:12px;}
</style>
    </head><body>
    <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #8bc34a;padding-bottom:12px;margin-bottom:16px;">
      <div><h1>Ecotrans Ambiental</h1><div class="sub">Relatório de atividades comerciais</div></div>
      <div style="text-align:right;font-size:12px;color:#666;">${cons||'Todos os consultores'}<br>${periodo}</div>
    </div>
    <table><thead><tr><th>Quando</th><th>Atividade</th>${cons?'':'<th>Consultor</th>'}</tr></thead><tbody>${linhas}</tbody></table>
    <h2 style="color:#2d5a3d;font-size:15px;border-bottom:2px solid #8bc34a;padding-bottom:4px;margin:22px 0 8px;">Clientes abertos no período (${clientes.length})</h2>
    ${clientes.length ? `<table><thead><tr><th>Cliente</th><th>CNPJ</th><th>Tipo</th>${cons?'':'<th>Consultor</th>'}</tr></thead><tbody>${clientes.map(c=>`<tr><td style="padding:6px 10px;border-bottom:1px solid #eee;font-size:12px;">${c['CLIENTE']||'—'}</td><td style="padding:6px 10px;border-bottom:1px solid #eee;font-size:12px;">${c['CNPJ']||'—'}</td><td style="padding:6px 10px;border-bottom:1px solid #eee;font-size:12px;">${c['TIPO']||'—'}</td>${cons?'':`<td style="padding:6px 10px;border-bottom:1px solid #eee;font-size:12px;">${c['CONSULTOR']||'—'}</td>`}</tr>`).join('')}</tbody></table>` : '<p style="color:#999;font-size:12px;">Nenhum cliente aberto no período.</p>'}
    <h2 style="color:#2d5a3d;font-size:15px;border-bottom:2px solid #8bc34a;padding-bottom:4px;margin:22px 0 8px;">Contratos abertos no período (${contratos.length})</h2>
    ${contratos.length ? `<table><thead><tr><th>Cliente</th><th>Nº Contrato</th><th>Vencimento</th>${cons?'':'<th>Consultor</th>'}</tr></thead><tbody>${contratos.map(c=>`<tr><td style="padding:6px 10px;border-bottom:1px solid #eee;font-size:12px;">${c['CLIENTE']||'—'}</td><td style="padding:6px 10px;border-bottom:1px solid #eee;font-size:12px;">${c['Nº CTO']||'—'}</td><td style="padding:6px 10px;border-bottom:1px solid #eee;font-size:12px;">${fmtDataBR(c['VENC.'])}</td>${cons?'':`<td style="padding:6px 10px;border-bottom:1px solid #eee;font-size:12px;">${c['CONSULTOR']||'—'}</td>`}</tr>`).join('')}</tbody></table>` : '<p style="color:#999;font-size:12px;">Nenhum contrato aberto no período.</p>'}
    <div style="margin-top:20px;font-size:11px;color:#999;">Gerado em ${new Date().toLocaleString('pt-BR')} · ${eventos.length} registros</div>
    <script>setTimeout(function(){window.print();},400);<\/script>
    </body></html>`);
  win.document.close();
}

function calcResultados() {
  const ini = (document.getElementById('rt-ini')||{}).value;
  const fim = (document.getElementById('rt-fim')||{}).value;
  const dIni = new Date(ini+'T00:00:00'), dFim = new Date(fim+'T23:59:59');
  const corpo = document.getElementById('rt-corpo');

  const movs = (window._histEtapas||[]).map(e=>({...e,_d:parseDataReaj(e['DATA'])})).filter(e=>e._d&&e._d>=dIni&&e._d<=dFim);
  const temHistorico = movs.length > 0;
  const leadsPeriodo = kanbanLeads.filter(l=>{ const d=parseDataReaj(l['DATA_CONTATO']); return d&&d>=dIni&&d<=dFim; });

  if (!temHistorico) {
    const ativos = kanbanLeads.filter(l=>l['ETAPA']!=='Cobertura');
    const emProposta = ativos.filter(l=>l['ETAPA']==='Proposta Enviada').length;
    const emFechado = ativos.filter(l=>l['ETAPA']==='Fechado').length;
    const emProspec = ativos.filter(l=>{ const e=String(l['ETAPA']).toLowerCase(); return e.includes('prospec')||e.includes('indica'); }).length;
    const emContato = ativos.filter(l=>l['ETAPA']==='Em Contato').length;
    const emDeclinado = ativos.filter(l=>l['ETAPA']==='Declinado').length;
    corpo.innerHTML = `
      <div style="background:var(--amarelo-bg);border-radius:12px;padding:16px;margin-bottom:16px;font-size:13px;color:#8a6d00;line-height:1.6;">
        <i class="ti ti-info-circle"></i> <b>As taxas de conversão por período ainda não estão disponíveis.</b> Elas dependem do registro de movimentação dos cards (de uma etapa para outra), que começa a contar agora que o Apps Script foi republicado. Conforme a equipe arrastar os cards no Funil, as taxas vão aparecer aqui. Por enquanto, mostro a <b>foto atual do funil</b>:
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;">
        <div class="kpi-card" style="border-top:3px solid var(--cinza-500);"><div class="kpi-num" style="color:var(--cinza-600);">${emProspec}</div><div class="kpi-lbl">Em prospecção</div></div>
        <div class="kpi-card" style="border-top:3px solid #185FA5;"><div class="kpi-num" style="color:#185FA5;">${emContato}</div><div class="kpi-lbl">Em contato</div></div>
        <div class="kpi-card" style="border-top:3px solid #BA7517;"><div class="kpi-num" style="color:#BA7517;">${emProposta}</div><div class="kpi-lbl">Proposta enviada</div></div>
        <div class="kpi-card" style="border-top:3px solid var(--verde-ok);"><div class="kpi-num" style="color:var(--verde-ok);">${emFechado}</div><div class="kpi-lbl">Fechado</div></div>
        <div class="kpi-card" style="border-top:3px solid var(--vermelho);"><div class="kpi-num" style="color:var(--vermelho);">${emDeclinado}</div><div class="kpi-lbl">Declinado</div></div>
      </div>
      ${blocoPorConsultor(leadsPeriodo)}
      ${blocoDeclinadosCoberturas(leadsPeriodo)}
      ${blocoFechamentosComissao()}`;
    return;
  }

  // total de leads: só fontes PASSIVAS — exclui coberturas E prospecção ativa (regra da Mafe)
  const ehProspFonte = l => String(l['FONTE']||'').toLowerCase().includes('prospec');
  const totalLeads = leadsPeriodo.filter(l=>l['ETAPA']!=='Cobertura' && !ehProspFonte(l)).length;
  const propostas = movs.filter(m=>m['ETAPA_NOVA']==='Proposta Enviada').length;
  const fechados = movs.filter(m=>m['ETAPA_NOVA']==='Fechado').length;

  // "Prospecção → Proposta" pelo ESTADO ATUAL (não depende do histórico de arrastar cards):
  // dos leads que entraram como prospecção (todos entram por lá, menos coberturas),
  // quantos já chegaram em Proposta Enviada ou Fechado.
  const leadsProspec = leadsPeriodo.filter(l=>l['ETAPA']!=='Cobertura');
  const prospParaProp = leadsProspec.filter(l=> l['ETAPA']==='Proposta Enviada' || l['ETAPA']==='Fechado').length;
  const totalProspec = leadsProspec.length;

  const pct = (a,b)=> b>0 ? (a/b*100) : 0;
  const taxaLeadProposta  = pct(propostas, totalLeads);
  const taxaPropFechado   = pct(fechados, propostas);
  const taxaProspProposta = pct(prospParaProp, totalProspec);

  function cardTaxa(titulo, num, den, taxa, cor, exemplo) {
    const semBase = den===0;
    return `<div style="background:white;border:1px solid var(--cinza-200);border-radius:12px;padding:20px;border-top:3px solid ${cor};">
      <div style="font-size:13px;color:var(--cinza-600);margin-bottom:8px;">${titulo}</div>
      <div style="font-size:34px;font-weight:700;font-family:var(--fonte-display);color:${semBase?'var(--cinza-400)':cor};">${semBase?'\u2014':taxa.toFixed(1)+'%'}</div>
      <div style="font-size:13px;color:var(--cinza-700);margin-top:4px;">${num} de ${den}</div>
      <div style="font-size:11px;color:var(--cinza-500);margin-top:8px;">${exemplo}</div>
    </div>`;
  }

  corpo.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;">
      ${cardTaxa('Leads \u2192 Proposta enviada', propostas, totalLeads, taxaLeadProposta, 'var(--verde-escuro)', `${propostas} propostas de ${totalLeads} leads novos no período`)}
      ${cardTaxa('Propostas \u2192 Fechamento', fechados, propostas, taxaPropFechado, 'var(--verde-ok)', `${fechados} fechados de ${propostas} propostas no período`)}
      ${cardTaxa('Prospecção \u2192 Proposta', prospParaProp, totalProspec, taxaProspProposta, '#BA7517', `${prospParaProp} de ${totalProspec} prospecções já chegaram em proposta`)}
    </div>
    ${blocoMetricasFunil(leadsPeriodo)}
    <div style="background:white;border:1px solid var(--cinza-200);border-radius:12px;padding:20px;margin-top:18px;">
      <h3 style="font-family:var(--fonte-display);font-size:15px;margin:0 0 14px;">Resumo do período (${fmtDataBR(ini)} a ${fmtDataBR(fim)})</h3>
      <table style="width:100%;font-size:13px;border-collapse:collapse;">
        <tr style="border-bottom:1px solid var(--cinza-100);"><td style="padding:8px 0;color:var(--cinza-700);">Leads novos no período</td><td style="text-align:right;font-weight:600;">${totalLeads}</td></tr>
        <tr style="border-bottom:1px solid var(--cinza-100);"><td style="padding:8px 0;color:var(--cinza-700);">Movidos para "Proposta Enviada"</td><td style="text-align:right;font-weight:600;">${propostas}</td></tr>
        <tr style="border-bottom:1px solid var(--cinza-100);"><td style="padding:8px 0;color:var(--cinza-700);">Movidos para "Fechado"</td><td style="text-align:right;font-weight:600;color:var(--verde-ok);">${fechados}</td></tr>
        <tr><td style="padding:8px 0;color:var(--cinza-700);">Prospecções no período</td><td style="text-align:right;font-weight:600;">${totalProspec}</td></tr>
      </table>
    </div>
    ${blocoPorConsultor(leadsPeriodo)}
    ${blocoDeclinadosCoberturas(leadsPeriodo)}
    ${blocoFechamentosComissao()}`;
}

// blocos de Declinados (com motivos) e Coberturas (com empresas), do período
function blocoDeclinadosCoberturas(leadsPeriodo) {
  const declinados = leadsPeriodo.filter(l=>l['ETAPA']==='Declinado');
  const coberturas = leadsPeriodo.filter(l=>l['ETAPA']==='Cobertura');
  // agrupa declinados só pelo MOTIVO padronizado (ignora a observação livre).
  // dados antigos guardam "Motivo — observação" num campo só, então pega só a parte antes do "—".
  const soMotivo = l => String(l['MOTIVO_PERDA']||'Sem motivo informado').split('—')[0].split(' - ')[0].trim() || 'Sem motivo informado';
  const porMotivo = {};
  declinados.forEach(l=>{ const m=soMotivo(l); porMotivo[m]=(porMotivo[m]||0)+1; });
  const motivosOrd = Object.entries(porMotivo).sort((a,b)=>b[1]-a[1]);

  let html = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-top:18px;">';
  // Declinados
  html += `<div style="background:white;border:1px solid var(--cinza-200);border-radius:12px;padding:20px;border-top:3px solid var(--vermelho);">
    <h3 style="font-family:var(--fonte-display);font-size:15px;margin:0 0 4px;color:var(--vermelho);">Declinados no período</h3>
    <div style="font-size:28px;font-weight:700;font-family:var(--fonte-display);color:var(--vermelho);margin-bottom:12px;">${declinados.length}</div>`;
  if (motivosOrd.length) {
    html += '<div style="font-size:12px;color:var(--cinza-600);margin-bottom:8px;">Por motivo:</div>';
    motivosOrd.forEach(([m,n])=>{
      const pct = Math.round(n/declinados.length*100);
      html += `<div style="margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;"><span>${m}</span><b>${n} (${pct}%)</b></div>
        <div style="height:6px;background:var(--cinza-100);border-radius:3px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:var(--vermelho);"></div></div>
      </div>`;
    });
  } else { html += '<div style="font-size:13px;color:var(--cinza-500);">Nenhum declinado no período.</div>'; }
  html += '</div>';
  // Coberturas
  html += `<div style="background:white;border:1px solid var(--cinza-200);border-radius:12px;padding:20px;border-top:3px solid var(--roxo);">
    <h3 style="font-family:var(--fonte-display);font-size:15px;margin:0 0 4px;color:var(--roxo);">Coberturas no período</h3>
    <div style="font-size:28px;font-weight:700;font-family:var(--fonte-display);color:var(--roxo);margin-bottom:12px;">${coberturas.length}</div>
    <div style="font-size:11px;color:var(--cinza-500);margin-bottom:8px;">Não entram nas conversões (cliente já atendido por outra empresa).</div>`;
  if (coberturas.length) {
    // consolida por transportadora (empresa que atende), com %
    const porTransp = {};
    coberturas.forEach(l=>{ const t=l['EMPRESA_COLETA_ATUAL']||'Não informado'; porTransp[t]=(porTransp[t]||0)+1; });
    const transpOrd = Object.entries(porTransp).sort((a,b)=>b[1]-a[1]);
    html += '<div style="font-size:12px;color:var(--cinza-600);margin-bottom:8px;">Por transportadora atual:</div>';
    transpOrd.forEach(([t,n])=>{
      const pct = Math.round(n/coberturas.length*100);
      html += `<div style="margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;"><span>${t}</span><b>${n} (${pct}%)</b></div>
        <div style="height:6px;background:var(--cinza-100);border-radius:3px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:var(--roxo);"></div></div>
      </div>`;
    });
  } else { html += '<div style="font-size:13px;color:var(--cinza-500);">Nenhuma cobertura no período.</div>'; }
  html += '</div></div>';
  return html;
}

// desempenho por consultor: tabela resumo + detalhe expansível de cada um.
// "Leads" conta só fontes PASSIVAS (exclui prospecção e cobertura). Prospecção tem bloco próprio.
function blocoPorConsultor(leadsPeriodo) {
  const val = l => { const v=l['VALOR_R$']; if(v==null||v==='')return 0; if(typeof v==='number')return v; let s=String(v).replace(/[^\d,.-]/g,''); if(s.includes(',')&&s.lastIndexOf(',')>s.lastIndexOf('.'))s=s.replace(/\./g,'').replace(',','.'); return parseFloat(s)||0; };
  const ehProspec = l => String(l['FONTE']||'').toLowerCase().includes('prospec');
  // leads passivos = tudo menos cobertura e menos prospecção
  const passivos = leadsPeriodo.filter(l=>l['ETAPA']!=='Cobertura' && !ehProspec(l));
  const porCons = {};
  passivos.forEach(l=>{
    const c = l['CONSULTOR']||'Sem consultor';
    porCons[c] = porCons[c] || {leads:0, proposta:0, fechado:0, declinado:0, contato:0, prospec:0, valor:0, itens:[]};
    const o = porCons[c]; o.leads++;
    const e = l['ETAPA'];
    if (e==='Proposta Enviada') o.proposta++;
    else if (e==='Fechado') { o.fechado++; o.valor+=val(l); }
    else if (e==='Declinado') o.declinado++;
    else if (e==='Em Contato') o.contato++;
    else o.prospec++;
    o.itens.push(l);
  });
  const linhas = Object.entries(porCons).sort((a,b)=>b[1].fechado-a[1].fechado || b[1].leads-a[1].leads);
  if (!linhas.length) return '';
  let html = `<div style="background:white;border:1px solid var(--cinza-200);border-radius:12px;padding:20px;margin-top:18px;">
    <h3 style="font-family:var(--fonte-display);font-size:15px;margin:0 0 4px;">Desempenho por consultor (leads recebidos)</h3>
    <div style="font-size:12px;color:var(--cinza-500);margin-bottom:12px;"><i class="ti ti-info-circle"></i> Só leads que chegaram (Google, indicação, cliente, licitação, SP Regula). Prospecção ativa está no bloco abaixo. Clique num consultor para ver os leads.</div>
    <table style="width:100%;font-size:13px;border-collapse:collapse;">
      <thead><tr style="border-bottom:2px solid var(--cinza-200);">
        <th style="text-align:left;padding:8px 0;">Consultor</th><th style="text-align:right;">Leads</th>
        <th style="text-align:right;">Proposta</th><th style="text-align:right;">Fechado</th>
        <th style="text-align:right;">Declinado</th><th style="text-align:right;">Valor fechado</th>
      </tr></thead><tbody>`;
  linhas.forEach(([c,o],idx)=>{
    const detId = 'cons-det-'+idx;
    const detalhe = o.itens.sort((a,b)=>{ const oa={'Fechado':0,'Proposta Enviada':1,'Em Contato':2,'Declinado':4}[a['ETAPA']]??3; const ob={'Fechado':0,'Proposta Enviada':1,'Em Contato':2,'Declinado':4}[b['ETAPA']]??3; return oa-ob; })
      .map(l=>`<tr style="background:var(--cinza-50);border-bottom:1px solid var(--cinza-100);font-size:12px;"><td style="padding:5px 0 5px 20px;">${l['CLIENTE']||'—'}</td><td colspan="2" style="color:var(--cinza-600);">${rotEtapa(l['ETAPA'])}${l['ETAPA']==='Declinado'&&l['MOTIVO_PERDA']?' · '+l['MOTIVO_PERDA']:''}</td><td colspan="1" style="color:var(--cinza-600);font-size:11px;">${l['FONTE']||''}</td><td colspan="2" style="text-align:right;color:var(--cinza-600);">${val(l)?fmtMoeda(val(l)):'—'}</td></tr>`).join('');
    html += `<tr style="border-bottom:1px solid var(--cinza-100);cursor:pointer;" onclick="var e=document.getElementById('${detId}');e.style.display=e.style.display==='table-row-group'?'none':'table-row-group';">
        <td style="padding:8px 0;"><i class="ti ti-chevron-right" style="font-size:12px;"></i> ${c}</td>
        <td style="text-align:right;">${o.leads}</td><td style="text-align:right;">${o.proposta}</td>
        <td style="text-align:right;font-weight:600;color:var(--verde-medio);">${o.fechado}</td>
        <td style="text-align:right;color:var(--vermelho);">${o.declinado}</td>
        <td style="text-align:right;font-weight:600;">${o.valor?fmtMoeda(o.valor):'—'}</td></tr>
      <tbody id="${detId}" style="display:none;">${detalhe}</tbody>`;
  });
  html += '</tbody></table></div>';
  html += blocoProspeccaoPorConsultor(leadsPeriodo);
  return html;
}

// prospecção ATIVA por consultor: quanto prospectou, quantas viraram Proposta Enviada (com %) e quantas fecharam
function blocoProspeccaoPorConsultor(leadsPeriodo) {
  const ehProspec = l => String(l['FONTE']||'').toLowerCase().includes('prospec');
  const prospec = leadsPeriodo.filter(l=>l['ETAPA']!=='Cobertura' && ehProspec(l));
  const porCons = {};
  prospec.forEach(l=>{
    const c = l['CONSULTOR']||'Sem consultor';
    porCons[c] = porCons[c] || {total:0, proposta:0, fechado:0, itens:[]};
    const o = porCons[c]; o.total++;
    if (l['ETAPA']==='Proposta Enviada' || l['ETAPA']==='Fechado') o.proposta++; // chegou (ou passou) por proposta
    if (l['ETAPA']==='Fechado') o.fechado++;
    o.itens.push(l);
  });
  const linhas = Object.entries(porCons).sort((a,b)=>b[1].total-a[1].total);
  let corpo;
  if (!linhas.length) {
    corpo = '<div style="font-size:13px;color:var(--cinza-500);padding:8px 0;">Nenhuma prospecção ativa no período.</div>';
  } else {
    corpo = `<table style="width:100%;font-size:13px;border-collapse:collapse;">
      <thead><tr style="border-bottom:2px solid var(--cinza-200);">
        <th style="text-align:left;padding:8px 0;">Consultor</th><th style="text-align:right;">Prospectou</th>
        <th style="text-align:right;">Virou proposta</th><th style="text-align:right;">% p/ proposta</th><th style="text-align:right;">Fechou</th>
      </tr></thead><tbody>` +
      linhas.map(([c,o],idx)=>{
        const detId = 'prosp-det-'+idx;
        const pct = o.total ? Math.round(o.proposta/o.total*100) : 0;
        const detalhe = o.itens.map(l=>`<tr style="background:var(--cinza-50);border-bottom:1px solid var(--cinza-100);font-size:12px;"><td style="padding:5px 0 5px 20px;">${l['CLIENTE']||'—'}</td><td colspan="4" style="color:var(--cinza-600);">${rotEtapa(l['ETAPA'])}</td></tr>`).join('');
        return `<tr style="border-bottom:1px solid var(--cinza-100);cursor:pointer;" onclick="var e=document.getElementById('${detId}');e.style.display=e.style.display==='table-row-group'?'none':'table-row-group';">
            <td style="padding:8px 0;"><i class="ti ti-chevron-right" style="font-size:12px;"></i> ${c}</td>
            <td style="text-align:right;font-weight:600;">${o.total}</td>
            <td style="text-align:right;">${o.proposta}</td>
            <td style="text-align:right;font-weight:600;color:${pct>=50?'var(--verde-medio)':'var(--cinza-700)'};">${pct}%</td>
            <td style="text-align:right;color:var(--verde-medio);">${o.fechado}</td></tr>
          <tbody id="${detId}" style="display:none;">${detalhe}</tbody>`;
      }).join('') + '</tbody></table>';
  }
  return `<div style="background:white;border:1px solid var(--cinza-200);border-radius:12px;padding:20px;margin-top:18px;border-top:3px solid var(--verde-claro);">
    <h3 style="font-family:var(--fonte-display);font-size:15px;margin:0 0 4px;color:var(--verde-escuro);">Prospecção ativa por consultor</h3>
    <div style="font-size:12px;color:var(--cinza-500);margin-bottom:12px;"><i class="ti ti-target-arrow"></i> Leads de fonte "Prospecção" (o consultor foi atrás). "Virou proposta" = chegou em Proposta Enviada ou além.</div>
    ${corpo}
  </div>`;
}

// métricas financeiras do funil (ticket médio, valor em jogo, conversão em fechamentos)
// calculadas dos leads do período. Coberturas ficam de fora (regra do negócio).
function blocoMetricasFunil(leadsPeriodo) {
  const val = l => { const v=l['VALOR_R$']; if(v==null||v==='')return 0; if(typeof v==='number')return v; let s=String(v).replace(/[^\d,.-]/g,''); if(s.includes(',')&&s.lastIndexOf(',')>s.lastIndexOf('.'))s=s.replace(/\./g,'').replace(',','.'); return parseFloat(s)||0; };
  const semCobertura = (leadsPeriodo||[]).filter(l=>l['ETAPA']!=='Cobertura');
  // propostas enviadas = leads que passaram por Proposta Enviada (ou estão além dela)
  const etapasEnviada = ['Proposta Enviada','Fechado','Declinado'];
  const propostasEnv = semCobertura.filter(l=>etapasEnviada.includes(l['ETAPA']));
  const valPropostas = propostasEnv.reduce((s,l)=>s+val(l),0);
  const ticket = propostasEnv.length ? valPropostas/propostasEnv.length : 0;
  // valor em jogo = propostas enviadas ainda em aberto (não fechadas nem declinadas)
  const emAberto = semCobertura.filter(l=>l['ETAPA']==='Proposta Enviada');
  const valorEmJogo = emAberto.reduce((s,l)=>s+val(l),0);
  // conversão em fechamentos = fechados / propostas enviadas
  const fechadosN = propostasEnv.filter(l=>l['ETAPA']==='Fechado').length;
  const convFech = propostasEnv.length ? (fechadosN/propostasEnv.length*100) : 0;
  const card = (lbl, valor, cor) => `<div style="background:white;border:1px solid var(--cinza-200);border-radius:12px;padding:16px;border-top:3px solid ${cor};">
    <div style="font-size:22px;font-weight:700;font-family:var(--fonte-display);color:${cor};">${valor}</div>
    <div style="font-size:12px;color:var(--cinza-600);margin-top:2px;">${lbl}</div></div>`;
  return `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-top:16px;">
    ${card('Propostas enviadas', propostasEnv.length, 'var(--verde-escuro)')}
    ${card('Ticket médio', fmtMoeda(ticket), 'var(--verde-medio)')}
    ${card('Valor em jogo (em aberto)', fmtMoeda(valorEmJogo), '#BA7517')}
    ${card('Conversão em fechamentos', convFech.toFixed(1)+'%', 'var(--verde-ok)')}
  </div>`;
}

// bloco de fechamentos vindos da planilha de comissões (processada no módulo Financeiro).
// Mostra fechamentos por consultor + aditivos/recicláveis à parte. Se não há dados, orienta subir.
function blocoFechamentosComissao() {
  let fech = [];
  try { if (typeof finCarregar==='function') { finCarregar(); fech = (typeof FINdados!=='undefined' && FINdados.fechamentos) ? FINdados.fechamentos : []; } } catch(e) {}
  if (!fech.length) {
    return `<div style="background:white;border:1px solid var(--cinza-200);border-radius:12px;padding:20px;margin-top:18px;">
      <h3 style="font-family:var(--fonte-display);font-size:15px;margin:0 0 8px;">Fechamentos (planilha de comissões)</h3>
      <div style="background:var(--amarelo-bg);border-radius:8px;padding:12px;font-size:13px;color:#8a6d00;">Para ver os fechamentos aqui, suba a planilha de comissões no módulo <b>Financeiro › Relatórios</b>.</div>
    </div>`;
  }
  // filtro de mês (mesRef)
  const meses = [...new Set(fech.map(f=>f.mesRef).filter(m=>m&&!String(m).endsWith('-00')))].sort();
  const mesSel = window._fechMesSel || 'todos';
  const fechMes = mesSel==='todos' ? fech : fech.filter(f=>f.mesRef===mesSel);
  const rotMes = (m)=> (typeof finRotMes==='function' && m) ? finRotMes(m) : m;

  const contam = fechMes.filter(f=>!f.foraDoTotal);
  const fora = fechMes.filter(f=>f.foraDoTotal);
  const totVal = contam.reduce((s,x)=>s+(x.valor||0),0);
  const porCons = {};
  contam.forEach(f=>{ porCons[f.consultor]=porCons[f.consultor]||{n:0,v:0,itens:[]}; porCons[f.consultor].n++; porCons[f.consultor].v+=(f.valor||0); porCons[f.consultor].itens.push(f); });

  // cada consultor vira uma linha clicável que expande o detalhe (os fechamentos dele)
  const linhasCons = Object.entries(porCons).sort((a,b)=>b[1].v-a[1].v).map(([c,o],idx)=>{
    const detId = 'fech-det-'+idx;
    const detalhe = o.itens.sort((a,b)=>(b.valor||0)-(a.valor||0)).map(f=>
      `<tr style="border-bottom:1px solid var(--cinza-100);background:var(--cinza-50);"><td style="padding:6px 0 6px 20px;">${f.cliente}</td><td><span class="badge" style="background:var(--verde-claro-bg);color:var(--verde-escuro);font-size:10px;padding:2px 6px;border-radius:4px;">${f.tipo}</span></td><td style="text-align:right;">${f.data||'—'}</td><td style="text-align:right;">${fmtMoeda(f.valor)}</td></tr>`
    ).join('');
    return `<tr style="border-bottom:1px solid var(--cinza-100);cursor:pointer;" onclick="var e=document.getElementById('${detId}');e.style.display=e.style.display==='table-row-group'?'none':'table-row-group';">
        <td style="padding:8px 0;"><i class="ti ti-chevron-right" style="font-size:12px;"></i> ${c}</td><td style="text-align:right;">${o.n}</td><td style="text-align:right;font-weight:600;">${fmtMoeda(o.v)}</td></tr>
      <tbody id="${detId}" style="display:none;"><tr style="font-size:11px;color:var(--cinza-500);"><td style="padding:4px 0 4px 20px;">Cliente</td><td>Tipo</td><td style="text-align:right;">Data</td><td style="text-align:right;">Valor</td></tr>${detalhe}</tbody>`;
  }).join('');

  const foraTxt = fora.length ? `<div style="margin-top:14px;padding-top:14px;border-top:1px dashed var(--cinza-300);">
      <div style="font-size:13px;color:var(--roxo);font-weight:600;margin-bottom:6px;">Aditivos e Eventuais Recicláveis (${fora.length}) — não somam ao total</div>
      <div style="font-size:12px;color:var(--cinza-600);">Total à parte: ${fmtMoeda(fora.reduce((s,x)=>s+(x.valor||0),0))}</div>
    </div>` : '';

  const selMes = `<select onchange="window._fechMesSel=this.value;renderResultadosCRM(document.getElementById('area-conteudo'))" style="padding:6px 10px;border:1.5px solid var(--cinza-300);border-radius:8px;font-size:12px;">
      <option value="todos" ${mesSel==='todos'?'selected':''}>Todos os meses</option>
      ${meses.map(m=>`<option value="${m}" ${m===mesSel?'selected':''}>${rotMes(m)}</option>`).join('')}
    </select>`;

  return `<div style="background:white;border:1px solid var(--cinza-200);border-radius:12px;padding:20px;margin-top:18px;">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:4px;">
      <h3 style="font-family:var(--fonte-display);font-size:15px;margin:0;">Fechamentos (planilha de comissões)</h3>
      ${selMes}
    </div>
    <div style="font-size:12px;color:var(--cinza-500);margin-bottom:12px;">${contam.length} fechamentos · ${fmtMoeda(totVal)} · <i class="ti ti-info-circle"></i> clique num consultor para ver o detalhe</div>
    <table style="width:100%;font-size:13px;border-collapse:collapse;">
      <thead><tr style="border-bottom:2px solid var(--cinza-200);"><th style="text-align:left;padding:8px 0;">Consultor</th><th style="text-align:right;">Fechamentos</th><th style="text-align:right;">Valor</th></tr></thead>
      ${linhasCons}
    </table>
    ${foraTxt}
  </div>`;
}

// mostra clientes ativos na mesma região do CEP do lead
async function mostrarClientesProximos(cepLead, idLead) {
  const alvo = document.getElementById('lead-proximos');
  if (!alvo) return;
  const cep = String(cepLead||'').replace(/\D/g,'');
  if (cep.length < 5) {
    alvo.innerHTML = `<div style="background:var(--cinza-100);border-radius:10px;padding:12px;font-size:12px;color:var(--cinza-500);"><i class="ti ti-map-pin"></i> Preencha o CEP do lead (acima) para ver clientes próximos.</div>`;
    return;
  }
  await carregarClientes();
  const lista = (cacheClientes||[]).map(c => {
    const cc = String(c['CEP']||'').replace(/\D/g,'');
    if (cc.length < 5) return null;
    let nivel = 0;
    if (cc.slice(0,5) === cep.slice(0,5)) nivel = 3;       // mesma rua/quadra
    else if (cc.slice(0,4) === cep.slice(0,4)) nivel = 2;  // bem perto
    else if (cc.slice(0,3) === cep.slice(0,3)) nivel = 1;  // mesma região
    if (!nivel) return null;
    return { nome:c['CLIENTE'], cep:c['CEP'], endereco:c['ENDERECO'], cons:c['CONSULTOR'], nivel };
  }).filter(Boolean).sort((a,b)=>b.nivel-a.nivel).slice(0, 15);

  if (!lista.length) {
    alvo.innerHTML = `<div style="background:var(--cinza-100);border-radius:10px;padding:12px;font-size:12px;color:var(--cinza-500);"><i class="ti ti-map-pin"></i> Nenhum cliente ativo na mesma região de CEP (${cep.slice(0,5)}...).</div>`;
    return;
  }
  const selo = n => n===3 ? '<span style="background:#1f7a3d;color:white;font-size:9px;padding:1px 5px;border-radius:4px;">muito perto</span>'
    : n===2 ? '<span style="background:#4a8c5c;color:white;font-size:9px;padding:1px 5px;border-radius:4px;">perto</span>'
    : '<span style="background:#8bc34a;color:#2d5a3d;font-size:9px;padding:1px 5px;border-radius:4px;">mesma região</span>';
  alvo.innerHTML = `
    <div style="background:#F3F0FA;border-radius:10px;padding:12px;">
      <div style="font-size:12px;font-weight:600;color:#534877;margin-bottom:8px;"><i class="ti ti-map-pin"></i> Clientes próximos (CEP ${cep.slice(0,5)}...)</div>
      ${lista.map(c=>`<div style="padding:7px 0;border-bottom:1px solid rgba(0,0,0,0.06);font-size:12px;display:flex;justify-content:space-between;gap:8px;align-items:center;">
        <div><b style="color:var(--cinza-800);">${c.nome}</b><br><span style="color:var(--cinza-500);">${c.endereco||'—'} · CEP ${c.cep||'—'}${c.cons?' · '+c.cons:''}</span></div>
        <div style="white-space:nowrap;">${selo(c.nivel)}</div>
      </div>`).join('')}
    </div>`;
}

  if (!podeExcluirCliente()) return;
  const alvo = cnpjLimpo(cnpj);

  let nContratos = 0;
  try {
    const rc = await buscarDados('Contratos');
    nContratos = (rc.ok?rc.linhas:[]).filter(x=>cnpjLimpo(x['CNPJ'])===alvo).length;
  } catch(e) {}
  let aviso = `Excluir o cliente "${cliente}"?\n\nEle vai para a Lixeira de Clientes (recuperável).`;

    aviso += `\n\n⚠️ ATENÇÃO: este cliente tem ${nContratos} contrato(s) vinculado(s). Os contratos NÃO serão excluídos — eles continuarão na aba Contratos. Confira se não está excluindo o cliente errado.`;

  if (nContratos > 0 && !confirm(`Confirma mesmo a exclusão de "${cliente}" (com ${nContratos} contrato[s])?`)) return;

// após processar um upload, REESCREVE aquela aba inteira no Sheets com o conteúdo atual da memória.
// A memória já acumula os meses corretamente (o processamento substitui só o mês do arquivo).
// Reescrever a aba inteira elimina a duplicação que vinha de "remendar período por período".
async function finSincronizarAposUpload(tipoDados, st){
  const cfg = FIN_MAPA_SHEETS[tipoDados];
  if (!cfg) return;
  try {
    if (st) { st.textContent = 'Salvando no sistema (compartilhado)...'; st.style.color='var(--cinza-500)'; }
    // sempre modo 'tudo': reescreve a aba inteira do tipo com o que está na memória (fonte da verdade)
    await finEnviarSheetsCompleto(tipoDados, st);
    if (st) { st.textContent = 'Salvo! Todos da equipe já veem estes dados.'; st.style.color='var(--verde-medio)'; }
    if (typeof finInvalidarCache==='function') finInvalidarCache();
  } catch(e){
    if (st) { st.innerHTML = 'Processado, mas <b>falhou ao salvar no sistema</b>. Verifique a conexão e o Apps Script.<br><span style="font-size:11px;">'+e.message+'</span>'; st.style.color='var(--vermelho)'; }
  }
}

// reescreve a aba inteira do tipo no Sheets (modo 'tudo'), em lotes. Fonte = memória (FINdados[tipo]).
async function finEnviarSheetsCompleto(tipo, statusEl){
  const cfg = FIN_MAPA_SHEETS[tipo];
  if (!cfg) return;
  let linhas = (FINdados[tipo]||[]).slice();
  if (tipo==='faturamento') linhas = linhas.map(x=>({ cliente:x.cliente, valoresJSON: JSON.stringify(x.valores||{}) }));
  // colunas = UNIÃO de todas as chaves de todos os registros (não só do primeiro).
  // Assim campos como ISS/INSS que possam faltar no 1º título ainda são enviados.
  const setCols = new Set();
  linhas.forEach(l=>Object.keys(l).forEach(k=>setCols.add(k)));
  const colunas = setCols.size ? [...setCols] : ['vazio'];
  const LOTE = 300;
  // se não há nada, manda um lote vazio em modo 'tudo' pra limpar a aba
  if (!linhas.length){
    await fetch(API_URL,{method:'POST',body:JSON.stringify({acao:'salvarFinanceiro',token:sessaoToken,
      dados:{ aba:cfg.aba, colunas, linhas:[], modo:'tudo', primeiroLote:true }})});
    return;
  }
  let primeiro = true;
  for (let i=0;i<linhas.length;i+=LOTE){
    const lote = linhas.slice(i,i+LOTE);
    if (statusEl) statusEl.textContent = `Enviando ${Math.min(i+LOTE,linhas.length)} de ${linhas.length}...`;
    await fetch(API_URL,{method:'POST',body:JSON.stringify({acao:'salvarFinanceiro',token:sessaoToken,
      dados:{ aba:cfg.aba, colunas, linhas:lote, modo:'tudo', primeiroLote:primeiro }})});
    primeiro = false;
  }
}

// Mapa: qual aba do Sheets, quais colunas e qual a regra de substituição de cada tipo.
const FIN_MAPA_SHEETS = {
  pagar:       { aba:'Fin_Pagar',            campoPeriodo:'_mesPagamento' },
  receber:     { aba:'Fin_Receber_Emitidos', campoPeriodo:'_mesEmissao' },
  recebeReceb: { aba:'Fin_Receber_Recebidos',campoPeriodo:'_mesEmissao' },
  fechamentos: { aba:'Fin_Fechamentos',      campoPeriodo:'mesRef' },
  coletas:     { aba:'Fin_Coletas',          campoPeriodo:'ym' },
  faturamento: { aba:'Fin_Faturamento',      campoPeriodo:null }, // substitui tudo
};

// envia os dados de um tipo para o Sheets, em lotes, substituindo o período informado.
async function finEnviarSheets(tipo, valorPeriodo, statusEl){
  const cfg = FIN_MAPA_SHEETS[tipo];
  if (!cfg) return;
  let linhas = (FINdados[tipo]||[]).slice();
  // para faturamento, o objeto tem 'valores' (mapa de meses) — serializa pra caber numa célula
  if (tipo==='faturamento') linhas = linhas.map(x=>({ cliente:x.cliente, valoresJSON: JSON.stringify(x.valores||{}) }));
  // se substitui por período, filtra só as linhas do período que está subindo
  let aEnviar = linhas;
  if (cfg.campoPeriodo && valorPeriodo!=null) aEnviar = linhas.filter(l=>String(l[cfg.campoPeriodo])===String(valorPeriodo));
  const colunas = aEnviar.length ? Object.keys(aEnviar[0]) : (linhas.length?Object.keys(linhas[0]):['vazio']);
  const LOTE = 300;
  const modo = cfg.campoPeriodo ? 'periodo' : 'tudo';
  let primeiro = true;
  if (!aEnviar.length) {
    // nada a enviar, mas ainda assim limpa o período (ex: período ficou vazio)
    await fetch(API_URL,{method:'POST',body:JSON.stringify({acao:'salvarFinanceiro',token:sessaoToken,
      dados:{ aba:cfg.aba, colunas, linhas:[], modo, campoPeriodo:cfg.campoPeriodo, valorPeriodo, primeiroLote:true }})});
    return;
  }
  for (let i=0;i<aEnviar.length;i+=LOTE){
    const lote = aEnviar.slice(i,i+LOTE);
    if (statusEl) statusEl.textContent = `Enviando ${Math.min(i+LOTE,aEnviar.length)} de ${aEnviar.length}...`;
    await fetch(API_URL,{method:'POST',body:JSON.stringify({acao:'salvarFinanceiro',token:sessaoToken,
      dados:{ aba:cfg.aba, colunas, linhas:lote, modo, campoPeriodo:cfg.campoPeriodo, valorPeriodo, primeiroLote:primeiro }})});
    primeiro = false;
  }
}

// carrega todos os tipos do Sheets para o FINdados (chamado ao abrir o módulo)
// carrega tipos do Sheets para o FINdados. Otimizado:
// - só os tipos pedidos (cada tela pede o que precisa), não as 6 abas sempre
// - em PARALELO (Promise.all), não uma requisição após a outra
// - com cache de 90s (não refaz se carregou há pouco), salvo se forcar=true
let _finCarregadoEm = {}; // tipo -> timestamp
async function finCarregarDoSheets(tipos, forcar){
  const alvos = (tipos && tipos.length) ? tipos : Object.keys(FIN_MAPA_SHEETS);
  const agora = Date.now();
  const aBuscar = alvos.filter(t => forcar || !_finCarregadoEm[t] || (agora - _finCarregadoEm[t] > 90000));
  if (!aBuscar.length) return; // tudo fresco no cache, não busca nada
  await Promise.all(aBuscar.map(async (tipo) => {
    const cfg = FIN_MAPA_SHEETS[tipo];
    if (!cfg) return;
    try {
      const resp = await fetch(API_URL,{method:'POST',body:JSON.stringify({acao:'dados',token:sessaoToken,aba:cfg.aba})});
      const r = await resp.json();
      if (r.ok && r.linhas){
        if (tipo==='faturamento'){
          FINdados[tipo] = r.linhas.map(l=>({ cliente:l.cliente, valores: (()=>{try{return JSON.parse(l.valoresJSON||'{}')}catch(e){return {}}})() }));
        } else {
          FINdados[tipo] = r.linhas.map(l=>{
            const o = {...l};
            ['valor','pago','saldo','recebido','qtdeServ','pesoTon','iss','inss','pis','cofins','csll','ir','desconto','liquido'].forEach(k=>{ if(o[k]!==undefined&&o[k]!=='') o[k]=finN(o[k]); });
            if(o.foraDoTotal!==undefined) o.foraDoTotal = (o.foraDoTotal===true||o.foraDoTotal==='true'||o.foraDoTotal==='Sim');
            return o;
          });
        }
      }
      _finCarregadoEm[tipo] = Date.now();
    } catch(e){ /* aba pode não existir ainda */ }
  }));
  finSalvar();
}
// invalida o cache de leitura do financeiro (chamar após enviar dados novos)
function finInvalidarCache(){ _finCarregadoEm = {}; }

function finFmtM(v){ const n=parseFloat(v)||0; return 'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
// converte valor que pode vir como número (já certo) ou texto BR ("1.234,56")
function finParseValorBR(v){
  if(typeof v==='number') return v; // já é número, usa direto
  let s=String(v||'').trim(); if(!s) return 0;
  // texto BR: remove separador de milhar (.) e troca vírgula decimal por ponto
  if(s.indexOf(',')>=0) s=s.replace(/\./g,'').replace(',','.');
  s=s.replace(/[^\d.-]/g,'');
  return parseFloat(s)||0;
}
function finLc(s){ return String(s==null?'':s).replace(/\u00a0/g,' ').trim(); }
// converte valor (número, "1.234,56" BR, "1,234.56" US, "197.16") para float de forma robusta
function finN(v){
  if(v==null||v==='')return 0;
  if(typeof v==='number')return v;
  let s=String(v).replace(/[^0-9,.-]/g,'');
  if(s==='')return 0;
  const temV=s.includes(','), temP=s.includes('.');
  if(temV&&temP){
    // o separador decimal é o que aparece por último
    if(s.lastIndexOf(',')>s.lastIndexOf('.')) s=s.replace(/\./g,'').replace(',','.'); // BR: 1.234,56
    else s=s.replace(/,/g,''); // US: 1,234.56
  } else if(temV){
    s=s.replace(',','.'); // só vírgula = decimal BR
  }
  // só ponto: já é decimal válido (197.16) — não mexe
  const n=parseFloat(s); return isNaN(n)?0:n;
}
function finNormNome(s){ return finLc(s).toUpperCase().replace(/\([^)]*\)/g,'').replace(/[^A-Z0-9 ]/g,'').replace(/\b(LTDA|SA|EIRELI|ME|EPP|THE|NEW|DO BRASIL)\b/g,'').replace(/\s+/g,' ').trim().slice(0,18); }

function finCompYM(v){ const s=finLc(v).toLowerCase(); const m=s.match(/([a-zç]+)\/(\d{4})/); return (m&&FIN_MESES[m[1]])?`${m[2]}-${FIN_MESES[m[1]]}`:''; }
function finRotMes(ym){ if(!ym) return '—'; const [a,m]=ym.split('-'); return (FIN_MESNOME[m]||m)+'/'+a.slice(2); }
