        <div style="color:var(--cinza-500);font-size:13px;text-align:center;padding:20px;">Escolha um mês para ver os clientes reajustados nele e o aumento em R$ (comparando o faturamento do mês anterior com o mês do reajuste).</div>
      </div>
    </div>`;

  // guardar dados pro filtro
  window._fatLinhas = fatLinhas;
  window._mesesCols = mesesCols;
  window._reajLinhas = reajLinhas;

  // popular dropdown de meses de reajuste (a partir das datas de último reajuste)
  setTimeout(()=>{
    const sel = document.getElementById('g-mes-reaj');
    if (sel) {
      const meses = new Set();
      reajLinhas.forEach(r => {
        const d = parseDataReaj(r['DATA ÚLTIMO REAJUSTE '] || r['DATA ÚLTIMO REAJUSTE']);
        if (d) meses.add((d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getFullYear());
      });
      [...meses].sort().forEach(m => { const o=document.createElement('option'); o.value=m; o.textContent=m; sel.appendChild(o); });
    }
    atualizaGraficoFat(); graficoInad(inad); graficoReaj(reajLinhas);
  }, 60);
}

function calcImpactoReaj() {
  const mesEsc = (document.getElementById('g-mes-reaj')||{}).value;
  const cont = document.getElementById('impacto-reaj');
  if (!mesEsc) { cont.innerHTML = '<div style="color:var(--cinza-500);font-size:13px;text-align:center;padding:20px;">Escolha um mês.</div>'; return; }

  const reajLinhas = window._reajLinhas || [];
  const fatLinhas = window._fatLinhas || [];
  const mesesFat = window._mesesCols || [];

  // clientes reajustados no mês escolhido
  const doMes = reajLinhas.filter(r => {
    const d = parseDataReaj(r['DATA ÚLTIMO REAJUSTE '] || r['DATA ÚLTIMO REAJUSTE']);
    return d && ((d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getFullYear()) === mesEsc;
  });

  if (!doMes.length) { cont.innerHTML = '<div style="color:var(--cinza-500);font-size:13px;text-align:center;padding:20px;">Nenhum cliente reajustado neste mês.</div>'; return; }

  // tentar comparar faturamento: mês do reajuste vs mês anterior (se existirem na aba Faturamento)
  // como hoje só há 1 mês de faturamento, usa o % do reajuste sobre o faturamento disponível
  const fatPorCnpj = {};
  fatLinhas.forEach(l => { fatPorCnpj[String(l['CNPJ'])] = l; });
  const ultimoMesFat = mesesFat[mesesFat.length-1];

  let totalAumento = 0;
  let linhas = '';
  doMes.forEach(r => {
    const cnpj = String(r['CNPJ']);
    const pct = parseFloat(r['ALIQUOTA'])*100 || 0;
    const fatCli = fatPorCnpj[cnpj];
    const fatBase = fatCli ? (parseFloat(fatCli[ultimoMesFat])||0) : 0;
    // aumento estimado = faturamento × (pct / (100+pct))  [parte do faturamento que veio do reajuste]
    const aumento = fatBase>0 && pct>0 ? fatBase * (pct/(100+pct)) : 0;
    totalAumento += aumento;
    linhas += `<tr style="border-top:1px solid var(--cinza-100);">
      <td style="padding:8px 10px;">${r['CLIENTE']||'—'}</td>
      <td style="padding:8px 10px;text-align:right;">${pct.toFixed(1)}%</td>
      <td style="padding:8px 10px;text-align:right;color:var(--cinza-600);">${fatBase>0?fmtMoeda(fatBase):'—'}</td>
      <td style="padding:8px 10px;text-align:right;color:var(--verde-ok);font-weight:600;">${aumento>0?'+'+fmtMoeda(aumento):'—'}</td>
    </tr>`;
  });

  cont.innerHTML = `
    <div style="display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;">
      <div class="kpi-fat" style="flex:1;min-width:160px;border-top:3px solid var(--verde-ok);">
        <div class="tit"><i class="ti ti-trending-up"></i> Aumento total no mês</div>
        <div class="val" style="color:var(--verde-ok);">+${fmtMoeda(totalAumento)}</div>
        <div class="var" style="color:var(--cinza-600);">${doMes.length} clientes reajustados</div>
      </div>
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:13px;">
      <thead><tr style="background:var(--verde-claro-bg);">
        <th style="padding:9px 10px;text-align:left;color:var(--verde-escuro);">Cliente</th>
        <th style="padding:9px 10px;text-align:right;color:var(--verde-escuro);">% reajuste</th>
        <th style="padding:9px 10px;text-align:right;color:var(--verde-escuro);">Faturamento</th>
        <th style="padding:9px 10px;text-align:right;color:var(--verde-escuro);">Aumento R$</th>
      </tr></thead>
      <tbody>${linhas}</tbody>
    </table>
    <div style="font-size:11px;color:var(--cinza-500);margin-top:10px;"><i class="ti ti-info-circle"></i> Quando houver faturamento de vários meses, o aumento será calculado comparando o mês anterior ao reajuste com o mês do reajuste. Por ora, é estimado sobre o faturamento disponível.</div>`;
}

function corVerde(a){ return `rgba(45,90,61,${a})`; }

// unifica variações: IPC FIPE / IPC-FIPE / IPC F / IPCF -> IPC-F
function normalizaIndice(ind) {
  if (!ind) return 'Outro';
  let s = String(ind).toUpperCase().replace(/\s+/g,' ').trim();
  if (s.includes('IPC') && s.includes('FIPE')) return 'IPC-F';
  if (s.replace(/[\s\-]/g,'') === 'IPCF') return 'IPC-F';
  if (s.includes('IGPM') || s.includes('IGP-M') || s.includes('IGP M')) return 'IGP-M';
  if (s.includes('IPCA')) return 'IPCA';
  if (s.includes('INPC')) return 'INPC';
  return s;
}

function atualizaGraficoFat() {
  const cnpj = (document.getElementById('g-cliente')||{}).value || '__todos';
  const meses = window._mesesCols || [];
  const linhas = window._fatLinhas || [];
  let valores;
  if (cnpj === '__todos') {
    valores = meses.map(m => Math.round(linhas.reduce((s,l)=>s+(parseFloat(l[m])||0),0)));
  } else {
    const cli = linhas.find(l=>String(l['CNPJ'])===cnpj);
    valores = meses.map(m => cli ? Math.round(parseFloat(cli[m])||0) : 0);
  }
  const ctx = document.getElementById('chart-fat');
  if (!ctx) return;
  const existente = chartsAtivos.find(c=>c.canvas===ctx);
  if (existente) existente.destroy();
  const ch = new Chart(ctx, {
    type: 'line',
    data: { labels: meses.length?meses:['(sem dados)'],
      datasets: [{ label:'Faturamento', data: valores, borderColor: corVerde(1), backgroundColor: corVerde(0.1), fill:true, tension:0.3, pointRadius:5, pointBackgroundColor: corVerde(1) }] },
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false},
        tooltip:{ callbacks:{ label: c => 'R$ ' + c.parsed.y.toLocaleString('pt-BR') } } },
      scales:{ y:{ beginAtZero:true, ticks:{ callback: v => {
        if (v >= 1000000) return 'R$ ' + (v/1000000).toFixed(1) + 'mi';
        if (v >= 1000) return 'R$ ' + Math.round(v/1000) + 'k';
        return 'R$ ' + v;
      } } } } }
  });
  chartsAtivos.push(ch);
  if (meses.length < 2) {
    const aviso = document.getElementById('g-aviso');
    if (!aviso) {
      const d = document.createElement('div');
      d.id='g-aviso'; d.style.cssText='font-size:12px;color:var(--cinza-500);margin-top:8px;';
      d.innerHTML='<i class="ti ti-info-circle"></i> Só temos abril por enquanto. A linha ganha forma quando você importar maio, junho...';
      ctx.parentElement.after(d);
    }
  }
}

function graficoInad(inad) {
  const faixas = ['0-30','31-60','61-90','90+'];
  const dados = faixas.map(f => inad.filter(l=>String(l['AGING'])===f).reduce((s,l)=>s+(parseFloat(l['VALOR_ABERTO'])||0),0));
  const ctx = document.getElementById('chart-inad');
  if (!ctx) return;
  const ch = new Chart(ctx, {
    type:'doughnut',
    data:{ labels:faixas.map(f=>f+' dias'),
      datasets:[{ data:dados, backgroundColor:['#ca8a04','#d97706','#e24b4a','#a32d2d'] }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{font:{size:11}}}} }
  });
  chartsAtivos.push(ch);
  if (!inad.length) ctx.parentElement.innerHTML = '<div style="text-align:center;color:var(--cinza-500);padding-top:90px;font-size:13px;"><i class="ti ti-circle-check" style="font-size:28px;color:var(--verde-ok);"></i><br>Nenhum inadimplente</div>';
}

function graficoReaj(reajLinhas) {
  // Substituído pela seção interativa de impacto de reajustes (montada em renderGraficos)
  const ctx = document.getElementById('chart-reaj');
  if (!ctx) return;
  // mantém um gráfico simples de % médio por índice como visão geral
  const validos = reajLinhas.filter(r => r['ALIQUOTA']!=null && r['ALIQUOTA']!=='');
  const porIndice = {};
  validos.forEach(r => { const ind=normalizaIndice(r['ÍNDICE']); (porIndice[ind]=porIndice[ind]||[]).push(parseFloat(r['ALIQUOTA'])*100); });
  const labels = Object.keys(porIndice);
  const medias = labels.map(k => Math.round(porIndice[k].reduce((a,b)=>a+b,0)/porIndice[k].length*10)/10);
  const ch = new Chart(ctx, {
    type:'bar',
    data:{ labels: labels.length?labels:['(sem dados)'], datasets:[{ label:'% médio', data: medias, backgroundColor: corVerde(0.7) }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ y:{ ticks:{ callback:v=>v+'%' } } } }
  });
  chartsAtivos.push(ch);
}

let cacheFat = null, cacheFatCols = null;

async function renderFaturamento(area) {
  area.innerHTML = `<div class="placeholder"><i class="ti ti-loader"></i><h2>Carregando faturamento...</h2></div>`;
  await carregarClientes(); // pra saber tipo (Contrato/Eventual)
  const r = await buscarDados('Faturamento_Variacao');
  cacheFat = r.ok ? r.linhas : [];
  cacheFatCols = r.ok ? r.colunas : [];
  // meses = colunas que não são CLIENTE/CNPJ/VARIACAO_%
  const meses = cacheFatCols.filter(c => {
    const s = String(c).trim().toUpperCase();
    return s !== 'CNPJ' && s !== 'CLIENTE' && s !== 'VARIACAO_%' && s !== 'VARIACAO_PCT' && s !== 'STATUS_CNPJ' && s !== 'DIA_FATURAMENTO' && s !== 'DIA FATURAMENTO';
  }).map(c => String(c).trim());
  function rotuloMes(col) { return String(col); } // na variação os meses já vêm como texto (Março, Abril...)
  // mês escolhido: usa o que já estava selecionado, senão o último disponível
  const selRaw = (document.getElementById('fat-mes')||{}).value;
  const selAnterior = selRaw ? String(selRaw).trim() : '';
  const mesAtual = (selAnterior && meses.includes(selAnterior)) ? selAnterior : (meses[meses.length-1] || meses[0]);
  const idxMes = meses.indexOf(mesAtual);
  const mesAnterior = idxMes > 0 ? meses[idxMes-1] : null;

  // mapa de tipo por CNPJ (limpo, só dígitos — a Variação guarda CNPJ sem pontuação)
  const tipoPorCnpj = {};
  cacheClientes.forEach(c => { tipoPorCnpj[cnpjLimpo(c['CNPJ'])] = (c['TIPO']==='Eventual'?'Eventual':'Contrato'); });

  // valor do mês de uma linha, tolerante a espaço/variação na chave e formato BR
  function valMes(linha, mes) {
    let v = linha[mes];
    if (v == null) {
      const k = Object.keys(linha).find(kk => String(kk).trim() === String(mes).trim());
      v = k ? linha[k] : null;
    }
    if (v == null || v === '') return 0;
    if (typeof v === 'number') return v;
    let s = String(v).replace(/[^\d,.-]/g,'');
    if (s.includes(',') && s.lastIndexOf(',') > s.lastIndexOf('.')) s = s.replace(/\./g,'').replace(',','.');
    const n = parseFloat(s); return isNaN(n)?0:n;
  }
  // somatórios
  function somaTipo(mes, tipo) {
    return cacheFat.reduce((s,l) => {
      const t = tipoPorCnpj[cnpjLimpo(l['CNPJ'])] || 'Contrato';
      if (tipo && t !== tipo) return s;
      return s + valMes(l, mes);
    }, 0);
  }
  const totAtual = somaTipo(mesAtual, null);
  const totAnt = mesAnterior ? somaTipo(mesAnterior, null) : null;
  const contrAtual = somaTipo(mesAtual, 'Contrato');
  const contrAnt = mesAnterior ? somaTipo(mesAnterior, 'Contrato') : null;
  const evAtual = somaTipo(mesAtual, 'Eventual');
  const evAnt = mesAnterior ? somaTipo(mesAnterior, 'Eventual') : null;

  function varHtml(atual, ant) {
    if (ant == null || ant === 0) return '<span class="fat-var-zero">sem mês anterior</span>';
    const pct = ((atual-ant)/ant*100);
    const cls = pct > 0.05 ? 'fat-var-pos' : pct < -0.05 ? 'fat-var-neg' : 'fat-var-zero';
    const ico = pct > 0.05 ? 'ti-trending-up' : pct < -0.05 ? 'ti-trending-down' : 'ti-minus';
    return `<span class="${cls}"><i class="ti ${ico}"></i> ${pct>0?'+':''}${pct.toFixed(1)}% vs ${mesAnterior}</span>`;
  }

  area.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
      <select class="filtro-sel" id="fat-mes" onchange="renderFaturamento(document.getElementById('area-conteudo'))" style="min-width:140px;">
        ${meses.map(m=>`<option value="${m}" ${m===mesAtual?'selected':''}>${rotuloMes(m)}</option>`).join('')}
      </select>
      <button class="btn-importar" onclick="abrirImportarFat()"><i class="ti ti-upload"></i> Importar faturamento do mês</button>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px;">
      <div class="kpi-fat" style="border-top:3px solid var(--verde-escuro);">
        <div class="tit"><i class="ti ti-cash"></i> Total faturado · ${rotuloMes(mesAtual)}</div>
        <div class="val">${fmtMoeda(totAtual)}</div>
        <div class="var">${varHtml(totAtual, totAnt)}</div>
      </div>
      <div class="kpi-fat" style="border-top:3px solid var(--verde-ok);">
        <div class="tit"><i class="ti ti-file-text"></i> Contratos</div>
        <div class="val" style="font-size:22px;">${fmtMoeda(contrAtual)}</div>
        <div class="var">${varHtml(contrAtual, contrAnt)}</div>
      </div>
      <div class="kpi-fat" style="border-top:3px solid var(--cinza-500);">
        <div class="tit"><i class="ti ti-calendar-event"></i> Eventuais</div>
        <div class="val" style="font-size:22px;">${fmtMoeda(evAtual)}</div>
        <div class="var">${varHtml(evAtual, evAnt)}</div>
      </div>
    </div>

    <div class="barra-busca">
      <i class="ti ti-search"></i>
      <input type="text" id="fat-busca" placeholder="Buscar cliente..." oninput="filtraTabelaFat()">
      <span class="contagem">${cacheFat.length} clientes</span>
    </div>
    <div class="filtros" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <span class="filtro-chip ativo" id="ff-todos" onclick="setFiltroFat('todos',this)">Todos</span>
      <span class="filtro-chip" id="ff-contrato" onclick="setFiltroFat('Contrato',this)">Contrato</span>
      <span class="filtro-chip" id="ff-eventual" onclick="setFiltroFat('Eventual',this)">Eventual</span>
      <select class="filtro-sel" id="fat-ordem" onchange="filtraTabelaFat()" style="margin-left:auto;min-width:170px;">
        <option value="maior">Maior faturamento</option>
        <option value="menor">Menor faturamento</option>
        <option value="nome">Nome (A-Z)</option>
      </select>
    </div>
    <div id="fat-tabela-area"></div>`;

  window._fatMes = mesAtual;
  window._fatMesAnt = mesAnterior;
  window._fatRotulo = rotuloMes;
  window._tipoPorCnpj = tipoPorCnpj;
  window._valMes = valMes;
  window._filtroFatTipo = 'todos';
  filtraTabelaFat();
}

function setFiltroFat(t, el) {
  window._filtroFatTipo = t;
  document.querySelectorAll('[id^="ff-"]').forEach(c=>c.classList.remove('ativo'));
  if (el) el.classList.add('ativo');
  filtraTabelaFat();
}

function filtraTabelaFat() {
  const termo = ((document.getElementById('fat-busca')||{}).value||'').toLowerCase();
  const mes = window._fatMes, mesAnt = window._fatMesAnt, tipos = window._tipoPorCnpj;
  const vm = window._valMes || ((l,m)=>parseFloat(l[m])||0);
  const rot = window._fatRotulo || (m=>m);
  const filtroTipo = window._filtroFatTipo || 'todos';
  let lista = cacheFat.slice();
  if (termo) lista = lista.filter(l => String(l['CLIENTE']||'').toLowerCase().includes(termo));
  if (filtroTipo !== 'todos') lista = lista.filter(l => (tipos[cnpjLimpo(l['CNPJ'])]||'Contrato') === filtroTipo);
  const ordem = (document.getElementById('fat-ordem')||{}).value || 'maior';
  if (ordem === 'menor') lista = lista.sort((a,b)=>vm(a,mes)-vm(b,mes));
  else if (ordem === 'nome') lista = lista.sort((a,b)=>String(a['CLIENTE']||'').localeCompare(String(b['CLIENTE']||'')));
  else lista = lista.sort((a,b)=>vm(b,mes)-vm(a,mes));

  let html = `<table class="fat-tabela"><thead><tr>
    <th>Cliente</th><th>Tipo</th><th class="num">${rot(mes)}</th>${mesAnt?`<th class="num">${rot(mesAnt)}</th><th class="num">Variação</th>`:''}
    </tr></thead><tbody>`;
  lista.slice(0,200).forEach(l => {
    const atual = vm(l, mes);
    const ant = mesAnt ? vm(l, mesAnt) : null;
    const tipo = tipos[cnpjLimpo(l['CNPJ'])] || 'Contrato';
    let varCol = '';
    if (mesAnt) {
      if (ant === 0) varCol = `<td class="num fat-var-zero">novo</td>`;
      else { const p=((atual-ant)/ant*100); varCol = `<td class="num ${p>0.05?'fat-var-pos':p<-0.05?'fat-var-neg':'fat-var-zero'}">${p>0?'+':''}${p.toFixed(1)}%</td>`; }
    }
    html += `<tr onclick="abrirFicha('${String(l['CNPJ']).replace(/'/g,'')}')">
      <td><b style="color:var(--cinza-900);">${l['CLIENTE']||'—'}</b></td>
      <td><span class="tag ${tipo==='Eventual'?'tag-eventual':'tag-contrato'}">${tipo}</span></td>
      <td class="num"><b>${fmtMoeda(atual)}</b></td>
      ${mesAnt?`<td class="num" style="color:var(--cinza-600);">${fmtMoeda(ant)}</td>${varCol}`:''}
    </tr>`;
  });
  html += `</tbody></table>`;
  if (lista.length > 200) html += `<div style="margin-top:8px;font-size:12px;color:var(--cinza-500);">Mostrando 200 de ${lista.length}. Use a busca.</div>`;
  document.getElementById('fat-tabela-area').innerHTML = html;
}

// processa o texto colado da Variação e envia pro Apps Script fazer o merge
async function processarVariacao() {
  const texto = document.getElementById('imp-var-texto').value.trim();
  const msg = document.getElementById('imp-var-msg');
  if (!texto) { msg.innerHTML='<div class="sem-acesso" style="margin-top:10px;">Cole as linhas da variação.</div>'; return; }
  // separar linhas e colunas (aceita tab, ; ou 2+ espaços)
  const linhas = texto.split('\n').map(l=>l.trim()).filter(Boolean).map(l => l.split(/\t|;|\s{2,}/).map(c=>c.trim()));
  // primeira coluna = cliente; demais = valores (pega a última não vazia como mês mais recente)
  const registros = linhas.map(cols => {
    const cliente = cols[0];
    const valores = cols.slice(1).map(v => { let s=String(v).replace(/[^\d,.-]/g,'').replace(/\./g,'').replace(',','.'); const n=parseFloat(s); return isNaN(n)?0:n; });
    return { cliente, valores };
  }).filter(r => r.cliente && r.cliente.length>2);
  if (!registros.length) { msg.innerHTML='<div class="sem-acesso" style="margin-top:10px;">Não consegui ler nenhuma linha. Verifique o formato.</div>'; return; }
  msg.innerHTML = '<div style="text-align:center;padding:10px;color:var(--cinza-500);">Processando merge...</div>';
  try {
    const resp = await fetch(API_URL, { method:'POST', body: JSON.stringify({
      acao:'importarVariacao', token: sessaoToken, dados:{ registros }
    })});
    const r = await resp.json();
    if (!r.ok) { msg.innerHTML=`<div class="sem-acesso">${r.erro||'verifique se o Apps Script foi republicado.'}</div>`; return; }
    cacheFat = null;
    let aviso = '';
    if (r.naoCasados && r.naoCasados.length) {
      aviso = `<div style="background:var(--amarelo-bg);border-radius:8px;padding:10px;margin-top:10px;font-size:12.5px;color:#8a6d00;"><b>${r.naoCasados.length} clientes não casaram por nome</b> (ficaram salvos sem CNPJ). Me mande os CNPJs deles que eu ensino o sistema:<br>${r.naoCasados.map(n=>'• '+n).join('<br>')}</div>`;
    }
    msg.innerHTML = `<div style="background:var(--verde-ok-bg);border-radius:8px;padding:10px;margin-top:10px;color:var(--verde-ok);font-size:13px;"><i class="ti ti-circle-check"></i> Merge feito! ${r.atualizados||0} atualizados, ${r.novos||0} novos.</div>${aviso}`;
    if (!r.naoCasados || !r.naoCasados.length) setTimeout(()=>{ fecharFicha(); renderFaturamento(document.getElementById('area-conteudo')); }, 2500);
  } catch(e) { msg.innerHTML='<div class="sem-acesso">Erro de conexão.</div>'; }
}

function moedaCSV(s) {
  s = String(s).replace(/[^\d,.-]/g,'').replace(/\./g,'').replace(',','.');
  const n = parseFloat(s); return isNaN(n)?0:n;
}

async function processarCSVRelatorio() {
  const arq = document.getElementById('imp-arquivo').files[0];
  const prev = document.getElementById('imp-preview');
  if (!arq) { prev.innerHTML = '<div class="sem-acesso">Selecione o arquivo CSV.</div>'; return; }
  prev.innerHTML = '<div style="text-align:center;color:var(--cinza-500);padding:12px;">Lendo arquivo...</div>';
  const texto = await arq.text();
  const linhas = texto.split('\n').map(l => l.split(';'));
  // cabeçalho: achar índices
  const cab = linhas[0].map(c=>String(c).replace(/^\ufeff/,'').replace(/"/g,'').trim().toUpperCase());
  const iCnpj = cab.findIndex(c=>c.includes('CNPJ'));
  const iCli = cab.findIndex(c=>c.includes('CLIENTE'));
  const iTe = cab.findIndex(c=>c.includes('TIPO DE EQUIP'));
  const iEnd = cab.findIndex(c=>c.includes('END') && c.includes('COLETA'));
  const iFreq = cab.findIndex(c=>c.includes('FREQU'));
  function fmtFreq(f){ const dias=(String(f).toUpperCase().match(/\[([A-ZÇÁ]+)\]/g)||[]).map(x=>x.replace(/[\[\]]/g,'')); const mapa={'SEG':'Seg','TER':'Ter','QUA':'Qua','QUI':'Qui','SEX':'Sex','SAB':'Sáb','SÁB':'Sáb','DOM':'Dom'}; const ns=dias.map(d=>mapa[d]||d); if(!ns.length)return String(f||'').trim(); if(ns.length>=6)return 'Diária ('+ns.length+'x/sem)'; return ns.join(', ')+' ('+ns.length+'x/sem)'; }
  function categoria(te){ const t=String(te).toUpperCase(); if(t.includes('SACO'))return 'SACO'; if(t.includes('CONT'))return 'CONTEINER'; if(t.includes('CAIXA')||t.includes('ROLL ON')||t.includes('BROOKS')||t.includes('COMPACTADORA'))return 'CACAMBA'; if(t.includes('BIG BAG'))return 'BIGBAG'; return 'OUTRO'; }
  function ehEquip(te){ const t=String(te).toUpperCase().trim(); if(!t)return false; if(t.startsWith('R$')||t.startsWith('-R$'))return false; if(['PARCELAS','TOTAL TAXA','QTDE. DE EQUIP.','TOTAL QTDE SERVIÇO','À GRANEL'].includes(t))return false; return true; }
  const porCnpj = {};
  for (let i=1;i<linhas.length;i++) {
    const r = linhas[i]; if (r.length<=iTe) continue;
    const te = (r[iTe]||'').replace(/"/g,'').trim();
    if (!ehEquip(te)) continue;
    const cnpj = (r[iCnpj]||'').replace(/\D/g,'');
    if (cnpj.length!==14) continue;
    if (!porCnpj[cnpj]) porCnpj[cnpj] = { cnpj, nome:(r[iCli]||'').replace(/"/g,'').trim(), endereco:(iEnd>=0?(r[iEnd]||'').replace(/"/g,'').trim():''), frequencia:(iFreq>=0?fmtFreq(r[iFreq]):''), total:0, SACO:0, CONTEINER:0, CACAMBA:0, BIGBAG:0, OUTRO:0 };
    if (iEnd>=0 && !porCnpj[cnpj].endereco) porCnpj[cnpj].endereco = (r[iEnd]||'').replace(/"/g,'').trim();
    if (iFreq>=0 && !porCnpj[cnpj].frequencia) porCnpj[cnpj].frequencia = fmtFreq(r[iFreq]);
    porCnpj[cnpj].total++; porCnpj[cnpj][categoria(te)]++;
  }
  const arr = Object.values(porCnpj);
  if (!arr.length) { prev.innerHTML = '<div class="sem-acesso">Não encontrei coletas válidas no arquivo.</div>'; return; }
  window._coletasImport = arr;
  prev.innerHTML = `
    <div style="background:var(--verde-claro-bg);border-radius:8px;padding:14px;">
      <div style="font-size:14px;color:var(--verde-escuro);font-weight:600;margin-bottom:6px;"><i class="ti ti-circle-check"></i> Processado!</div>
      <div style="font-size:13px;color:var(--cinza-700);">${arr.length} clientes com coletas.</div>
      <button class="ficha-btn-primario" style="width:100%;margin-top:12px;padding:10px;border:none;border-radius:8px;cursor:pointer;" onclick="gravarColetas()"><i class="ti ti-device-floppy"></i> Gravar coletas</button>
      <div id="grava-msg" style="margin-top:8px;"></div>
    </div>`;
}
async function gravarColetas() {
  const arr = window._coletasImport;
  if (!arr || !arr.length) return;
  const mesRef = (document.getElementById('imp-mes')||{}).value || '';
  if (!mesRef) { document.getElementById('imp-preview').insertAdjacentHTML('beforeend','<div class="sem-acesso" style="margin-top:8px;">Escolha o mês de referência das coletas.</div>'); return; }

    setTimeout(()=>{ fecharFicha(); }, 2000);

}

function valorPerdidoCanc(c) {
  // valor pago (média últimos 3 meses) é o melhor proxy de receita perdida; senão valor contrato
  let v = parseFloat(String(c['VALOR PAGO (média últimos 3 meses)']||'').replace(/[^\d,.-]/g,'').replace(/\./g,'').replace(',','.'));
  if (isNaN(v) || v===0) v = parseFloat(String(c['VALOR CONTRATO']||'').replace(/[^\d,.-]/g,'').replace(/\./g,'').replace(',','.'));
  return isNaN(v) ? 0 : v;
}

function filtraCanc() {
  const termo = ((document.getElementById('canc-busca')||{}).value||'').toLowerCase();
  const motivo = (document.getElementById('canc-motivo')||{}).value||'';
  const dIni = (document.getElementById('canc-ini')||{}).value||'';
  const dFim = (document.getElementById('canc-fim')||{}).value||'';
  let lista = cacheCanc.filter(c => {
    if (termo && !String(c['CLIENTE']||'').toLowerCase().includes(termo)) return false;
    if (motivo && c['MOTIVO']!==motivo) return false;
    if (dIni || dFim) {
      const d = parseDataReaj(c['DATA DE CANCELAMENTO']);
      if (!d) return false;
      if (dIni && d < new Date(dIni+'T00:00:00')) return false;
      if (dFim && d > new Date(dFim+'T23:59:59')) return false;
    }
    return true;
  });

  // card de R$ perdidos
  const totalPerdido = lista.reduce((s,c)=>s+valorPerdidoCanc(c),0);
  const kpiArea = document.getElementById('canc-kpis');
  if (kpiArea) {
    const periodo = (dIni||dFim) ? `${dIni?fmtDataBR(dIni):'...'} a ${dFim?fmtDataBR(dFim):'...'}` : 'todo o período';
    kpiArea.innerHTML = `<div class="kpi-funil" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));">
      <div class="kpi-card" style="border-top:3px solid var(--vermelho);"><div class="kpi-num" style="color:var(--vermelho);">${lista.length}</div><div class="kpi-lbl">Cancelamentos</div></div>
      <div class="kpi-card" style="border-top:3px solid var(--vermelho);"><div class="kpi-num" style="color:var(--vermelho);font-size:22px;">${fmtMoeda(totalPerdido)}</div><div class="kpi-lbl">R$ perdidos · ${periodo}</div></div>
    </div>`;
  }

  const res = document.getElementById('canc-resultado');
  if (window._modoCanc === 'lista') {
    let html = '<div class="lista-cli">';
    lista.slice(0,300).forEach(c => {
      html += `<div class="lista-cli-item" style="grid-template-columns:1fr auto auto;">
        <div><b style="color:var(--cinza-900);">${c['CLIENTE']||'—'}</b><br><span style="color:var(--cinza-500);font-size:12px;">${c['MOTIVO']||'Motivo não informado'}</span></div>
        <span style="color:var(--cinza-600);">${fmtDataBR(c['DATA DE CANCELAMENTO'])}</span>
        <span style="color:var(--vermelho);font-weight:600;">${c['CONSULTOR']||''}</span>
      </div>`;
    });
    res.innerHTML = html + '</div>';
    return;
  }
  if (!lista.length) { res.innerHTML = '<div class="sem-acesso">Nenhum cancelamento com esses filtros.</div>'; return; }
  let html = '<div class="grid-cards">';
  lista.slice(0,150).forEach(c => {
    html += `<div class="card-cli cancelado" style="cursor:default;">
      <div class="card-cli-topo">
        <div class="card-cli-avatar" style="background:var(--vermelho-bg);color:var(--vermelho);">${iniciais(c['CLIENTE'])}</div>
        <div style="min-width:0;">
          <div class="card-cli-nome">${c['CLIENTE']||'—'}</div>
          <div class="card-cli-cnpj">${c['CNPJ']||'—'}</div>
        </div>
      </div>
      <div class="card-cli-tags">
        <span class="tag" style="background:var(--vermelho-bg);color:var(--vermelho);">${c['MOTIVO']||'Motivo n/d'}</span>
      </div>
      <div class="card-cli-linha borda"><span>Data cancelamento</span><b>${fmtDataBR(c['DATA DE CANCELAMENTO'])}</b></div>
      <div class="card-cli-linha"><span>Consultor</span><span>${c['CONSULTOR']||'—'}</span></div>
      ${c['MULTA']?`<div class="card-cli-linha"><span>Multa</span><span>${c['MULTA']}</span></div>`:''}
    </div>`;
  });
  res.innerHTML = html + '</div>';
}

async function renderVisaoCarteira(area) {

  const fatLinhas = rf.ok ? rf.linhas : [];

  const meses = cols.filter(c => { const s=String(c).trim(); return s!=='CNPJ'&&s!=='CLIENTE'&&!s.toUpperCase().startsWith('COLETAS')&&!s.toUpperCase().startsWith('COB'); });
  const mesAtual = meses[meses.length-1];
  const mesAnt = meses.length>=2 ? meses[meses.length-2] : null;
  function rotuloMes(col){ const s=String(col); if(s.includes('T')&&/^\d{4}-\d{2}/.test(s)){const ab=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];const p=s.split('T')[0].split('-');return ab[parseInt(p[1],10)-1]+'/'+p[0].slice(-2);} return s; }

  function num(v){ if(v==null||v==='')return 0; if(typeof v==='number')return v; let s=String(v).replace(/[^\d,.-]/g,''); if(s.includes(',')&&s.lastIndexOf(',')>s.lastIndexOf('.'))s=s.replace(/\./g,'').replace(',','.'); const n=parseFloat(s); return isNaN(n)?0:n; }

  const fatTotal = fatLinhas.reduce((s,l)=>s+num(l[mesAtual]),0);

      <div class="kpi-fat" style="border-top:3px solid var(--verde-escuro);">
        <div class="tit"><i class="ti ti-cash"></i> MRR · Faturamento ${rotuloMes(mesAtual)}</div>
        <div class="val">${fmtMoeda(fatTotal)}</div>
        <div class="var">${varFat||'<span class="fat-var-zero">base do mês</span>'}</div>
      </div>
      <div class="kpi-fat" style="border-top:3px solid var(--verde-ok);">

        <div class="val">${ativos}</div>
        <div class="var" style="color:var(--cinza-500);">${contratos} contrato · ${eventuais} eventual</div>
      </div>
      <div class="kpi-fat" style="border-top:3px solid var(--verde-medio);">
        <div class="tit"><i class="ti ti-receipt"></i> Ticket médio</div>
        <div class="val" style="font-size:22px;">${fmtMoeda(ticket)}</div>
        <div class="var" style="color:var(--cinza-500);">por cliente faturando</div>
      </div>
      <div class="kpi-fat" style="border-top:3px solid var(--vermelho);">

// ---- Helpers de vencimento ----
function diasAteVencer(dataStr) {
  const d = parseDataReaj(dataStr);
  if (!d) return null;
  return Math.round((d - Date.now())/(1000*60*60*24));
}
function classifVenc(dias) {
  if (dias == null) return { cls:'ok', pill:'pill-ok', txt:'sem data', faixa:'sem' };
  if (dias < 0) return { cls:'venc', pill:'pill-venc', txt:'Vencido', faixa:'vencido' };
  if (dias <= 30) return { cls:'r30', pill:'pill-r30', txt:`vence em ${dias}d`, faixa:'30' };
  if (dias <= 60) return { cls:'r60', pill:'pill-r60', txt:`vence em ${dias}d`, faixa:'60' };
  return { cls:'ok', pill:'pill-ok', txt:`vence em ${dias}d`, faixa:'vigente' };
}

// status RGG -> precisa de e-mail / renovar?
function rggPrecisaAcao(d) {
  const st = String(d['STATUS']||'').toLowerCase();
  if (st.includes('renova')) return false; // Em renovação não recebe
  return true;
}
function rggStatusEfetivo(d) {
  const st = String(d['STATUS']||'').toLowerCase();
  if (st.includes('pendente')) return 'pendente';
  if (st.includes('renova')) return 'em_renovacao';
  const dias = diasAteVencer(d['DATA_VALIDADE']);
  if (dias != null && dias < 0) return 'vencido';
  return 'vigente';
}

}

function setFiltroReg(tipo, f, el) { window._regFiltro=f; document.querySelectorAll('[id^="rgf-"]').forEach(c=>c.classList.remove('ativo')); if(el)el.classList.add('ativo'); filtraRegula(tipo); }

function filtraRegula(tipo) {
  const dados = tipo==='rgg' ? cacheRGG : cacheSIGOR;
  const termo = ((document.getElementById('reg-busca')||{}).value||'').toLowerCase();
  const f = window._regFiltro||'todos';

  let lista = dados.map(d => {
    const dias = tipo==='rgg' ? diasAteVencer(d['DATA_VALIDADE']) : null;
    return { ...d, _dias: dias, _c: classifVenc(dias), _ef: tipo==='rgg'?rggStatusEfetivo(d):null };
  });
  if (termo) lista = lista.filter(d => `${d['CLIENTE']||''} ${d['CONSULTOR']||''} ${d['RESPONSAVEL_CLIENTE']||''}`.toLowerCase().includes(termo));

  if (tipo==='rgg') {
    if (f==='venc') lista = lista.filter(d=>d._ef==='vencido');
    else if (f==='30') lista = lista.filter(d=>d._dias!=null && d._dias>=0 && d._dias<=30);
    else if (f==='60') lista = lista.filter(d=>d._dias!=null && d._dias>30 && d._dias<=60);
    else if (f==='vigente') lista = lista.filter(d=>d._ef==='vigente' && (d._dias==null||d._dias>60));
    else if (f==='pendente') lista = lista.filter(d=>d._ef==='pendente');
    else if (f==='renov') lista = lista.filter(d=>d._ef==='em_renovacao');
    lista.sort((a,b)=>(a._dias==null?99999:a._dias)-(b._dias==null?99999:b._dias));
  } else {
    const st = x => String(x['STATUS']||'').toLowerCase();
    if (f==='irregular') lista = lista.filter(d=>st(d).includes('irregular'));
    else if (f==='regular') lista = lista.filter(d=>st(d).includes('regular') && !st(d).includes('eventual'));
    else if (f==='eventual') lista = lista.filter(d=>st(d).includes('eventual'));
    else if (f==='analise') lista = lista.filter(d=>st(d).includes('análise')||st(d).includes('analise'));
  }

  const res = document.getElementById('reg-resultado');
  if (!lista.length) { res.innerHTML = '<div class="sem-acesso">Nenhum cadastro encontrado.</div>'; return; }
  let html = '<div class="grid-cards">';
  lista.slice(0,200).forEach(d => {
    if (tipo==='rgg') {
      const ef = d._ef;
      const podeEmail = ef==='vencido'||ef==='pendente'|| (d._dias!=null && d._dias>=0 && d._dias<=60);
      const podeRenovar = ef==='vencido'||ef==='pendente'|| (d._dias!=null && d._dias>=0 && d._dias<=60);
      const pillTxt = ef==='pendente'?'Sem cadastro':ef==='em_renovacao'?'Em renovação':ef==='vencido'?'Vencido':d._c.txt;

      const cardCls = ef==='em_renovacao'?'ok':ef==='pendente'?'ok':d._c.cls;
      const jaEnviado = d['ALERTA_ENVIADO_EM'] ? fmtDataBR(d['ALERTA_ENVIADO_EM']) : null;
      html += `<div class="reaj-card ${cardCls}" style="cursor:default;">
        <div class="reaj-topo"><div style="min-width:0;"><div class="reaj-nome">${d['CLIENTE']||'—'}</div><div class="reaj-cnpj">${d['RESPONSAVEL_CLIENTE']||''}${d['CONSULTOR']?' · '+d['CONSULTOR']:''}</div></div>
        <span class="reaj-pill ${pillCls}">${pillTxt}</span></div>
        <div class="reaj-linhas"><div><span>Validade</span><b>${fmtDataBR(d['DATA_VALIDADE'])}</b></div><div><span>Consultor</span><b style="font-size:12px;">${d['CONSULTOR']||'—'}</b></div></div>

          ${podeEmail?`<button class="ficha-btn-secundario" style="flex:1;padding:7px;border-radius:7px;cursor:pointer;font-size:12px;" onclick="abrirEmailAlerta('rgg','${String(d['ID']||'').replace(/'/g,'')}')"><i class="ti ti-mail"></i> Alerta</button>`:''}
          ${podeRenovar?`<button class="ficha-btn-primario" style="flex:1;padding:7px;border:none;border-radius:7px;cursor:pointer;font-size:12px;" onclick="abrirModalRenovar('${String(d['ID']||'').replace(/'/g,'')}')"><i class="ti ti-refresh"></i> Renovar</button>`:''}
        </div>

function abrirEmailAlerta(tipo, id) {
  const dados = tipo==='rgg' ? cacheRGG : cacheSIGOR;

  if (!d) { alert('Cadastro não encontrado.'); return; }

  let templateKey;
  if (tipo==='sigor') templateKey = 'sigor_irregular';
  else {
    const ef = rggStatusEfetivo(d);
    if (ef==='pendente') templateKey = 'rgg_pendente';
    else if (ef==='vencido') templateKey = 'rgg_vencido';
    else templateKey = 'rgg_a_vencer';
  }
  const tpl = TEMPLATES_EMAIL[templateKey];
  const dias = diasAteVencer(d['DATA_VALIDADE']);
  const assinatura = gerarAssinatura(d['CONSULTOR']);

  let assunto = tpl.assunto
    .replace(/{{cliente}}/g, d['CLIENTE']||'')
    .replace(/{{dias_vencer}}/g, dias!=null?Math.abs(dias):'');
  let corpo = tpl.corpo
    .replace(/{{cliente}}/g, d['CLIENTE']||'')
    .replace(/{{responsavel}}/g, d['RESPONSAVEL_CLIENTE']||'responsável')
    .replace(/{{data_vencimento}}/g, fmtDataBR(d['DATA_VALIDADE']))
    .replace(/{{dias_vencido}}/g, dias!=null?Math.abs(dias):'')
    .replace(/{{dias_vencer}}/g, dias!=null?Math.abs(dias):'')
    .replace(/{{assinatura}}/g, assinatura);

  // destinatários
  const para = d['CONTATO_EMAIL'] || '';
  const consultorEmail = (DADOS_CONSULTORES[d['CONSULTOR']]||{}).email || '';
  const cc = [consultorEmail, ...DIRETORES_CC].filter(Boolean).join(',');

  // modal de pré-visualização + botão abrir e-mail
  const cont = document.getElementById('ficha-container');
  cont.innerHTML = `
    <div class="ficha-overlay" onclick="if(event.target===this)fecharFicha()">
      <div class="ficha" style="width:600px;">
        <div class="ficha-topo">
          <button class="fechar" onclick="fecharFicha()"><i class="ti ti-x"></i></button>

          <div style="font-size:12px;color:var(--cinza-600);margin-bottom:4px;"><b>CC:</b> ${cc}</div>
          <div style="font-size:12px;color:var(--cinza-600);margin-bottom:10px;"><b>Assunto:</b> ${assunto}</div>
          <div style="background:var(--cinza-100);border-radius:8px;padding:14px;font-size:12.5px;white-space:pre-wrap;max-height:280px;overflow-y:auto;color:var(--cinza-800);">${corpo}</div>
          <div class="ficha-botoes">
            <button class="ficha-btn-primario" onclick="dispararMailto('${encodeURIComponent(para)}','${encodeURIComponent(cc)}','${encodeURIComponent(assunto)}', this)" data-corpo="${encodeURIComponent(corpo)}" data-tipo="${tipo}" data-id="${String(id).replace(/'/g,'')}"><i class="ti ti-external-link"></i> Abrir no meu e-mail</button>
            <button class="ficha-btn-secundario" onclick="fecharFicha()">Fechar</button>
          </div>
          <div style="font-size:11px;color:var(--cinza-500);margin-top:8px;">Abre seu programa de e-mail com tudo preenchido. Você revisa e clica enviar. Lembre de anexar a proposta se desejar.</div>
        </div>
      </div>
    </div>`;
}

function dispararMailto(para, cc, assunto, btn) {
  const corpo = btn.getAttribute('data-corpo');
  const tipo = btn.getAttribute('data-tipo');
  const id = btn.getAttribute('data-id');
  const link = `mailto:${decodeURIComponent(para)}?cc=${decodeURIComponent(cc)}&subject=${assunto}&body=${corpo}`;

  // marcar alerta enviado (visual; persistência exige ação no Apps Script - opcional)

}

async function renderRenovados(area) {
  area.innerHTML = `<div class="placeholder"><i class="ti ti-loader"></i><h2>Carregando renovações...</h2></div>`;
  const r = await buscarDados('Historico_Renovacoes_SP');
  const hist = r.ok ? r.linhas : [];
  if (!hist.length) { area.innerHTML = `<div class="placeholder"><i class="ti ti-refresh"></i><h2>Nenhuma renovação registrada</h2><p>As renovações feitas aparecerão aqui.</p></div>`; return; }
  function valorNum(v){ if(v==null||v==='')return 0; if(typeof v==='number')return v; let s=String(v).replace(/[^\d,.-]/g,''); if(s.includes(',')&&s.lastIndexOf(',')>s.lastIndexOf('.'))s=s.replace(/\./g,'').replace(',','.'); const n=parseFloat(s); return isNaN(n)?0:n; }
  const agora = Date.now();
  const ultimos30 = hist.filter(h=>{ const d=parseDataReaj(h['DATA_RENOVACAO']); return d && (agora-d.getTime())/(1000*60*60*24)<=30; });
  const comAss = ultimos30.filter(h=>String(h['ASSESSORIA']).toLowerCase().includes('sim'));
  const semAss = ultimos30.filter(h=>!String(h['ASSESSORIA']).toLowerCase().includes('sim'));
  const receita = comAss.reduce((s,h)=>s+valorNum(h['VALOR']),0);

  // receita por consultor
  const porConsultor = {};
  comAss.forEach(h=>{ const c=h['CONSULTOR']||'—'; porConsultor[c]=(porConsultor[c]||0)+valorNum(h['VALOR']); });
  const totalConsultor = Object.values(porConsultor).reduce((a,b)=>a+b,0)||1;

  let html = `
    <div class="kpi-funil" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr));">
      <div class="kpi-card" style="border-top:3px solid var(--verde-escuro);"><div class="kpi-num">${ultimos30.length}</div><div class="kpi-lbl">Renovações (30d)</div></div>
      <div class="kpi-card" style="border-top:3px solid var(--verde-ok);"><div class="kpi-num" style="font-size:20px;color:var(--verde-ok);">${fmtMoeda(receita)}</div><div class="kpi-lbl">Receita (30d)</div></div>
      <div class="kpi-card" style="border-top:3px solid var(--verde-medio);"><div class="kpi-num" style="color:var(--verde-medio);">${comAss.length}</div><div class="kpi-lbl">Com assessoria</div></div>
      <div class="kpi-card" style="border-top:3px solid var(--cinza-500);"><div class="kpi-num" style="color:var(--cinza-600);">${semAss.length}</div><div class="kpi-lbl">Sem assessoria</div></div>
    </div>`;

  if (Object.keys(porConsultor).length) {
    html += `<div style="background:white;border:1px solid var(--cinza-200);border-radius:12px;padding:18px;margin-top:16px;">
      <h3 style="font-family:var(--fonte-display);font-size:15px;margin:0 0 14px;color:var(--cinza-900);">Receita por consultor (30d)</h3>`;
    Object.entries(porConsultor).sort((a,b)=>b[1]-a[1]).forEach(([c,v])=>{
      html += `<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--cinza-600);margin-bottom:3px;"><span>${c}</span><b>${fmtMoeda(v)} (${Math.round(v/totalConsultor*100)}%)</b></div>
        <div style="background:var(--cinza-100);border-radius:5px;height:10px;"><div style="width:${v/totalConsultor*100}%;height:100%;background:var(--verde-medio);border-radius:5px;"></div></div></div>`;
    });
    html += `</div>`;
  }

  html += `<h3 style="font-family:var(--fonte-display);font-size:16px;margin:20px 0 12px;color:var(--cinza-900);">Todas as renovações</h3><div class="lista-cli">`;
  hist.sort((a,b)=>{ const da=parseDataReaj(a['DATA_RENOVACAO'])||0, db=parseDataReaj(b['DATA_RENOVACAO'])||0; return db-da; }).forEach(h => {
    const ass = String(h['ASSESSORIA']).toLowerCase().includes('sim');
    html += `<div class="lista-cli-item" style="grid-template-columns:1fr auto auto;cursor:default;">
      <div><b style="color:var(--cinza-900);">${h['CLIENTE_NOME']||'—'}</b><br><span style="color:var(--cinza-500);font-size:12px;">${h['TIPO']||''} · renovado ${fmtDataBR(h['DATA_RENOVACAO'])} · ${h['CONSULTOR']||'—'}</span></div>
      <span class="tag ${ass?'tag-contrato':'tag-eventual'}">${ass?'Com assessoria':'Cliente sozinho'}</span>
      <span style="color:var(--verde-escuro);font-weight:600;">${ass?fmtMoeda(valorNum(h['VALOR'])):'—'}</span>
    </div>`;
  });
  area.innerHTML = html + '</div>';
}

async function decidirReaj(id, decisao) {
  if (!confirm(`Confirma ${decisao==='Aprovado'?'APROVAR':'NEGAR'} este reajuste?`)) return;
  try {
    const resp = await fetch(API_URL, { method:'POST', body: JSON.stringify({
      acao:'decidirReajuste', token: sessaoToken, dados:{ id, decisao }
    })});
    const r = await resp.json();
    if (!r.ok) { alert('Erro: '+r.erro); return; }
    alert('Reajuste '+decisao+'!'+(decisao==='Aprovado'?' O novo valor passou a valer e o antigo foi pro histórico.':''));
    renderAprovacoes(document.getElementById('area-conteudo'));
  } catch(e) { alert('Erro de conexão.'); }
}

async function abrirEmailLoteReaj() {
  // monta lista de reajustes do mês selecionado a partir da aba Reajustes
  if (!cacheReajustes) { const r = await buscarDados('Reajustes'); cacheReajustes = r.ok?r.linhas:[]; }
  const mes = prompt('Digite o mês/ano para enviar os reajustes (ex: 06/2026):');
  if (!mes) return;
  const [mm, aaaa] = mes.split('/');
  const doMes = cacheReajustes.filter(r => {
    const d = proximoReajuste(r['DATA ÚLTIMO REAJUSTE '] || r['DATA ÚLTIMO REAJUSTE']);
    return d && (d.getMonth()+1)==parseInt(mm,10) && d.getFullYear()==parseInt(aaaa,10);
  });
  if (!doMes.length) { alert('Nenhum reajuste previsto para '+mes); return; }
  const listaEmail = doMes.map(r => {
    const base = parseMoedaReaj(r['VALOR REAJUSTADO'])||parseMoedaReaj(r['PREÇO ANTERIOR'])||0;
    const pct = parseFloat(r['ALIQUOTA'])*100||0;
    return { cliente:r['CLIENTE'], valorAtual:fmtMoeda(base), valorNovo:fmtMoeda(base*(1+pct/100)), percentual:pct.toFixed(1)+'%', indice:r['ÍNDICE']||'—' };
  });
  // montar corpo do e-mail em texto (tabela alinhada) e abrir o Outlook via mailto
  const linhas = listaEmail.map((e,i) =>
    `${(i+1)}. ${e.cliente}\n   Atual: ${e.valorAtual}  |  Reajuste: ${e.percentual} (${e.indice})  |  Novo: ${e.valorNovo}`
  ).join('\n\n');
  const para = DIRETORES_CC.join(',');
  const assunto = encodeURIComponent(`Reajustes previstos para ${mes} — aprovação`);
  const corpo = encodeURIComponent(
`Prezados,

Seguem os ${listaEmail.length} reajustes previstos para ${mes}, para aprovação:

${linhas}

Aguardo a aprovação para aplicar os reajustes acima.

Atenciosamente,
${usuarioAtual.nome}
Ecotrans Ambiental`);
  window.location.href = `mailto:${para}?subject=${assunto}&body=${corpo}`;
}

async function enviarSolicitacaoPreco() {
  const cliente = document.getElementById('pr-cliente').value;
  const descricao = document.getElementById('pr-desc').value;
  const residuo = document.getElementById('pr-residuo').value;
  const obs = document.getElementById('pr-obs').value;
  if (!cliente || !descricao) { document.getElementById('pr-msg').innerHTML='<div class="sem-acesso" style="margin-top:10px;">Preencha o lead e a descrição.</div>'; return; }
  // validar que é um lead existente
  const leadExiste = (kanbanLeads||[]).some(l=>String(l['CLIENTE'])===cliente);
  if (!leadExiste) { document.getElementById('pr-msg').innerHTML='<div class="sem-acesso" style="margin-top:10px;">Escolha um lead da lista. Se não existir, crie no Funil primeiro.</div>'; return; }
  const leadObj = (kanbanLeads||[]).find(l=>String(l['CLIENTE'])===cliente);
  const cnpj = leadObj && leadObj['CNPJ'] ? leadObj['CNPJ'] : '';
  document.getElementById('pr-msg').innerHTML = '<div style="text-align:center;padding:10px;color:var(--cinza-500);">Enviando...</div>';
  try {
    const resp = await fetch(API_URL, { method:'POST', body: JSON.stringify({
      acao:'solicitarPreco', token: sessaoToken, dados:{ cliente, cnpj, descricao, residuo, obs }
    })});
    const r = await resp.json();
    if (!r.ok) { document.getElementById('pr-msg').innerHTML=`<div class="sem-acesso">${r.erro}</div>`; return; }
    document.getElementById('pr-msg').innerHTML = '<div style="background:var(--verde-ok-bg);border-radius:8px;padding:10px;margin-top:10px;color:var(--verde-ok);font-size:13px;"><i class="ti ti-circle-check"></i> Enviado! O Roberto verá na aba Precificação.</div>';
    setTimeout(()=>{ fecharFicha(); renderPrecificacao(document.getElementById('area-conteudo')); }, 1800);
  } catch(e) { document.getElementById('pr-msg').innerHTML='<div class="sem-acesso">Erro de conexão.</div>'; }
}

function filtrarLeadsRelatorio() {
  const cons = document.getElementById('rf-consultor').value;
  const sit = document.getElementById('rf-situacao').value;
  const de = document.getElementById('rf-de').value;
  const ate = document.getElementById('rf-ate').value;
  const dDe = de ? new Date(de+'T00:00:00') : null;
  const dAte = ate ? new Date(ate+'T23:59:59') : null;
  let lista = (kanbanLeads||[]).slice();
  if (cons) lista = lista.filter(l => l['CONSULTOR']===cons);
  if (sit) lista = lista.filter(l => (l['ETAPA']||'')===sit);
  if (dDe || dAte) lista = lista.filter(l => { const d = parseDataReaj(l['DATA_CONTATO']); if(!d) return false; if(dDe&&d<dDe) return false; if(dAte&&d>dAte) return false; return true; });
  // ordena por situação e cliente
  lista.sort((a,b)=> String(a['ETAPA']||'').localeCompare(String(b['ETAPA']||'')) || String(a['CLIENTE']||'').localeCompare(String(b['CLIENTE']||'')));
  return lista;
}

function rotEtapa(e){ return e==='Indicação/Prospecção' ? 'Indicações' : (e||'—'); }

function gerarRelatorioFunil(paraPdf) {
  const lista = filtrarLeadsRelatorio();
  const cons = document.getElementById('rf-consultor').value || 'Todos';
  const sit = document.getElementById('rf-situacao').value;
  const de = document.getElementById('rf-de').value, ate = document.getElementById('rf-ate').value;
  const periodo = (de||ate) ? `${de?fmtDataBR(de):'início'} a ${ate?fmtDataBR(ate):'hoje'}` : 'todo o período';
  const linhasHtml = lista.length
    ? lista.map(l=>`<tr><td style="padding:6px 10px;border-bottom:1px solid #eee;font-size:12px;">${l['CLIENTE']||'—'}</td><td style="padding:6px 10px;border-bottom:1px solid #eee;font-size:12px;">${rotEtapa(l['ETAPA'])}</td><td style="padding:6px 10px;border-bottom:1px solid #eee;font-size:12px;">${l['CONSULTOR']||'—'}</td><td style="padding:6px 10px;border-bottom:1px solid #eee;font-size:12px;">${l['FONTE']||'—'}</td><td style="padding:6px 10px;border-bottom:1px solid #eee;font-size:12px;">${fmtDataBR(l['DATA_CONTATO'])}</td><td style="padding:6px 10px;border-bottom:1px solid #eee;font-size:12px;">${l['VALOR_R$']?fmtMoeda(l['VALOR_R$']):'—'}</td></tr>`).join('')
    : '<tr><td colspan="6" style="padding:18px;text-align:center;color:#999;">Nenhum lead encontrado com esses filtros.</td></tr>';
  const cabecalho = `<tr style="background:#f0f7ec;"><th style="padding:7px 10px;text-align:left;font-size:11px;color:#2d5a3d;">Cliente</th><th style="padding:7px 10px;text-align:left;font-size:11px;color:#2d5a3d;">Situação</th><th style="padding:7px 10px;text-align:left;font-size:11px;color:#2d5a3d;">Consultor</th><th style="padding:7px 10px;text-align:left;font-size:11px;color:#2d5a3d;">Fonte</th><th style="padding:7px 10px;text-align:left;font-size:11px;color:#2d5a3d;">Data contato</th><th style="padding:7px 10px;text-align:left;font-size:11px;color:#2d5a3d;">Valor</th></tr>`;
  const conteudo = `
    <div style="margin-bottom:10px;font-size:13px;color:var(--cinza-600);"><b>${lista.length}</b> leads · Consultor: ${cons} · Situação: ${sit?rotEtapa(sit):'Todas'} · Período: ${periodo}</div>
    <table style="width:100%;border-collapse:collapse;border:1px solid #eee;">${cabecalho}${linhasHtml}</table>`;

  if (paraPdf) {
    const win = window.open('', '_blank');
    win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Relatório do Funil — Ecotrans</title>
      <style>body{font-family:Arial,sans-serif;padding:30px;color:#222;} h1{color:#2d5a3d;font-size:18px;} table{width:100%;border-collapse:collapse;margin-top:10px;} th,td{text-align:left;}</style></head><body>
      <h1>Relatório do Funil — Ecotrans Ambiental</h1>
      <div style="font-size:13px;color:#555;margin-bottom:4px;">Consultor: ${cons} · Situação: ${sit?rotEtapa(sit):'Todas'} · Período: ${periodo}</div>
      <div style="font-size:13px;color:#555;">Total: ${lista.length} leads · Gerado em ${new Date().toLocaleString('pt-BR')}</div>
      <table style="border-collapse:collapse;border:1px solid #eee;">${cabecalho}${linhasHtml}</table>
      </body></html>`);
    win.document.close();
    setTimeout(()=>win.print(), 400);
  } else {
    document.getElementById('rf-resultado').innerHTML = conteudo;
  }
}

async function salvarLead() {
  const cliente = document.getElementById('nl-cliente').value;
  if (!cliente) { document.getElementById('nl-msg').innerHTML='<div class="sem-acesso" style="margin-top:10px;">Informe o cliente.</div>'; return; }
  const cnpj = (document.getElementById('nl-cnpj')||{}).value || '';
  const cnpjL = cnpj.replace(/\D/g,'');

  // checagem de duplicidade: carregar todos os leads (sem filtro de dono, pois prospecção é compartilhada)
  let todos = [];
  try { const rt = await buscarDados('CRM_Leads'); todos = rt.ok ? rt.linhas : []; } catch(e) {}
  // 1) CNPJ igual -> BLOQUEIA (não deixa prospectar o mesmo cliente)
  if (cnpjL) {
    const jaExiste = todos.find(l => String(l['CNPJ']||'').replace(/\D/g,'') === cnpjL);
    if (jaExiste) {
      document.getElementById('nl-msg').innerHTML = `<div class="sem-acesso" style="margin-top:10px;"><i class="ti ti-ban"></i> Já existe um lead com este CNPJ: <b>${jaExiste['CLIENTE']}</b> (consultor: ${jaExiste['CONSULTOR']||'—'}). Não é possível prospectar o mesmo cliente.</div>`;
      return;
    }
  }
  // 2) nome parecido (de outro consultor) -> AVISA mas deixa criar
  const norm = s => String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9 ]/g,'').trim();
  const nc = norm(cliente);
  const parecido = todos.find(l => { const ln = norm(l['CLIENTE']); return ln && (ln.includes(nc) || nc.includes(ln)) && nc.length>4; });
  if (parecido && !window._avisouParecido) {
    window._avisouParecido = true;
    document.getElementById('nl-msg').innerHTML = `<div style="background:var(--amarelo-bg);border-radius:8px;padding:10px;margin-top:10px;color:#8a6d00;font-size:13px;"><i class="ti ti-alert-triangle"></i> Atenção: já existe um lead parecido — <b>${parecido['CLIENTE']}</b> (consultor: ${parecido['CONSULTOR']||'—'}). Se for o mesmo cliente, alinhe com o colega. Clique em "Criar lead" de novo para confirmar.</div>`;
    return;
  }
  window._avisouParecido = false;

  const ehCobertura = document.getElementById('nl-cobertura').value==='sim';
  const campos = {
    'CLIENTE': cliente, 'CNPJ': cnpj, 'ETAPA': ehCobertura ? 'Cobertura' : document.getElementById('nl-etapa').value,
    'CONSULTOR': (document.getElementById('nl-consultor')||{}).value || usuarioAtual.nome, 'FONTE': document.getElementById('nl-fonte').value,
    'CONTA_INDICADORES': ehCobertura ? 'Não' : 'Sim', 'DATA_CONTATO': (document.getElementById('nl-data') && document.getElementById('nl-data').value) ? fmtDataBR(document.getElementById('nl-data').value) : fmtDataBR(new Date().toISOString()),
    'RESPONSAVEL': document.getElementById('nl-resp').value, 'EMAIL': document.getElementById('nl-email').value,
    'TELEFONE': document.getElementById('nl-tel').value,
    'EMPRESA_COLETA_ATUAL': document.getElementById('nl-transp').value,
    'FREQUENCIA': (document.getElementById('nl-freq')||{}).value || '',
    'RESIDUO': (document.getElementById('nl-residuo')||{}).value || '',
    'CATEGORIA_RESIDUO': (document.getElementById('nl-acond')||{}).value || '',
    'OBSERVACOES': document.getElementById('nl-obs').value,
    'INFO_ADICIONAL': (document.getElementById('nl-infoadd')||{}).value || '',
    'NOVO': 'Sim'
  };
  document.getElementById('nl-msg').innerHTML = '<div style="text-align:center;padding:10px;color:var(--cinza-500);">Criando...</div>';
  try {
    const resp = await fetch(API_URL, { method:'POST', body: JSON.stringify({ acao:'novoLead', token: sessaoToken, dados:{ campos } })});
    const r = await resp.json();
    if (!r.ok) { document.getElementById('nl-msg').innerHTML=`<div class="sem-acesso">${r.erro}</div>`; return; }
    kanbanLeads = null; // forçar recarga
    document.getElementById('nl-msg').innerHTML = '<div style="background:var(--verde-ok-bg);border-radius:8px;padding:10px;margin-top:10px;color:var(--verde-ok);font-size:13px;"><i class="ti ti-circle-check"></i> Lead criado!</div>';
    setTimeout(()=>{ fecharFicha(); renderKanban(document.getElementById('area-conteudo')); }, 1500);
  } catch(e) { document.getElementById('nl-msg').innerHTML='<div class="sem-acesso">Erro de conexão.</div>'; }
}

let cacheContratos = null;
async function renderContratos(area) {
  area.innerHTML = `<div class="placeholder"><i class="ti ti-loader"></i><h2>Carregando contratos...</h2></div>`;
  const r = await buscarDados('Contratos');
  let lista = r.ok ? r.linhas : [];
  // preencher consultor faltante cruzando com RGG/SIGOR por CNPJ (dono vem da planilha SP Regula/MTR)
  if (!cacheRGG) { const rr = await buscarDados('Clientes_RGG'); cacheRGG = rr.ok?rr.linhas:[]; }
  if (!cacheSIGOR) { const rs = await buscarDados('SIGOR'); cacheSIGOR = rs.ok?rs.linhas:[]; }
  const mapaCons = {};
  [...cacheRGG, ...cacheSIGOR].forEach(d => { const c = String(d['CNPJ']||'').replace(/\D/g,''); if (c && d['CONSULTOR']) mapaCons[c] = d['CONSULTOR']; });
  lista.forEach(ct => { if (!ct['CONSULTOR'] || !String(ct['CONSULTOR']).trim()) { const c = String(ct['CNPJ']||'').replace(/\D/g,''); if (mapaCons[c]) ct['CONSULTOR'] = mapaCons[c]; } });
  // filtro da CARTEIRA: vendedoras + Danielly + Rogério veem só os próprios contratos
  if (veSomenteProprios_Carteira()) lista = lista.filter(l => ehMeuRegistro(l['CONSULTOR']));
  cacheContratos = lista;
  area.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;">
      <div class="barra-busca" style="flex:1;margin-bottom:0;min-width:240px;">
        <i class="ti ti-search"></i><input type="text" id="ctr-busca" placeholder="Buscar contrato por cliente..." oninput="filtraContratos()">
        <span class="contagem">${lista.length} contratos</span>
      </div>
      <button class="btn-importar" onclick="abrirFormContrato()"><i class="ti ti-plus"></i> Novo contrato</button>
    </div>
    <div class="filtros">
      <span class="filtro-chip ativo" id="cf-todos" onclick="setFiltroContrato('todos',this)">Todos</span>
      <span class="filtro-chip" id="cf-vencer" onclick="setFiltroContrato('vencer',this)">Próximos de vencer (90d)</span>
      <span class="filtro-chip" id="cf-semauto" onclick="setFiltroContrato('semauto',this)">Sem renovação automática</span>
      <span class="filtro-chip" id="cf-vencidos" onclick="setFiltroContrato('vencidos',this)">Vencidos</span>
    </div>
    <div id="ctr-resultado"></div>`;
  window._filtroContrato = 'todos';
  filtraContratos();
}
function setFiltroContrato(f, el) { window._filtroContrato=f; document.querySelectorAll('[id^="cf-"]').forEach(c=>c.classList.remove('ativo')); if(el)el.classList.add('ativo'); filtraContratos(); }
function filtraContratos() {
  const termo = ((document.getElementById('ctr-busca')||{}).value||'').toLowerCase();
  const f = window._filtroContrato || 'todos';
  function diasVenc(c) { const d = parseDataReaj(c['VENC.']); return d ? Math.round((d-Date.now())/(1000*60*60*24)) : null; }
  function semAuto(c) { const r = String(c['RENOVAÇÃO AUTOMÁTICA']||'').toLowerCase(); return !r.includes('sim') && !r.includes('aut'); }
  let lista = cacheContratos.filter(c => !termo || String(c['CLIENTE']||'').toLowerCase().includes(termo));
  if (f==='vencer') lista = lista.filter(c => { const d=diasVenc(c); return d!=null && d>=0 && d<=90; });
  else if (f==='vencidos') lista = lista.filter(c => { const d=diasVenc(c); return d!=null && d<0; });
  else if (f==='semauto') lista = lista.filter(c => semAuto(c));
  lista.sort((a,b)=>{ const da=diasVenc(a), db=diasVenc(b); return (da==null?99999:da)-(db==null?99999:db); });
  const res = document.getElementById('ctr-resultado');
  if (!lista.length) { res.innerHTML = '<div class="sem-acesso">Nenhum contrato encontrado.</div>'; return; }
  let html = '<div class="grid-cards">';
  lista.slice(0,150).forEach(c => {
    const d = diasVenc(c);
    const urgente = semAuto(c) && d!=null && d<=90; // sem renovação automática e perto de vencer = urgência
    const venceLogo = d!=null && d>=0 && d<=90;
    const vencido = d!=null && d<0;
    const cardCls = vencido?'cancelado':urgente?'':'ativo-status';
    html += `<div class="card-cli ${cardCls}" onclick="abrirFicha('${String(c['CNPJ']||'').replace(/'/g,'')}')" style="${urgente?'border:1.5px solid var(--laranja);':''}">
      <div class="card-cli-topo">
        <div class="card-cli-avatar" style="${urgente?'background:var(--laranja);':''}">${iniciais(c['CLIENTE'])}</div>
        <div style="min-width:0;"><div class="card-cli-nome">${c['CLIENTE']||'—'}</div><div class="card-cli-cnpj">Contrato ${c['Nº CTO']||'—'}</div></div>
      </div>
      <div class="card-cli-tags">
        ${urgente?`<span class="tag" style="background:var(--laranja-bg);color:var(--laranja);"><i class="ti ti-alert-triangle"></i> Urgência</span>`:''}
        ${vencido?`<span class="tag" style="background:var(--vermelho-bg);color:var(--vermelho);">Vencido</span>`:venceLogo?`<span class="tag" style="background:var(--amarelo-bg);color:var(--amarelo);">Vence em ${d}d</span>`:''}
        ${semAuto(c)?`<span class="tag tag-eventual">Sem renov. auto</span>`:`<span class="tag tag-contrato">Renov. automática</span>`}
        ${c['ÍNDICE']?`<span class="tag tag-grupo">${c['ÍNDICE']}</span>`:''}
      </div>
      <div class="card-cli-linha borda"><span>Vencimento</span><b>${fmtDataBR(c['VENC.'])}</b></div>
      <div class="card-cli-linha"><span>Consultor</span><span>${c['CONSULTOR']||'—'}</span></div>
    </div>`;
  });
  res.innerHTML = html + '</div>';
}

    })});

        <button onclick="agNavegar(-1)"><i class="ti ti-chevron-left"></i></button>
        <button onclick="agHoje()" style="width:auto;padding:0 12px;font-size:13px;">Hoje</button>
        <button onclick="agNavegar(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div class="ag-titulo" id="ag-titulo"></div>
      <div class="ag-views" style="margin-left:auto;">
        <button class="${agView==='mes'?'ativo':''}" onclick="agSetView('mes')">Mês</button>
        <button class="${agView==='semana'?'ativo':''}" onclick="agSetView('semana')">Semana</button>
        <button class="${agView==='dia'?'ativo':''}" onclick="agSetView('dia')">Dia</button>
      </div>
      ${podeFiltrar?`<select class="filtro-sel" id="ag-vendedor" onchange="agFiltrar()"><option value="">Todos</option>${consultores.map(c=>`<option ${c===agFiltroVendedor?'selected':''}>${c}</option>`).join('')}</select>`:''}
      <button class="btn-importar" onclick="abrirFormCompromisso()"><i class="ti ti-plus"></i> Compromisso</button>
    </div>
    <div id="ag-corpo"></div>`;
  agRender();
}

function agFiltrar() { agFiltroVendedor = (document.getElementById('ag-vendedor')||{}).value||''; agRender(); }
function agSetView(v) { agView = v; document.querySelectorAll('.ag-views button').forEach(b=>b.classList.toggle('ativo', b.textContent.toLowerCase()===(v==='mes'?'mês':v))); agRender(); }
function agNavegar(dir) {
  if (agView==='mes') agData.setMonth(agData.getMonth()+dir);
  else if (agView==='semana') agData.setDate(agData.getDate()+7*dir);
  else agData.setDate(agData.getDate()+dir);
  agData = new Date(agData); agRender();
}
function agHoje() { agData = new Date(); agRender(); }

function agEventos() {
  let evs = cacheAgenda.map(a => ({...a, _d: parseDataReaj(a['DATA_AGENDADA'])})).filter(a=>a._d);
  if (veSomenteProprios()) evs = evs.filter(a => ehMeuRegistro(a['REGISTRADO_POR']));
  else if (agFiltroVendedor) evs = evs.filter(a => a['REGISTRADO_POR']===agFiltroVendedor);
  return evs;
}
function classeEv(tipo) { const t=String(tipo||'').toLowerCase(); if(t.includes('visita'))return 'visita'; if(t.includes('reuni'))return 'reuniao'; return ''; }

const MESES_PT = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
const DOW_PT = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

function agRender() {
  const titulo = document.getElementById('ag-titulo');
  const corpo = document.getElementById('ag-corpo');
  const evs = agEventos();
  if (agView === 'mes') {
    titulo.textContent = MESES_PT[agData.getMonth()] + ' ' + agData.getFullYear();
    corpo.innerHTML = agRenderMes(evs);
  } else if (agView === 'semana') {
    const ini = new Date(agData); ini.setDate(ini.getDate()-ini.getDay());
    const fim = new Date(ini); fim.setDate(fim.getDate()+6);
    titulo.textContent = `${ini.getDate()}/${ini.getMonth()+1} – ${fim.getDate()}/${fim.getMonth()+1}`;
    corpo.innerHTML = agRenderLista(evs, ini, fim);
  } else {
    titulo.textContent = `${agData.getDate()} de ${MESES_PT[agData.getMonth()]}`;
    const d0 = new Date(agData); d0.setHours(0,0,0,0);
    const d1 = new Date(agData); d1.setHours(23,59,59,999);
    corpo.innerHTML = agRenderLista(evs, d0, d1);
  }
}

function agRenderMes(evs) {
  const ano = agData.getFullYear(), mes = agData.getMonth();
  const primeiro = new Date(ano, mes, 1);
  const inicio = new Date(primeiro); inicio.setDate(1 - primeiro.getDay());
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  let html = '<div class="ag-grid-mes">';
  DOW_PT.forEach(d => html += `<div class="ag-dow">${d}</div>`);
  let cur = new Date(inicio);
  for (let i=0;i<42;i++) {
    const fora = cur.getMonth()!==mes;
    const ehHoje = cur.getTime()===hoje.getTime();
    const doDia = evs.filter(e => e._d.getDate()===cur.getDate() && e._d.getMonth()===cur.getMonth() && e._d.getFullYear()===cur.getFullYear());
    html += `<div class="ag-dia ${fora?'fora':''} ${ehHoje?'hoje':''}">
      <div class="num">${cur.getDate()}</div>
      ${doDia.slice(0,3).map(e=>`<div class="ag-ev ${classeEv(e['TIPO'])}" title="${e['TITULO']||''}">${e['CLIENTE']||e['TITULO']||'evento'}</div>`).join('')}
      ${doDia.length>3?`<div style="font-size:10px;color:var(--cinza-500);margin-top:2px;">+${doDia.length-3}</div>`:''}
    </div>`;
    cur.setDate(cur.getDate()+1);
  }
  html += '</div>';
  return html;
}

function agRenderLista(evs, ini, fim) {
  const doPeriodo = evs.filter(e => e._d>=ini && e._d<=fim).sort((a,b)=>a._d-b._d);
  if (!doPeriodo.length) return `<div class="sem-acesso" style="background:var(--verde-claro-bg);border-color:var(--verde-claro);color:var(--verde-escuro);"><i class="ti ti-calendar-off"></i> Nenhum compromisso neste período.</div>`;
  // agrupar por dia
  let html = '';
  let diaAtual = '';
  doPeriodo.forEach(e => {
    const dia = `${e._d.getDate()}/${e._d.getMonth()+1} (${DOW_PT[e._d.getDay()]})`;
    if (dia !== diaAtual) { html += `<div style="font-weight:600;color:var(--cinza-700);margin:14px 0 8px;font-size:14px;">${dia}</div>`; diaAtual = dia; }
    const cls = classeEv(e['TIPO']);
    html += `<div class="ag-lista-item" style="${cls==='visita'?'border-left-color:#185fa5;':cls==='reuniao'?'border-left-color:#ba7517;':''}">
      <div class="ag-hora"><i class="ti ti-${cls==='visita'?'map-pin':cls==='reuniao'?'users':'point'}"></i> ${e['TIPO']||'Atividade'}</div>
      <div style="flex:1;">
        <div style="font-weight:600;color:var(--cinza-900);font-size:14px;">${e['CLIENTE']||e['TITULO']||'—'}</div>
        ${e['TITULO']?`<div style="font-size:13px;color:var(--cinza-700);">${e['TITULO']}</div>`:''}
        ${e['DESCRICAO']?`<div style="font-size:12px;color:var(--cinza-500);margin-top:2px;">${e['DESCRICAO']}</div>`:''}
        <div style="font-size:11px;color:var(--cinza-500);margin-top:3px;">${e['REGISTRADO_POR']||''} ${String(e['STATUS'])==='Pendente'?'· <span style="color:var(--laranja);">pendente</span>':'· <span style="color:var(--verde-ok);">ok</span>'}</div>
      </div>
    </div>`;
  });
  return html;
}

function abrirFormCompromisso() {

    <div class="ficha-overlay" onclick="if(event.target===this)fecharFicha()">

            <select id="cp-tipo" style="width:100%;padding:9px;border:1.5px solid var(--cinza-300);border-radius:8px;"><option>Visita técnica</option><option>Reunião</option><option>Ligação</option><option>Tarefa</option></select></div>
          <div style="margin-bottom:12px;"><label style="font-size:13px;color:var(--cinza-700);">Cliente</label>
            <input type="text" id="cp-cliente" list="cp-lista" style="width:100%;padding:9px;border:1.5px solid var(--cinza-300);border-radius:8px;">

            <input type="date" id="cp-data" style="width:100%;padding:9px;border:1.5px solid var(--cinza-300);border-radius:8px;"></div>

            <input type="text" id="cp-titulo" placeholder="ex: Visita para vistoria" style="width:100%;padding:9px;border:1.5px solid var(--cinza-300);border-radius:8px;"></div>
          <div class="ficha-botoes">
            <button class="ficha-btn-primario" onclick="salvarCompromisso()"><i class="ti ti-check"></i> Agendar</button>
            <button class="ficha-btn-secundario" onclick="fecharFicha()">Cancelar</button>
          </div>

}
async function salvarCompromisso() {
  const tipo = document.getElementById('cp-tipo').value;
  const cliente = document.getElementById('cp-cliente').value;
  const data = document.getElementById('cp-data').value;
  const titulo = document.getElementById('cp-titulo').value;
  if (!data) { document.getElementById('cp-msg').innerHTML='<div class="sem-acesso" style="margin-top:10px;">Informe a data.</div>'; return; }
  const c = (cacheClientes||[]).find(x=>String(x['CLIENTE'])===cliente);
  document.getElementById('cp-msg').innerHTML = '<div style="text-align:center;padding:10px;color:var(--cinza-500);">Agendando...</div>';
  try {
    const resp = await fetch(API_URL, { method:'POST', body: JSON.stringify({
      acao:'registrarAtividade', token: sessaoToken,
      dados:{ cnpj: c?c['CNPJ']:'', cliente, tipo, titulo, descricao:'', dataAgendada: data, registradoPor: usuarioAtual.nome }
    })});
    const r = await resp.json();
    if (!r.ok) { document.getElementById('cp-msg').innerHTML=`<div class="sem-acesso">${r.erro}</div>`; return; }
    cacheAgenda = null;
    document.getElementById('cp-msg').innerHTML = '<div style="background:var(--verde-ok-bg);border-radius:8px;padding:10px;margin-top:10px;color:var(--verde-ok);font-size:13px;"><i class="ti ti-circle-check"></i> Compromisso agendado!</div>';
    setTimeout(()=>{ fecharFicha(); renderAgenda(document.getElementById('area-conteudo')); }, 1500);
  } catch(e) { document.getElementById('cp-msg').innerHTML='<div class="sem-acesso">Erro de conexão.</div>'; }
}

async function renderPropostas(area) {
  area.innerHTML = `<div class="placeholder"><i class="ti ti-loader"></i><h2>Carregando propostas...</h2></div>`;
  await carregarLeads();
  // propostas = leads com proposta enviada ou nº/valor de proposta
  const props = kanbanLeads.filter(l => l['ETAPA']==='Proposta Enviada' || l['N_PROPOSTA'] || l['VALOR_R$']);
  function valorNum(v){ if(v==null||v==='')return 0; if(typeof v==='number')return v; let s=String(v).replace(/[^\d,.-]/g,''); if(s.includes(',')&&s.lastIndexOf(',')>s.lastIndexOf('.'))s=s.replace(/\./g,'').replace(',','.'); const n=parseFloat(s); return isNaN(n)?0:n; }
  const totalPropostas = props.reduce((s,l)=>s+valorNum(l['VALOR_R$']),0);
  const fechadas = kanbanLeads.filter(l=>l['ETAPA']==='Fechado');

  let html = `
    <div class="kpi-funil" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));">
      <div class="kpi-card" style="border-top:3px solid #BA7517;"><div class="kpi-num" style="color:#BA7517;">${props.length}</div><div class="kpi-lbl">Propostas enviadas</div></div>
      <div class="kpi-card" style="border-top:3px solid var(--verde-escuro);"><div class="kpi-num" style="font-size:20px;color:var(--verde-escuro);">${fmtMoeda(totalPropostas)}</div><div class="kpi-lbl">Valor em propostas</div></div>
      <div class="kpi-card" style="border-top:3px solid var(--verde-ok);"><div class="kpi-num" style="color:var(--verde-ok);">${fechadas.length}</div><div class="kpi-lbl">Fechadas</div></div>
    </div>
    <div class="barra-busca" style="margin-top:16px;"><i class="ti ti-search"></i><input type="text" id="prop-busca" placeholder="Buscar por cliente ou nº da proposta..." oninput="filtraPropostas()"><span class="contagem">${props.length} propostas</span></div>
    <div id="prop-res"></div>`;
  area.innerHTML = html;
  window._propostas = props;
  filtraPropostas();
}
function filtraPropostas() {
  const termo = ((document.getElementById('prop-busca')||{}).value||'').toLowerCase();
  let lista = (window._propostas||[]).filter(l=>!termo || String(l['CLIENTE']||'').toLowerCase().includes(termo) || String(l['N_PROPOSTA']||'').toLowerCase().includes(termo));
  const res = document.getElementById('prop-res');
  if (!lista.length) { res.innerHTML='<div class="sem-acesso">Nenhuma proposta encontrada.</div>'; return; }
  let html = '<div class="grid-cards">';
  lista.slice(0,150).forEach(l => {
    html += `<div class="reaj-card r60" style="cursor:default;border-left-color:#BA7517;">
      <div class="reaj-topo"><div style="min-width:0;"><div class="reaj-nome">${l['CLIENTE']||'—'}</div><div class="reaj-cnpj">${l['CONSULTOR']||''}${l['N_PROPOSTA']?' · proposta '+l['N_PROPOSTA']:''}</div></div>
      ${l['VALOR_R$']?`<span class="reaj-pill" style="background:#FAEEDA;color:#BA7517;">${fmtMoeda(l['VALOR_R$'])}</span>`:''}</div>
      <div class="reaj-linhas"><div><span>Etapa</span><b style="font-size:12px;">${l['ETAPA']||'—'}</b></div>${l['DATA_ENVIO_PROPOSTA']?`<div><span>Enviada</span><b style="font-size:12px;">${fmtDataBR(l['DATA_ENVIO_PROPOSTA'])}</b></div>`:''}</div>
    </div>`;
  });
  res.innerHTML = html + '</div>';
}

      <div class="kpi-card" style="border-top:3px solid var(--laranja);"><div class="kpi-num" style="color:var(--laranja);">${pendentes.length}</div><div class="kpi-lbl">Pendentes</div></div>
    </div>
    <div class="barra-busca" style="margin-top:16px;"><i class="ti ti-search"></i><input type="text" id="atv-busca" placeholder="Buscar por cliente ou título..." oninput="filtraAtividadesCRM()"><span class="contagem">${lista.length}</span></div>

function filtraAtividadesCRM() {

  let lista = (window._atividadesCRM||[]).filter(a=>!termo||`${a['CLIENTE']||''} ${a['TITULO']||''}`.toLowerCase().includes(termo));

    const pend = String(a['STATUS'])==='Pendente';
    html += `<div class="lista-cli-item" style="grid-template-columns:auto 1fr auto;cursor:default;">
      <span style="color:${pend?'var(--laranja)':'var(--verde-ok)'};font-size:18px;"><i class="ti ${ico[a['TIPO']]||'ti-point'}"></i></span>
      <div><b style="color:var(--cinza-900);">${a['TITULO']||a['TIPO']}</b><br><span style="color:var(--cinza-500);font-size:12px;">${a['CLIENTE']||''} · ${a['REGISTRADO_POR']||''}</span></div>
      <span style="color:var(--cinza-500);font-size:12px;">${a['DATA_AGENDADA']?'p/ '+fmtDataBR(a['DATA_AGENDADA']):fmtDataBR(a['DATA_REGISTRO'])}</span>
    </div>`;
  });

}

async function renderRelatoriosCRM(area) {
  area.innerHTML = `<div class="placeholder"><i class="ti ti-loader"></i><h2>Carregando relatórios...</h2></div>`;
  await carregarLeads();
  const leads = kanbanLeads.filter(l=>l['ETAPA']!=='Cobertura');

  const fechados = leads.filter(l=>l['ETAPA']==='Fechado').length;
  const declinados = leads.filter(l=>l['ETAPA']==='Declinado').length;
  const conversao = total ? (fechados/total*100) : 0;

  // por consultor
  const porCons = {};
  leads.forEach(l=>{ const c=l['CONSULTOR']||'—'; if(!porCons[c])porCons[c]={total:0,fechados:0}; porCons[c].total++; if(l['ETAPA']==='Fechado')porCons[c].fechados++; });

  leads.forEach(l=>{ const f=l['FONTE']||'—'; porFonte[f]=(porFonte[f]||0)+1; });

  const porEtapa = {}; etapas.forEach(e=>porEtapa[e]=leads.filter(l=>l['ETAPA']===e).length);

  const consultoresUnq = [...new Set(kanbanLeads.map(l=>l['CONSULTOR']).filter(Boolean))].sort();

  let html = `

        <div><label style="font-size:12px;color:var(--cinza-600);display:block;margin-bottom:3px;">Até</label>
          <input type="date" id="rel-fim" value="${hojeISO}" class="filtro-sel"></div>
        <button class="btn-importar" onclick="gerarRelatorioPDF()"><i class="ti ti-download"></i> Baixar PDF</button>
      </div>
      <div style="font-size:11px;color:var(--cinza-500);margin-top:8px;">O PDF traz as mudanças de etapa e as atividades (visitas, ligações...) do consultor no período.</div>
    </div>

    <div class="kpi-funil" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr));">
      <div class="kpi-card" style="border-top:3px solid var(--verde-escuro);"><div class="kpi-num">${total}</div><div class="kpi-lbl">Leads ativos</div></div>
      <div class="kpi-card" style="border-top:3px solid var(--verde-ok);"><div class="kpi-num" style="color:var(--verde-ok);">${fechados}</div><div class="kpi-lbl">Fechados</div></div>
      <div class="kpi-card" style="border-top:3px solid var(--vermelho);"><div class="kpi-num" style="color:var(--vermelho);">${declinados}</div><div class="kpi-lbl">Declinados</div></div>
      <div class="kpi-card" style="border-top:3px solid var(--verde-medio);"><div class="kpi-num" style="color:var(--verde-medio);">${conversao.toFixed(1)}%</div><div class="kpi-lbl">Taxa de conversão</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px;">
      <div style="background:white;border:1px solid var(--cinza-200);border-radius:12px;padding:18px;">

        ${etapas.map(e=>`<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--cinza-600);margin-bottom:3px;"><span>${e}</span><b>${porEtapa[e]}</b></div>

      </div>
      <div style="background:white;border:1px solid var(--cinza-200);border-radius:12px;padding:18px;">
        <h3 style="font-family:var(--fonte-display);font-size:15px;margin:0 0 14px;">Leads por fonte</h3>
        ${Object.entries(porFonte).sort((a,b)=>b[1]-a[1]).map(([f,n])=>`<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--cinza-600);margin-bottom:3px;"><span>${f}</span><b>${n}</b></div>

  area.innerHTML = html;
}

// RELATÓRIO PDF — atividades + mudanças de etapa por consultor/período
