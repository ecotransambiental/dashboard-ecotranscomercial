function setFiltroReaj(f, el) {
  filtroReaj = f;
  document.querySelectorAll('[id^="rf-"]').forEach(c=>c.classList.remove('ativo'));
  if (el) el.classList.add('ativo');
  aplicarReaj();
}
function setModoReaj(m) { modoReaj = m; document.querySelectorAll('.alternador button').forEach(b=>b.classList.toggle('ativo', b.textContent.trim().toLowerCase().includes(m))); aplicarReaj(); }

function aplicarReaj() {
  const busca = ((document.getElementById('reaj-busca')||{}).value||'').toLowerCase();
  const dIni = (document.getElementById('reaj-ini')||{}).value||'';
  const dFim = (document.getElementById('reaj-fim')||{}).value||'';

  let lista = cacheReajustes.map((r, idx) => {
    const prox = proximoReajuste(r['DATA ÚLTIMO REAJUSTE '] || r['DATA ÚLTIMO REAJUSTE']);
    return { ...r, _idx: idx, _prox: prox, _cls: classifReaj(prox) };
  });

  if (busca) lista = lista.filter(r => String(r['CLIENTE']||'').toLowerCase().includes(busca));
  if (filtroReaj==='venc') lista = lista.filter(r => r._cls.dias < 0);
  else if (filtroReaj==='30') lista = lista.filter(r => r._cls.dias >= 0 && r._cls.dias <= 30);
  else if (filtroReaj==='60') lista = lista.filter(r => r._cls.dias >= 0 && r._cls.dias <= 60);
  if (dIni || dFim) {
    const ini = dIni?new Date(dIni+'T00:00:00'):null, fim = dFim?new Date(dFim+'T23:59:59'):null;
    lista = lista.filter(r => r._prox && (!ini||r._prox>=ini) && (!fim||r._prox<=fim));
  }
  // ordenar por proximidade
  lista.sort((a,b)=>a._cls.dias-b._cls.dias);

  const cont = document.getElementById('reaj-contagem');
  if (cont) cont.textContent = lista.length + ' reajustes';
  const res = document.getElementById('reaj-resultado');
  res.innerHTML = modoReaj==='cards' ? cardsReaj(lista) : listaReaj(lista);
}

function fmtData(d) {
  if (!d) return '—';
  return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear();
}
function fmtDataLonga(d) {
  if (!d) return '—';
  return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear();
}

function cardsReaj(lista) {
  if (!lista.length) return `<div class="sem-acesso">Nenhum reajuste com esses filtros.</div>`;
  let html = '<div class="grid-cards">';
  lista.slice(0,150).forEach(r => {
    const ant = parseMoedaReaj(r['PREÇO ANTERIOR']);
    const novo = parseMoedaReaj(r['VALOR REAJUSTADO']);
    let pctR = null;
    if (r['ALIQUOTA']!=null && r['ALIQUOTA']!=='') pctR = parseFloat(r['ALIQUOTA'])*100;
    else if (ant!=null && ant!==0 && novo!=null) pctR = (novo-ant)/ant*100;
    html += `<div class="reaj-card ${r._cls.cls}" onclick="detalheReaj(${r._idx})">
      <div class="reaj-topo">
        <div style="min-width:0;">
          <div class="reaj-nome">${r['CLIENTE']||'—'}</div>
          <div class="reaj-cnpj">${r['TP DE SERVIÇO']||''}</div>
        </div>
        <span class="reaj-pill ${r._cls.pill}">${r._cls.txt}</span>
      </div>
      <div class="reaj-linhas">
        <div><span>Próx. reajuste</span><b>${fmtData(r._prox)}</b></div>
        <div><span>Índice</span><b>${r['ÍNDICE']||'—'}</b></div>
        <div><span>Reajuste</span><b>${pctR!=null?pctR.toFixed(1).replace('.',',')+'%':'—'}</b></div>
      </div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function listaReaj(lista) {
  if (!lista.length) return `<div class="sem-acesso">Nenhum reajuste.</div>`;
  let html = '<div class="lista-cli">';
  lista.slice(0,300).forEach(r => {
    html += `<div class="lista-cli-item" onclick="detalheReaj(${r._idx})">
      <div><b style="color:var(--cinza-900);">${r['CLIENTE']||'—'}</b><br><span style="color:var(--cinza-500);font-size:12px;">${r['TP DE SERVIÇO']||''}</span></div>
      <span class="reaj-pill ${r._cls.pill}">${r._cls.txt}</span>
      <span style="color:var(--cinza-700);">${fmtData(r._prox)}</span>
    </div>`;
  });
  html += '</div>';
  return html;
}

  out.textContent = fmtMoeda(Math.round(base * (1 + pct/100) * 100)/100);

async function solicitarAprovacaoReaj(idx, base) {
  const r = cacheReajustes[idx];
  const pct = parseFloat(document.getElementById('reaj-pct').value);
  const indice = (document.getElementById('reaj-indice')||{}).value||'';
  if (isNaN(pct)) { alert('Digite o % de reajuste.'); return; }
  const area = document.getElementById('reaj-acao');
  area.innerHTML = `<div style="text-align:center;padding:16px;color:var(--cinza-500);">Enviando para aprovação...</div>`;
  try {
    const resp = await fetch(API_URL, { method:'POST', body: JSON.stringify({
      acao:'solicitarReajuste', token: sessaoToken,
      dados: { cnpj:r['CNPJ'], cliente:r['CLIENTE'], servico:r['TP DE SERVIÇO'], valorAtual:base, percentual:pct, indice }
    })});
    const res = await resp.json();
    if (!res.ok) { area.innerHTML = `<div class="sem-acesso">${res.erro}</div>`; return; }

  const valor = document.getElementById('inad-valor').value;
  const dias = document.getElementById('inad-dias').value;
  const obs = document.getElementById('inad-obs').value;
  if (!valor || !dias) { document.getElementById('inad-msg').innerHTML = '<div class="sem-acesso" style="margin-top:12px;">Preencha valor e dias.</div>'; return; }
  document.getElementById('inad-msg').innerHTML = '<div style="text-align:center;padding:12px;color:var(--cinza-500);">Salvando...</div>';
  try {
    const resp = await fetch(API_URL, { method:'POST', body: JSON.stringify({
      acao:'inadimplencia', token: sessaoToken,
      dados: { cnpj, cliente, valor, dias, obs }
    })});
    const r = await resp.json();
    if (!r.ok) { document.getElementById('inad-msg').innerHTML = `<div class="sem-acesso" style="margin-top:12px;">${r.erro}</div>`; return; }
    cacheInad = null; // recarregar depois
    document.getElementById('inad-msg').innerHTML = `<div style="background:var(--verde-ok-bg);border:1px solid var(--verde-ok-borda);border-radius:8px;padding:12px;margin-top:12px;color:var(--verde-ok);font-size:13px;"><i class="ti ti-circle-check"></i> Registrado! Roberto e Andrea serão avisados no painel. A Joyce pode disparar o e-mail pela aba Inadimplência.</div>`;

    setTimeout(fecharFicha, 2200);
  } catch(e) { document.getElementById('inad-msg').innerHTML = '<div class="sem-acesso" style="margin-top:12px;">Erro de conexão.</div>'; }
}

// ---- Sininho de avisos (Roberto, Andrea, admin) ----
async function atualizarSino() {
  if (!usuarioAtual) return;
  const id = String(usuarioAtual.id||'').toLowerCase();
  // inadimplência: diretor/admin. Solicitações de aditivo/contrato: admin (Mafe/Andrea) e assistente (Danielly)
  const veInad = ['diretor','admin'].includes(usuarioAtual.perfil);
  const veSolicitacoes = ['admin','assistente'].includes(usuarioAtual.perfil);
  // preço: Roberto (e diretoria) vê pedidos aguardando; Danielly vê os já precificados
  const vePedidosPreco = ['roberto','mafe','andrea'].includes(id);
  const vePrecificados = (id === 'danielly');
  // follow-ups da semana: todos veem (cada um filtra os seus pelo CRM)
  const veFollowUps = true;
  const btn = document.getElementById('btn-sino');
  if (!veInad && !veSolicitacoes && !vePedidosPreco && !vePrecificados && !veFollowUps) { btn.style.display='none'; return; }
  btn.style.display='inline-block';
  try {
    let total = 0;
    window._avisosSolic = [];
    window._avisosPreco = [];
    window._avisosFU = [];
    if (veInad) { const lista = await carregarInad(); total += lista.length; }
    if (veSolicitacoes) {
      const [ra, rc] = await Promise.all([buscarDados('Aditivos'), buscarDados('Solicitacoes_Contrato')]);
      const adit = (ra.ok?ra.linhas:[]).filter(x=>String(x['STATUS']||'').toLowerCase()==='solicitado').map(x=>({tipo:'Aditivo', cliente:x['CLIENTE'], por:x['SOLICITADO_POR'], data:x['DATA']}));
      const ctr = (rc.ok?rc.linhas:[]).filter(x=>String(x['STATUS']||'').toLowerCase()==='solicitado').map(x=>({tipo:'Contrato', cliente:x['CLIENTE'], por:x['SOLICITADO_POR'], data:x['DATA']}));
      window._avisosSolic = adit.concat(ctr);
      total += window._avisosSolic.length;
    }
    if (vePedidosPreco || vePrecificados) {
      const rp = await buscarDados('Precificacao');
      const linhas = rp.ok ? rp.linhas : [];
      if (vePedidosPreco) {
        const pend = linhas.filter(x=>String(x['STATUS']||'').toLowerCase()==='aguardando preço' || String(x['STATUS']||'').toLowerCase()==='aguardando preco')
          .map(x=>({id:'preco-pend-'+(x['ID']||x['CLIENTE']||''), tipo:'Preço pedido', cliente:x['CLIENTE'], por:x['SOLICITANTE']||x['CONSULTOR']||'', data:x['DATA']}));
        window._avisosPreco = window._avisosPreco.concat(pend);
      }
      if (vePrecificados) {
        const prec = linhas.filter(x=>String(x['STATUS']||'').toLowerCase()==='precificado')
          .map(x=>({id:'preco-prec-'+(x['ID']||x['CLIENTE']||''), tipo:'Precificado', cliente:x['CLIENTE'], por:'Roberto', data:x['DATA_RESPOSTA']||x['DATA'], preco:x['PRECO']}));
        window._avisosPreco = window._avisosPreco.concat(prec);
      }
      window._avisosPreco = window._avisosPreco.filter(a=>!avisoEstaLido(a.id));
      total += window._avisosPreco.length;
    }
    const badge = document.getElementById('sino-badge');
    if (veFollowUps) {
      // follow-ups com data nos próximos 7 dias — de LEADS (campo FOLLOWUP) e de CARTEIRA (atividades tipo Follow-up)
      if (!kanbanLeads) await carregarLeads();
      const hoje = new Date(new Date().toDateString());
      const fim = new Date(hoje); fim.setDate(fim.getDate()+7);
      const fusLead = (kanbanLeads||[]).filter(l=>{ const d=parseDataReaj(l['FOLLOWUP']); return d && d>=hoje && d<=fim; })
        .map(l=>({id:'fu-'+(l['ID_LEAD']||'')+'-'+(l['FOLLOWUP']||''), idLead:l['ID_LEAD'], cliente:l['CLIENTE'], data:l['FOLLOWUP'], consultor:l['CONSULTOR'], origem:'Lead'}));
      // follow-ups de carteira: atividades agendadas do tipo Follow-up
      let fusCart = [];
      try {
        const ra = await buscarDados('Atividades_Cliente');
        fusCart = (ra.ok?ra.linhas:[]).filter(a=>String(a['TIPO']||'')==='Follow-up' && a['DATA_AGENDADA'])
          .filter(a=>{ const d=parseDataReaj(a['DATA_AGENDADA']); return d && d>=hoje && d<=fim; })
          .map(a=>({id:'fuc-'+(a['CNPJ']||'')+'-'+(a['DATA_AGENDADA']||''), cnpj:a['CNPJ'], cliente:a['CLIENTE'], data:a['DATA_AGENDADA'], consultor:a['REGISTRADO_POR']||'', origem:'Carteira'}));
      } catch(e){}
      const fus = fusLead.concat(fusCart)
        .filter(a=>!avisoEstaLido(a.id))
        .sort((a,b)=>(parseDataReaj(a.data)||0)-(parseDataReaj(b.data)||0));
      window._avisosFU = fus;
      total += fus.length;
    }
    if (total) { badge.textContent = total; badge.style.display='flex'; }
    else badge.style.display='none';
  } catch(e) {}
}

// ===== AVISOS: marcar como lido (guarda no navegador) e abrir o item =====
function lidosKey(){ return 'avisos_lidos_' + (usuarioAtual && usuarioAtual.id || ''); }
function getAvisosLidos(){ try { return JSON.parse(localStorage.getItem(lidosKey())||'[]'); } catch(e){ return []; } }
function avisoEstaLido(id){ if(!id) return false; return getAvisosLidos().includes(id); }
function marcarAvisoLido(id, ev){
  if (ev) ev.stopPropagation();
  if (!id) return;
  const lidos = getAvisosLidos();
  if (!lidos.includes(id)) { lidos.push(id); try { localStorage.setItem(lidosKey(), JSON.stringify(lidos)); } catch(e){} }
  // remove da memória e re-renderiza
  window._avisosPreco = (window._avisosPreco||[]).filter(a=>a.id!==id);
  window._avisosFU = (window._avisosFU||[]).filter(a=>a.id!==id);
  abrirAvisos();
  atualizarSino();
}
// abre o destino certo do aviso (precificação pro Roberto; lead pro consultor)
async function abrirAvisoDestino(tipo, cliente, idLead) {
  fecharFicha();
  await carregarLeads();
  let lead = null;
  if (idLead) lead = (kanbanLeads||[]).find(l=>String(l['ID_LEAD'])===String(idLead));
  if (!lead && cliente) lead = (kanbanLeads||[]).find(l=>String(l['CLIENTE'])===String(cliente));
  if (tipo==='Preço pedido') {
    // Roberto: abrir a tela de precificação e o lead
    selecionarModulo('crm');
    setTimeout(()=>{
      selecionarSub('crm-precificacao','Precificação');
      if (lead) setTimeout(()=>{ if (typeof abrirFormPrecoLead==='function') abrirFormPrecoLead(lead); }, 400);
    }, 200);
    return;
  }
  // demais (Precificado, Follow-up): abrir o lead
  if (lead) abrirLead(lead['ID_LEAD']);
  else selecionarModulo('crm');
}

    : '';
  let itensInad = inad.length
    ? inad.map(l=>`<div style="padding:10px 12px;border-bottom:1px solid var(--cinza-100);font-size:13px;"><span style="display:inline-block;background:var(--vermelho-bg);color:var(--vermelho);border-radius:4px;padding:1px 6px;font-size:10px;margin-right:6px;">Inadimplência</span><b>${l['CLIENTE']}</b> — ${fmtMoeda(l['VALOR_ABERTO'])} · ${l['DIAS_ATRASO']}d</div>`).join('')

    : '';
  const fu = window._avisosFU || [];
  let itensFU = fu.length
    ? fu.map(f=>`<div onclick="abrirAvisoDestino('Follow-up','${(f.cliente||'').replace(/'/g,"\\'")}','${f.idLead||''}')" style="padding:10px 12px;border-bottom:1px solid var(--cinza-100);font-size:13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;" onmouseover="this.style.background='var(--cinza-100)'" onmouseout="this.style.background='white'"><div><span style="display:inline-block;background:#F3F0FA;color:#6B5B95;border-radius:4px;padding:1px 6px;font-size:10px;margin-right:6px;">Follow-up</span><b>${f.cliente||'—'}</b> — ${fmtDataBR(f.data)}${f.consultor?' · '+f.consultor:''}</div><button onclick="marcarAvisoLido('${f.id}',event)" title="Marcar como lido" style="flex-shrink:0;border:none;background:none;color:var(--cinza-400);cursor:pointer;font-size:16px;"><i class="ti ti-check"></i></button></div>`).join('')
    : '';
  const corpo = (itensSolic+itensInad+itensPreco+itensFU) || '<div style="padding:16px;color:var(--cinza-500);font-size:13px;">Sem avisos no momento.</div>';
  cont.innerHTML = `
    <div class="ficha-overlay" onclick="if(event.target===this)fecharFicha()">
      <div class="ficha" style="width:480px;">

          <div class="nome"><i class="ti ti-bell"></i> Avisos</div><div class="cnpj">Solicitações e pendências</div></div>
        <div class="ficha-corpo" style="padding:8px 0;">
          ${fu.length?`<div style="font-size:11px;font-weight:600;color:var(--cinza-500);padding:6px 12px;">FOLLOW-UPS DA SEMANA</div>`:''}
          ${itensFU}
          ${preco.length?`<div style="font-size:11px;font-weight:600;color:var(--cinza-500);padding:10px 12px 6px;">PREÇOS</div>`:''}
          ${itensPreco}
          ${solic.length?`<div style="font-size:11px;font-weight:600;color:var(--cinza-500);padding:10px 12px 6px;">SOLICITAÇÕES PENDENTES</div>`:''}
          ${itensSolic}
          ${inad.length?`<div style="font-size:11px;font-weight:600;color:var(--cinza-500);padding:10px 12px 6px;">INADIMPLÊNCIA</div>`:''}

function calcImpactoReaj() {
  const mesEsc = (document.getElementById('g-mes-reaj')||{}).value;
  const cont = document.getElementById('impacto-reaj');
  if (!mesEsc) { cont.innerHTML = '<div style="color:var(--cinza-500);font-size:13px;text-align:center;padding:20px;">Escolha um mês.</div>'; return; }

  const reajLinhas = window._reajLinhas || [];
  const fatLinhas = window._fatLinhas || [];
  const mesesFat = window._mesesCols || [];

  // clientes reajustados no mês escolhido
  const doMes = reajLinhas.filter(r => {
    const d = parseDataReaj(r['DATA ÚLTIMO REAJUSTE '] || r['DATA ÚLTIMO REAJUSTE']);
    return d && ((d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getFullYear()) === mesEsc;
  });

  if (!doMes.length) { cont.innerHTML = '<div style="color:var(--cinza-500);font-size:13px;text-align:center;padding:20px;">Nenhum cliente reajustado neste mês.</div>'; return; }

  // tentar comparar faturamento: mês do reajuste vs mês anterior (se existirem na aba Faturamento)
  // como hoje só há 1 mês de faturamento, usa o % do reajuste sobre o faturamento disponível
  const fatPorCnpj = {};
  fatLinhas.forEach(l => { fatPorCnpj[String(l['CNPJ'])] = l; });
  const ultimoMesFat = mesesFat[mesesFat.length-1];

  let totalAumento = 0;
  let linhas = '';
  doMes.forEach(r => {
    const cnpj = String(r['CNPJ']);
    const pct = parseFloat(r['ALIQUOTA'])*100 || 0;
    const fatCli = fatPorCnpj[cnpj];
    const fatBase = fatCli ? (parseFloat(fatCli[ultimoMesFat])||0) : 0;
    // aumento estimado = faturamento × (pct / (100+pct))  [parte do faturamento que veio do reajuste]
    const aumento = fatBase>0 && pct>0 ? fatBase * (pct/(100+pct)) : 0;
    totalAumento += aumento;
    linhas += `<tr style="border-top:1px solid var(--cinza-100);">
      <td style="padding:8px 10px;">${r['CLIENTE']||'—'}</td>
      <td style="padding:8px 10px;text-align:right;">${pct.toFixed(1)}%</td>
      <td style="padding:8px 10px;text-align:right;color:var(--cinza-600);">${fatBase>0?fmtMoeda(fatBase):'—'}</td>
      <td style="padding:8px 10px;text-align:right;color:var(--verde-ok);font-weight:600;">${aumento>0?'+'+fmtMoeda(aumento):'—'}</td>
    </tr>`;
  });

  cont.innerHTML = `
    <div style="display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;">
      <div class="kpi-fat" style="flex:1;min-width:160px;border-top:3px solid var(--verde-ok);">
        <div class="tit"><i class="ti ti-trending-up"></i> Aumento total no mês</div>
        <div class="val" style="color:var(--verde-ok);">+${fmtMoeda(totalAumento)}</div>
        <div class="var" style="color:var(--cinza-600);">${doMes.length} clientes reajustados</div>
      </div>
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:13px;">
      <thead><tr style="background:var(--verde-claro-bg);">
        <th style="padding:9px 10px;text-align:left;color:var(--verde-escuro);">Cliente</th>
        <th style="padding:9px 10px;text-align:right;color:var(--verde-escuro);">% reajuste</th>
        <th style="padding:9px 10px;text-align:right;color:var(--verde-escuro);">Faturamento</th>
        <th style="padding:9px 10px;text-align:right;color:var(--verde-escuro);">Aumento R$</th>
      </tr></thead>
      <tbody>${linhas}</tbody>
    </table>
    <div style="font-size:11px;color:var(--cinza-500);margin-top:10px;"><i class="ti ti-info-circle"></i> Quando houver faturamento de vários meses, o aumento será calculado comparando o mês anterior ao reajuste com o mês do reajuste. Por ora, é estimado sobre o faturamento disponível.</div>`;
}

function corVerde(a){ return `rgba(45,90,61,${a})`; }

// unifica variações: IPC FIPE / IPC-FIPE / IPC F / IPCF -> IPC-F
function normalizaIndice(ind) {
  if (!ind) return 'Outro';
  let s = String(ind).toUpperCase().replace(/\s+/g,' ').trim();
  if (s.includes('IPC') && s.includes('FIPE')) return 'IPC-F';
  if (s.replace(/[\s\-]/g,'') === 'IPCF') return 'IPC-F';
  if (s.includes('IGPM') || s.includes('IGP-M') || s.includes('IGP M')) return 'IGP-M';
  if (s.includes('IPCA')) return 'IPCA';
  if (s.includes('INPC')) return 'INPC';
  return s;
}

function atualizaGraficoFat() {
  const cnpj = (document.getElementById('g-cliente')||{}).value || '__todos';
  const meses = window._mesesCols || [];
  const linhas = window._fatLinhas || [];
  let valores;
  if (cnpj === '__todos') {
    valores = meses.map(m => Math.round(linhas.reduce((s,l)=>s+(parseFloat(l[m])||0),0)));
  } else {
    const cli = linhas.find(l=>String(l['CNPJ'])===cnpj);
    valores = meses.map(m => cli ? Math.round(parseFloat(cli[m])||0) : 0);
  }
  const ctx = document.getElementById('chart-fat');
  if (!ctx) return;
  const existente = chartsAtivos.find(c=>c.canvas===ctx);
  if (existente) existente.destroy();
  const ch = new Chart(ctx, {
    type: 'line',
    data: { labels: meses.length?meses:['(sem dados)'],
      datasets: [{ label:'Faturamento', data: valores, borderColor: corVerde(1), backgroundColor: corVerde(0.1), fill:true, tension:0.3, pointRadius:5, pointBackgroundColor: corVerde(1) }] },
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false},
        tooltip:{ callbacks:{ label: c => 'R$ ' + c.parsed.y.toLocaleString('pt-BR') } } },
      scales:{ y:{ beginAtZero:true, ticks:{ callback: v => {
        if (v >= 1000000) return 'R$ ' + (v/1000000).toFixed(1) + 'mi';
        if (v >= 1000) return 'R$ ' + Math.round(v/1000) + 'k';
        return 'R$ ' + v;
      } } } } }
  });
  chartsAtivos.push(ch);
  if (meses.length < 2) {
    const aviso = document.getElementById('g-aviso');
    if (!aviso) {
      const d = document.createElement('div');
      d.id='g-aviso'; d.style.cssText='font-size:12px;color:var(--cinza-500);margin-top:8px;';
      d.innerHTML='<i class="ti ti-info-circle"></i> Só temos abril por enquanto. A linha ganha forma quando você importar maio, junho...';
      ctx.parentElement.after(d);
    }
  }
}

function graficoInad(inad) {
  const faixas = ['0-30','31-60','61-90','90+'];
  const dados = faixas.map(f => inad.filter(l=>String(l['AGING'])===f).reduce((s,l)=>s+(parseFloat(l['VALOR_ABERTO'])||0),0));
  const ctx = document.getElementById('chart-inad');
  if (!ctx) return;
  const ch = new Chart(ctx, {
    type:'doughnut',
    data:{ labels:faixas.map(f=>f+' dias'),
      datasets:[{ data:dados, backgroundColor:['#ca8a04','#d97706','#e24b4a','#a32d2d'] }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{font:{size:11}}}} }
  });
  chartsAtivos.push(ch);
  if (!inad.length) ctx.parentElement.innerHTML = '<div style="text-align:center;color:var(--cinza-500);padding-top:90px;font-size:13px;"><i class="ti ti-circle-check" style="font-size:28px;color:var(--verde-ok);"></i><br>Nenhum inadimplente</div>';

function graficoReaj(reajLinhas) {
  // Substituído pela seção interativa de impacto de reajustes (montada em renderGraficos)
  const ctx = document.getElementById('chart-reaj');
  if (!ctx) return;
  // mantém um gráfico simples de % médio por índice como visão geral
  const validos = reajLinhas.filter(r => r['ALIQUOTA']!=null && r['ALIQUOTA']!=='');
  const porIndice = {};
  validos.forEach(r => { const ind=normalizaIndice(r['ÍNDICE']); (porIndice[ind]=porIndice[ind]||[]).push(parseFloat(r['ALIQUOTA'])*100); });
  const labels = Object.keys(porIndice);
  const medias = labels.map(k => Math.round(porIndice[k].reduce((a,b)=>a+b,0)/porIndice[k].length*10)/10);
  const ch = new Chart(ctx, {
    type:'bar',
    data:{ labels: labels.length?labels:['(sem dados)'], datasets:[{ label:'% médio', data: medias, backgroundColor: corVerde(0.7) }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ y:{ ticks:{ callback:v=>v+'%' } } } }
  });
  chartsAtivos.push(ch);
}

// ============================================================
// FATURAMENTO — cards (contrato/eventual), tabela, importar CSV
// ============================================================
let cacheFat = null, cacheFatCols = null;

async function renderFaturamento(area) {
  area.innerHTML = `<div class="placeholder"><i class="ti ti-loader"></i><h2>Carregando faturamento...</h2></div>`;
  await carregarClientes(); // pra saber tipo (Contrato/Eventual)
  // carrega o faturamento do módulo Financeiro (upload único, aba Fin_Faturamento)
  if (typeof FIN_garantirSheetJS==='function') { await new Promise(r=>FIN_garantirSheetJS(r)); }
  if (typeof finCarregarDoSheets==='function') { try { await finCarregarDoSheets(['faturamento']); } catch(e){} }
  const fatNovo = (typeof FINdados!=='undefined' && FINdados.faturamento) ? FINdados.faturamento : [];
  // converte {cliente, valores:{mes:v}} para o formato de linha que a tela usa (CLIENTE + colunas de mês)
  cacheFat = fatNovo.map(x => ({ CLIENTE: x.cliente, ...x.valores }));
  const mesesSet = new Set();
  fatNovo.forEach(x => Object.keys(x.valores||{}).forEach(m => mesesSet.add(m)));
  cacheFatCols = ['CLIENTE', ...[...mesesSet]];
  // meses = colunas que não são CLIENTE/CNPJ/VARIACAO_%
  const mesesOrig = cacheFatCols.filter(c => {
    const s = String(c).trim().toUpperCase();
    return s !== 'CNPJ' && s !== 'CLIENTE' && s !== 'VARIACAO_%' && s !== 'VARIACAO_PCT' && s !== 'STATUS_CNPJ' && s !== 'DIA_FATURAMENTO' && s !== 'DIA FATURAMENTO';
  }).map(c => String(c).trim());

  // DEFASAGEM FIXA DE 1 MÊS: o relatório traz o mês FATURADO, mas o valor é do serviço do MÊS ANTERIOR.
  // Ex.: a coluna "Junho" do relatório = serviços de MAIO. Exibimos pelo mês do SERVIÇO.
  const MESES_ORDEM = ['janeiro','fevereiro','março','marco','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const MESES_NOME = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  function mesServicoDoFaturado(nomeMesFaturado){
    const base = String(nomeMesFaturado).trim().toLowerCase().replace('marco','março');
    let idx = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'].indexOf(base);
    if (idx === -1) return nomeMesFaturado + ' (serviço)'; // não reconheceu, mostra como veio
    const idxServico = (idx - 1 + 12) % 12; // mês anterior
    return MESES_NOME[idxServico];
  }
  // "meses" = os rótulos de SERVIÇO (o que o usuário vê e escolhe); cada um aponta pra coluna original do relatório
  const colDoServico = {}; // rótulo de serviço -> coluna original no relatório
  const meses = mesesOrig.map(mOrig => { const svc = mesServicoDoFaturado(mOrig); colDoServico[svc] = mOrig; return svc; });
  function rotuloMes(col) { return String(col); } // já é o nome do mês de serviço
  // mês escolhido: usa o estado global (setado no onchange, sobrevive ao "Carregando..."),
  // senão o que estiver no select, senão o último disponível
  const selRaw = window._fatMesSel || (document.getElementById('fat-mes')||{}).value;
  const selAnterior = selRaw ? String(selRaw).trim() : '';
  const mesAtual = (selAnterior && meses.includes(selAnterior)) ? selAnterior : (meses[meses.length-1] || meses[0]);
  const idxMes = meses.indexOf(mesAtual);
  // mês de comparação: se o usuário escolheu um, usa ele; senão, o mês imediatamente anterior
  const compSel = window._fatMesComp && meses.includes(window._fatMesComp) && window._fatMesComp!==mesAtual ? window._fatMesComp : null;
  const mesAnterior = compSel || (idxMes > 0 ? meses[idxMes-1] : null);

  // mapa de tipo por NOME do cliente (a fonte de variação não traz CNPJ; casar por nome é mais confiável,
  // e clientes multi-unidade são agrupados por nome mesmo).
  const norm = s => String(s||'').trim().toUpperCase().replace(/\s+/g,' ');
  const tipoPorNome = {};
  cacheClientes.forEach(c => { tipoPorNome[norm(c['CLIENTE'])] = (c['TIPO']==='Eventual'?'Eventual':'Contrato'); });

  // valor do mês de uma linha. 'mes' é o mês de SERVIÇO; traduz pra coluna original (mês faturado).
  function valMes(linha, mes) {
    const colReal = colDoServico[mes] || mes; // coluna original no relatório (mês faturado)
    let v = linha[colReal];
    if (v == null) {
      const k = Object.keys(linha).find(kk => String(kk).trim() === String(colReal).trim());
      v = k ? linha[k] : null;
    }
    if (v == null || v === '') return 0;
    if (typeof v === 'number') return v;
    let s = String(v).replace(/[^\d,.-]/g,'');
    if (s.includes(',') && s.lastIndexOf(',') > s.lastIndexOf('.')) s = s.replace(/\./g,'').replace(',','.');
    const n = parseFloat(s); return isNaN(n)?0:n;
  }
  // somatórios
  function somaTipo(mes, tipo) {
    return cacheFat.reduce((s,l) => {
      const t = tipoPorNome[norm(l['CLIENTE'])] || 'Contrato';
      if (tipo && t !== tipo) return s;
      return s + valMes(l, mes);
    }, 0);
  }
  const totAtual = somaTipo(mesAtual, null);
  const totAnt = mesAnterior ? somaTipo(mesAnterior, null) : null;
  const contrAtual = somaTipo(mesAtual, 'Contrato');
  const contrAnt = mesAnterior ? somaTipo(mesAnterior, 'Contrato') : null;
  const evAtual = somaTipo(mesAtual, 'Eventual');
  const evAnt = mesAnterior ? somaTipo(mesAnterior, 'Eventual') : null;

  function varHtml(atual, ant) {
    if (ant == null || ant === 0) return '<span class="fat-var-zero">sem mês anterior</span>';
    const pct = ((atual-ant)/ant*100);
    const cls = pct > 0.05 ? 'fat-var-pos' : pct < -0.05 ? 'fat-var-neg' : 'fat-var-zero';
    const ico = pct > 0.05 ? 'ti-trending-up' : pct < -0.05 ? 'ti-trending-down' : 'ti-minus';
    return `<span class="${cls}"><i class="ti ${ico}"></i> ${pct>0?'+':''}${pct.toFixed(1)}% vs ${mesAnterior}</span>`;
  }

  area.innerHTML = `
    <div style="background:var(--verde-claro-bg);color:var(--verde-escuro);border-radius:8px;padding:10px 13px;font-size:12.5px;margin-bottom:14px;display:flex;align-items:center;gap:8px;">
      <i class="ti ti-calendar-stats"></i> Os meses aqui são o <b>mês do serviço</b>. O relatório fatura no mês seguinte (serviço de maio → faturado em junho), e o dashboard já ajusta essa defasagem de 1 mês pra você.
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
      <div style="display:inline-flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span style="font-size:13px;color:var(--cinza-600);">Mês do serviço:</span>
        <select class="filtro-sel" id="fat-mes" onchange="window._fatMesSel=this.value;renderFaturamento(document.getElementById('area-conteudo'))" style="min-width:140px;">
          ${meses.map(m=>`<option value="${m}" ${m===mesAtual?'selected':''}>${rotuloMes(m)}</option>`).join('')}
        </select>
        <span style="font-size:13px;color:var(--cinza-600);">comparar com:</span>
        <select class="filtro-sel" id="fat-mes-comp" onchange="window._fatMesComp=this.value;renderFaturamento(document.getElementById('area-conteudo'))" style="min-width:140px;">
          <option value="">Mês anterior (automático)</option>
          ${meses.filter(m=>m!==mesAtual).map(m=>`<option value="${m}" ${m===mesAnterior&&compSel?'selected':''}>${rotuloMes(m)}</option>`).join('')}
        </select>
      </div>
      <span style="font-size:12px;color:var(--cinza-500);display:inline-flex;align-items:center;gap:6px;"><i class="ti ti-info-circle"></i> Para atualizar, suba o relatório em <b>Financeiro › Relatórios</b></span>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px;">
      <div class="kpi-fat" style="border-top:3px solid var(--verde-escuro);">
        <div class="tit"><i class="ti ti-cash"></i> Total faturado · ${rotuloMes(mesAtual)}</div>
        <div class="val">${fmtMoeda(totAtual)}</div>
        <div class="var">${varHtml(totAtual, totAnt)}</div>
      </div>
      <div class="kpi-fat" style="border-top:3px solid var(--verde-ok);">
        <div class="tit"><i class="ti ti-file-text"></i> Contratos</div>
        <div class="val" style="font-size:22px;">${fmtMoeda(contrAtual)}</div>
        <div class="var">${varHtml(contrAtual, contrAnt)}</div>
      </div>
      <div class="kpi-fat" style="border-top:3px solid var(--cinza-500);">
        <div class="tit"><i class="ti ti-calendar-event"></i> Eventuais</div>
        <div class="val" style="font-size:22px;">${fmtMoeda(evAtual)}</div>
        <div class="var">${varHtml(evAtual, evAnt)}</div>
      </div>
    </div>

    <div class="barra-busca">
      <i class="ti ti-search"></i>
      <input type="text" id="fat-busca" placeholder="Buscar cliente..." oninput="filtraTabelaFat()">
      <span class="contagem">${cacheFat.length} clientes</span>
    </div>
    <div class="filtros" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <span class="filtro-chip ativo" id="ff-todos" onclick="setFiltroFat('todos',this)">Todos</span>
      <span class="filtro-chip" id="ff-contrato" onclick="setFiltroFat('Contrato',this)">Contrato</span>
      <span class="filtro-chip" id="ff-eventual" onclick="setFiltroFat('Eventual',this)">Eventual</span>
      <select class="filtro-sel" id="fat-visao" onchange="filtraTabelaFat()" style="min-width:180px;">
        <option value="mes">Mês único (atual vs anterior)</option>
        <option value="3meses">Últimos 3 meses</option>
        <option value="media3">Média dos últimos 3 meses</option>
      </select>
      <select class="filtro-sel" id="fat-ordem" onchange="filtraTabelaFat()" style="margin-left:auto;min-width:190px;">
        <option value="maior">Maior faturamento</option>
        <option value="menor">Menor faturamento</option>
        <option value="var-maior">Variação: maior → menor</option>
        <option value="var-menor">Variação: menor → maior</option>
        <option value="nome">Nome (A-Z)</option>
      </select>
      <button class="filtro-chip" onclick="exportarFaturamento()" style="border:1.5px solid var(--verde-medio);color:var(--verde-escuro);"><i class="ti ti-printer"></i> Exportar</button>
    </div>
    <div id="fat-tabela-area"></div>`;

  window._fatMeses = meses;
  window._fatMes = mesAtual;
  window._fatMesAnt = mesAnterior;
  window._fatRotulo = rotuloMes;
  window._tipoPorNome = tipoPorNome;
  window._normNomeFat = norm;
  window._valMes = valMes;
  window._filtroFatTipo = 'todos';
  filtraTabelaFat();
}

function setFiltroFat(t, el) {
  window._filtroFatTipo = t;
  document.querySelectorAll('[id^="ff-"]').forEach(c=>c.classList.remove('ativo'));
  if (el) el.classList.add('ativo');
  filtraTabelaFat();
}

function filtraTabelaFat() {
  const termo = ((document.getElementById('fat-busca')||{}).value||'').toLowerCase();
  const meses = window._fatMeses || [];
  const mes = window._fatMes, mesAnt = window._fatMesAnt, tipos = window._tipoPorNome;
  const normF = window._normNomeFat || (s=>String(s||'').trim().toUpperCase());
  const vm = window._valMes || ((l,m)=>parseFloat(l[m])||0);
  const rot = window._fatRotulo || (m=>m);
  const filtroTipo = window._filtroFatTipo || 'todos';
  const visao = (document.getElementById('fat-visao')||{}).value || 'mes';
  // os últimos 3 meses disponíveis (ordem cronológica: antigo -> recente)
  const idxAtual = meses.indexOf(mes);
  const ultimos3 = meses.slice(Math.max(0, idxAtual-2), idxAtual+1);

  let lista = cacheFat.slice();
  if (termo) lista = lista.filter(l => String(l['CLIENTE']||'').toLowerCase().includes(termo));
  if (filtroTipo !== 'todos') lista = lista.filter(l => (tipos[normF(l['CLIENTE'])]||'Contrato') === filtroTipo);

  // funções de valor conforme a visão
  const media3 = l => { const vs=ultimos3.map(m=>vm(l,m)); return vs.reduce((a,b)=>a+b,0)/(vs.length||1); };
  const varPct = l => { const a=vm(l,mes), b=mesAnt?vm(l,mesAnt):0; if(!b) return null; return (a-b)/b*100; };

  // ordenação
  const ordem = (document.getElementById('fat-ordem')||{}).value || 'maior';
  const valOrd = l => visao==='media3' ? media3(l) : vm(l, mes);
  if (ordem === 'menor') lista.sort((a,b)=>valOrd(a)-valOrd(b));
  else if (ordem === 'nome') lista.sort((a,b)=>String(a['CLIENTE']||'').localeCompare(String(b['CLIENTE']||'')));
  else if (ordem === 'var-maior') lista.sort((a,b)=>((varPct(b)??-Infinity)-(varPct(a)??-Infinity)));
  else if (ordem === 'var-menor') lista.sort((a,b)=>((varPct(a)??Infinity)-(varPct(b)??Infinity)));
  else lista.sort((a,b)=>valOrd(b)-valOrd(a));

  window._fatListaExport = lista; // guarda pra exportar

  let html = '';
  if (visao === '3meses') {
    // colunas: cliente, tipo, mês-2, mês-1, mês atual (esquerda->direita, antigo->recente), variação do último par
    html = `<table class="fat-tabela"><thead><tr><th>Cliente</th><th>Tipo</th>${ultimos3.map(m=>`<th class="num">${rot(m)}</th>`).join('')}<th class="num">Variação</th></tr></thead><tbody>`;
    lista.slice(0,200).forEach(l => {
      const tipo = tipos[normF(l['CLIENTE'])] || 'Contrato';
      const vs = ultimos3.map(m=>vm(l,m));
      const p = (vs.length>=2 && vs[vs.length-2]!==0) ? ((vs[vs.length-1]-vs[vs.length-2])/vs[vs.length-2]*100) : null;
      const varCol = p===null ? '<td class="num fat-var-zero">—</td>' : `<td class="num ${p>0.05?'fat-var-pos':p<-0.05?'fat-var-neg':'fat-var-zero'}">${p>0?'+':''}${p.toFixed(1)}%</td>`;
      html += `<tr onclick="abrirFicha('${cnpjLimpo(l['CNPJ']||'')}','${String(l['CLIENTE']||'').replace(/'/g,"\\'")}')">
        <td><b style="color:var(--cinza-900);">${l['CLIENTE']||'—'}</b></td>
        <td><span class="tag ${tipo==='Eventual'?'tag-eventual':'tag-contrato'}">${tipo}</span></td>
        ${vs.map((v,i)=>`<td class="num" style="${i===vs.length-1?'font-weight:700;':'color:var(--cinza-600);'}">${fmtMoeda(v)}</td>`).join('')}
        ${varCol}
      </tr>`;
    });
    html += `</tbody></table>`;
  } else if (visao === 'media3') {
    html = `<table class="fat-tabela"><thead><tr><th>Cliente</th><th>Tipo</th><th class="num">Média 3 meses</th><th class="num" style="font-size:11px;">(${ultimos3.map(rot).join(', ')})</th></tr></thead><tbody>`;
    lista.slice(0,200).forEach(l => {
      const tipo = tipos[normF(l['CLIENTE'])] || 'Contrato';
      const m = media3(l);
      const detalhe = ultimos3.map(mm=>fmtMoeda(vm(l,mm))).join(' · ');
      html += `<tr onclick="abrirFicha('${cnpjLimpo(l['CNPJ']||'')}','${String(l['CLIENTE']||'').replace(/'/g,"\\'")}')">
        <td><b style="color:var(--cinza-900);">${l['CLIENTE']||'—'}</b></td>
        <td><span class="tag ${tipo==='Eventual'?'tag-eventual':'tag-contrato'}">${tipo}</span></td>
        <td class="num"><b>${fmtMoeda(m)}</b></td>
        <td class="num" style="color:var(--cinza-500);font-size:12px;">${detalhe}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  } else {
    // mês único: ANTERIOR à esquerda, ATUAL à direita, depois variação
    html = `<table class="fat-tabela"><thead><tr><th>Cliente</th><th>Tipo</th>${mesAnt?`<th class="num">${rot(mesAnt)}</th>`:''}<th class="num">${rot(mes)}</th>${mesAnt?`<th class="num">Variação</th>`:''}</tr></thead><tbody>`;
    lista.slice(0,200).forEach(l => {
      const atual = vm(l, mes);
      const ant = mesAnt ? vm(l, mesAnt) : null;
      const tipo = tipos[normF(l['CLIENTE'])] || 'Contrato';
      let varCol = '';
      if (mesAnt) {
        if (ant === 0) varCol = `<td class="num fat-var-zero">novo</td>`;
        else { const p=((atual-ant)/ant*100); varCol = `<td class="num ${p>0.05?'fat-var-pos':p<-0.05?'fat-var-neg':'fat-var-zero'}">${p>0?'+':''}${p.toFixed(1)}%</td>`; }
      }
      html += `<tr onclick="abrirFicha('${cnpjLimpo(l['CNPJ']||'')}','${String(l['CLIENTE']||'').replace(/'/g,"\\'")}')">
        <td><b style="color:var(--cinza-900);">${l['CLIENTE']||'—'}</b></td>
        <td><span class="tag ${tipo==='Eventual'?'tag-eventual':'tag-contrato'}">${tipo}</span></td>
        ${mesAnt?`<td class="num" style="color:var(--cinza-600);">${fmtMoeda(ant)}</td>`:''}
        <td class="num"><b>${fmtMoeda(atual)}</b></td>
        ${varCol}
      </tr>`;
    });
    html += `</tbody></table>`;
  }
  if (lista.length > 200) html += `<div style="margin-top:8px;font-size:12px;color:var(--cinza-500);">Mostrando 200 de ${lista.length}. Use a busca.</div>`;
  document.getElementById('fat-tabela-area').innerHTML = html;
}

// exporta a tabela de faturamento atual para uma janela de impressão
function exportarFaturamento() {
  const lista = window._fatListaExport || [];
  const meses = window._fatMeses || [];
  const mes = window._fatMes, mesAnt = window._fatMesAnt, tipos = window._tipoPorNome || {};
  const normF = window._normNomeFat || (s=>String(s||'').trim().toUpperCase());
  const vm = window._valMes || ((l,m)=>parseFloat(l[m])||0);
  const rot = window._fatRotulo || (m=>m);
  const visao = (document.getElementById('fat-visao')||{}).value || 'mes';
  const idxAtual = meses.indexOf(mes);
  const ultimos3 = meses.slice(Math.max(0, idxAtual-2), idxAtual+1);
  let cabTab, linhas;
  if (visao === '3meses') {
    cabTab = `<th>Cliente</th><th>Tipo</th>${ultimos3.map(m=>`<th>${rot(m)}</th>`).join('')}<th>Variação</th>`;
    linhas = lista.map(l=>{ const vs=ultimos3.map(m=>vm(l,m)); const p=(vs.length>=2&&vs[vs.length-2]!==0)?((vs[vs.length-1]-vs[vs.length-2])/vs[vs.length-2]*100):null;
      return `<tr><td>${l['CLIENTE']||'—'}</td><td>${tipos[normF(l['CLIENTE'])]||'Contrato'}</td>${vs.map(v=>`<td>${fmtMoeda(v)}</td>`).join('')}<td>${p===null?'—':(p>0?'+':'')+p.toFixed(1)+'%'}</td></tr>`; }).join('');
  } else if (visao === 'media3') {
    cabTab = `<th>Cliente</th><th>Tipo</th><th>Média 3 meses (${ultimos3.map(rot).join(', ')})</th>`;
    linhas = lista.map(l=>{ const vs=ultimos3.map(m=>vm(l,m)); const md=vs.reduce((a,b)=>a+b,0)/(vs.length||1);
      return `<tr><td>${l['CLIENTE']||'—'}</td><td>${tipos[normF(l['CLIENTE'])]||'Contrato'}</td><td>${fmtMoeda(md)}</td></tr>`; }).join('');
  } else {
    cabTab = `<th>Cliente</th><th>Tipo</th>${mesAnt?`<th>${rot(mesAnt)}</th>`:''}<th>${rot(mes)}</th>${mesAnt?'<th>Variação</th>':''}`;
    linhas = lista.map(l=>{ const a=vm(l,mes), b=mesAnt?vm(l,mesAnt):null; const p=(mesAnt&&b!==0)?((a-b)/b*100):null;
      return `<tr><td>${l['CLIENTE']||'—'}</td><td>${tipos[normF(l['CLIENTE'])]||'Contrato'}</td>${mesAnt?`<td>${fmtMoeda(b)}</td>`:''}<td>${fmtMoeda(a)}</td>${mesAnt?`<td>${p===null?'novo':(p>0?'+':'')+p.toFixed(1)+'%'}</td>`:''}</tr>`; }).join('');
  }
  const win = window.open('', '_blank');
  win.document.write(`<html><head><title>Faturamento — ${rot(mes)}</title>
    <style>body{font-family:Arial,sans-serif;padding:24px;color:#22221e;}h1{color:#2d5a3d;font-size:20px;}
    table{width:100%;border-collapse:collapse;margin-top:12px;font-size:12px;}th{background:#2d5a3d;color:#fff;padding:6px 8px;text-align:left;}
    td{padding:5px 8px;border-bottom:1px solid #eee;}tr:nth-child(even) td{background:#f7f7f4;}</style></head><body>
    <h1>Ecotrans Ambiental — Faturamento</h1>
    <p>Visão: ${visao==='3meses'?'Últimos 3 meses':visao==='media3'?'Média dos últimos 3 meses':'Mês '+rot(mes)} · Gerado em ${new Date().toLocaleDateString('pt-BR')}</p>
    <table><thead><tr>${cabTab}</tr></thead><tbody>${linhas}</tbody></table>
    </body></html>`);
  win.document.close();
  setTimeout(()=>win.print(), 400);
}

// processa o texto colado da Variação e envia pro Apps Script fazer o merge
async function processarVariacao() {
  const texto = document.getElementById('imp-var-texto').value.trim();
  const msg = document.getElementById('imp-var-msg');
  if (!texto) { msg.innerHTML='<div class="sem-acesso" style="margin-top:10px;">Cole as linhas da variação.</div>'; return; }
  // separar linhas e colunas (aceita tab, ; ou 2+ espaços)
  let todasLinhas = texto.split('\n').map(l=>l.trim()).filter(Boolean).map(l => l.split(/\t|;|\s{2,}/).map(c=>c.trim()));
  // tenta achar o cabeçalho (linha que tem "Cliente" e nomes de mês) pra capturar os meses
  let mesesNomes = [];
  const MESES_VALIDOS = ['janeiro','fevereiro','março','marco','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const linhaCab = todasLinhas.find(cols => cols.join(' ').toLowerCase().includes('cliente') && cols.some(c=>MESES_VALIDOS.includes(String(c).toLowerCase().trim())));
  if (linhaCab) {
    mesesNomes = linhaCab.filter(c => MESES_VALIDOS.includes(String(c).toLowerCase().trim()));
  }
  // remove cabeçalho das linhas de dados
  let linhas = todasLinhas.filter(cols => {
    const j = cols.join(' ').toLowerCase();
    return !(j.includes('cliente') && (j.includes('variação')||j.includes('variacao')||MESES_VALIDOS.some(m=>j.includes(m))));
  });
  // detecta se a 1ª coluna é "Dia de Faturamento" (número) em vez do cliente
  let offsetCliente = 0;
  const amostra = linhas.slice(0, 10);
  const primeiraNumerica = amostra.filter(c => c.length>=2 && /^\d+$/.test(String(c[0]).trim()) && !/^\d+$/.test(String(c[1]).trim())).length;
  if (amostra.length && primeiraNumerica >= Math.ceil(amostra.length*0.6)) offsetCliente = 1;
  // primeira coluna (após offset) = cliente; demais = valores
  const registros = linhas.map(cols => {
    const cliente = cols[offsetCliente];
    let valores = cols.slice(offsetCliente+1).map(v => { let s=String(v).replace(/[^\d,.-]/g,'').replace(/\./g,'').replace(',','.'); const n=parseFloat(s); return isNaN(n)?0:n; });
    // remove a última coluna se for a "Variação" (geralmente -100, 0, etc — não é mês)
    if (mesesNomes.length && valores.length > mesesNomes.length) valores = valores.slice(0, mesesNomes.length);
    return { cliente, valores };
  }).filter(r => r.cliente && r.cliente.length>2 && !/^\d+$/.test(r.cliente));
  if (!registros.length) { msg.innerHTML='<div class="sem-acesso" style="margin-top:10px;">Não consegui ler nenhuma linha. Verifique o formato.</div>'; return; }
  if (!mesesNomes.length) { msg.innerHTML='<div class="sem-acesso" style="margin-top:10px;">Não achei os nomes dos meses. <b>Cole junto a linha de cabeçalho</b> (a que tem Cliente, Abril, Maio, Junho...) pra eu saber quais meses são.</div>'; return; }
  msg.innerHTML = '<div style="text-align:center;padding:10px;color:var(--cinza-500);">Processando merge...</div>';
  try {
    const resp = await fetch(API_URL, { method:'POST', body: JSON.stringify({
      acao:'importarVariacao', token: sessaoToken, dados:{ registros, meses: mesesNomes }
    })});
    const r = await resp.json();
    if (!r.ok) { msg.innerHTML=`<div class="sem-acesso">${r.erro||'verifique se o Apps Script foi republicado.'}</div>`; return; }
    cacheFat = null;
    let aviso = '';
    if (r.naoCasados && r.naoCasados.length) {
      aviso = `<div style="background:var(--amarelo-bg);border-radius:8px;padding:10px;margin-top:10px;font-size:12.5px;color:#8a6d00;"><b>${r.naoCasados.length} clientes não casaram por nome</b> (ficaram salvos sem CNPJ). Me mande os CNPJs deles que eu ensino o sistema:<br>${r.naoCasados.map(n=>'• '+n).join('<br>')}</div>`;
    }
    msg.innerHTML = `<div style="background:var(--verde-ok-bg);border-radius:8px;padding:10px;margin-top:10px;color:var(--verde-ok);font-size:13px;"><i class="ti ti-circle-check"></i> Merge feito! ${r.atualizados||0} atualizados, ${r.novos||0} novos.</div>${aviso}`;
    if (!r.naoCasados || !r.naoCasados.length) setTimeout(()=>{ fecharFicha(); renderFaturamento(document.getElementById('area-conteudo')); }, 2500);
  } catch(e) { msg.innerHTML='<div class="sem-acesso">Erro de conexão.</div>'; }
}

function moedaCSV(s) {
  s = String(s).replace(/[^\d,.-]/g,'').replace(/\./g,'').replace(',','.');
  const n = parseFloat(s); return isNaN(n)?0:n;
}

async function processarCSVRelatorio() {
  const arq = document.getElementById('imp-arquivo').files[0];
  const prev = document.getElementById('imp-preview');
  if (!arq) { prev.innerHTML = '<div class="sem-acesso">Selecione o arquivo CSV.</div>'; return; }
  prev.innerHTML = '<div style="text-align:center;color:var(--cinza-500);padding:12px;">Lendo arquivo...</div>';
  const texto = await arq.text();
  const linhas = texto.split('\n').map(l => l.split(';'));
  // cabeçalho: achar índices
  const cab = linhas[0].map(c=>String(c).replace(/^\ufeff/,'').replace(/"/g,'').trim().toUpperCase());
  const iCnpj = cab.findIndex(c=>c.includes('CNPJ'));
  const iCli = cab.findIndex(c=>c.includes('CLIENTE'));
  const iTe = cab.findIndex(c=>c.includes('TIPO DE EQUIP'));
  const iEnd = cab.findIndex(c=>c.includes('END') && c.includes('COLETA'));
  const iFreq = cab.findIndex(c=>c.includes('FREQU'));
  function fmtFreq(f){ const dias=(String(f).toUpperCase().match(/\[([A-ZÇÁ]+)\]/g)||[]).map(x=>x.replace(/[\[\]]/g,'')); const mapa={'SEG':'Seg','TER':'Ter','QUA':'Qua','QUI':'Qui','SEX':'Sex','SAB':'Sáb','SÁB':'Sáb','DOM':'Dom'}; const ns=dias.map(d=>mapa[d]||d); if(!ns.length)return String(f||'').trim(); if(ns.length>=6)return 'Diária ('+ns.length+'x/sem)'; return ns.join(', ')+' ('+ns.length+'x/sem)'; }
  function categoria(te){ const t=String(te).toUpperCase(); if(t.includes('SACO'))return 'SACO'; if(t.includes('CONT'))return 'CONTEINER'; if(t.includes('CAIXA')||t.includes('ROLL ON')||t.includes('BROOKS')||t.includes('COMPACTADORA'))return 'CACAMBA'; if(t.includes('BIG BAG'))return 'BIGBAG'; return 'OUTRO'; }
  function ehEquip(te){ const t=String(te).toUpperCase().trim(); if(!t)return false; if(t.startsWith('R$')||t.startsWith('-R$'))return false; if(['PARCELAS','TOTAL TAXA','QTDE. DE EQUIP.','TOTAL QTDE SERVIÇO','À GRANEL'].includes(t))return false; return true; }
  const porCnpj = {};
  for (let i=1;i<linhas.length;i++) {
    const r = linhas[i]; if (r.length<=iTe) continue;
    const te = (r[iTe]||'').replace(/"/g,'').trim();
    if (!ehEquip(te)) continue;
    const cnpj = (r[iCnpj]||'').replace(/\D/g,'');
    if (cnpj.length!==14) continue;
    if (!porCnpj[cnpj]) porCnpj[cnpj] = { cnpj, nome:(r[iCli]||'').replace(/"/g,'').trim(), endereco:(iEnd>=0?(r[iEnd]||'').replace(/"/g,'').trim():''), frequencia:(iFreq>=0?fmtFreq(r[iFreq]):''), total:0, SACO:0, CONTEINER:0, CACAMBA:0, BIGBAG:0, OUTRO:0 };
    if (iEnd>=0 && !porCnpj[cnpj].endereco) porCnpj[cnpj].endereco = (r[iEnd]||'').replace(/"/g,'').trim();
    if (iFreq>=0 && !porCnpj[cnpj].frequencia) porCnpj[cnpj].frequencia = fmtFreq(r[iFreq]);
    porCnpj[cnpj].total++; porCnpj[cnpj][categoria(te)]++;
  }
  const arr = Object.values(porCnpj);
  if (!arr.length) { prev.innerHTML = '<div class="sem-acesso">Não encontrei coletas válidas no arquivo.</div>'; return; }
  window._coletasImport = arr;
  prev.innerHTML = `
    <div style="background:var(--verde-claro-bg);border-radius:8px;padding:14px;">
      <div style="font-size:14px;color:var(--verde-escuro);font-weight:600;margin-bottom:6px;"><i class="ti ti-circle-check"></i> Processado!</div>
      <div style="font-size:13px;color:var(--cinza-700);">${arr.length} clientes com coletas.</div>
      <button class="ficha-btn-primario" style="width:100%;margin-top:12px;padding:10px;border:none;border-radius:8px;cursor:pointer;" onclick="gravarColetas()"><i class="ti ti-device-floppy"></i> Gravar coletas</button>
      <div id="grava-msg" style="margin-top:8px;"></div>
    </div>`;
}
async function gravarColetas() {
  const arr = window._coletasImport;
  if (!arr || !arr.length) return;
  const mesRef = (document.getElementById('imp-mes')||{}).value || '';
  if (!mesRef) { document.getElementById('imp-preview').insertAdjacentHTML('beforeend','<div class="sem-acesso" style="margin-top:8px;">Escolha o mês de referência das coletas.</div>'); return; }
  const msg = document.getElementById('grava-msg');
  msg.innerHTML = '<div style="text-align:center;color:var(--cinza-500);font-size:13px;">Gravando...</div>';
  try {
    const resp = await fetch(API_URL, { method:'POST', body: JSON.stringify({
      acao:'importarColetas', token: sessaoToken, dados:{ coletas: arr, mesRef }
    })});
    const r = await resp.json();
    if (!r.ok) { msg.innerHTML = `<div class="sem-acesso">${r.erro}</div>`; return; }
    msg.innerHTML = `<div style="background:white;border:1px solid var(--verde-ok-borda);border-radius:8px;padding:10px;font-size:13px;color:var(--verde-ok);"><i class="ti ti-circle-check"></i> Gravado! ${r.atualizados||0} atualizados, ${r.novos||0} novos.${r.clientesNovos?' '+r.clientesNovos+' clientes novos criados como Eventual.':''}</div>`;
    setTimeout(()=>{ fecharFicha(); }, 2000);
  } catch(e) { msg.innerHTML = '<div class="sem-acesso">Erro de conexão.</div>'; }
}

function valorPerdidoCanc(c) {
  // valor pago (média últimos 3 meses) é o melhor proxy de receita perdida; senão valor contrato
  let v = parseFloat(String(c['VALOR PAGO (média últimos 3 meses)']||'').replace(/[^\d,.-]/g,'').replace(/\./g,'').replace(',','.'));
  if (isNaN(v) || v===0) v = parseFloat(String(c['VALOR CONTRATO']||'').replace(/[^\d,.-]/g,'').replace(/\./g,'').replace(',','.'));
  return isNaN(v) ? 0 : v;
}

function filtraCanc() {
  const termo = ((document.getElementById('canc-busca')||{}).value||'').toLowerCase();
  const motivo = (document.getElementById('canc-motivo')||{}).value||'';
  const dIni = (document.getElementById('canc-ini')||{}).value||'';
  const dFim = (document.getElementById('canc-fim')||{}).value||'';
  let lista = cacheCanc.filter(c => {
    if (termo && !String(c['CLIENTE']||'').toLowerCase().includes(termo)) return false;
    if (motivo && c['MOTIVO']!==motivo) return false;
    if (dIni || dFim) {
      const d = parseDataReaj(c['DATA DE CANCELAMENTO']);
      if (!d) return false;
      if (dIni && d < new Date(dIni+'T00:00:00')) return false;
      if (dFim && d > new Date(dFim+'T23:59:59')) return false;
    }
    return true;
  });

  // card de R$ perdidos
  const totalPerdido = lista.reduce((s,c)=>s+valorPerdidoCanc(c),0);
  const kpiArea = document.getElementById('canc-kpis');
  if (kpiArea) {
    const periodo = (dIni||dFim) ? `${dIni?fmtDataBR(dIni):'...'} a ${dFim?fmtDataBR(dFim):'...'}` : 'todo o período';
    kpiArea.innerHTML = `<div class="kpi-funil" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));">
      <div class="kpi-card" style="border-top:3px solid var(--vermelho);"><div class="kpi-num" style="color:var(--vermelho);">${lista.length}</div><div class="kpi-lbl">Cancelamentos</div></div>
      <div class="kpi-card" style="border-top:3px solid var(--vermelho);"><div class="kpi-num" style="color:var(--vermelho);font-size:22px;">${fmtMoeda(totalPerdido)}</div><div class="kpi-lbl">R$ perdidos · ${periodo}</div></div>
    </div>`;
  }

  const res = document.getElementById('canc-resultado');
  if (window._modoCanc === 'lista') {
    let html = '<div class="lista-cli">';
    lista.slice(0,300).forEach(c => {
      const cnpjC = String(c['CNPJ']||'').replace(/'/g,'');
      const nomeC = String(c['CLIENTE']||'').replace(/'/g,"\\'");
      html += `<div class="lista-cli-item" style="grid-template-columns:1fr auto auto;cursor:pointer;" onclick="abrirFicha('${cnpjC}','${nomeC}')">
        <div><b style="color:var(--cinza-900);">${c['CLIENTE']||'—'}</b><br><span style="color:var(--cinza-500);font-size:12px;">${c['MOTIVO']||'Motivo não informado'}</span></div>
        <span style="color:var(--cinza-600);">${fmtDataBR(c['DATA DE CANCELAMENTO'])}</span>
        <span style="color:var(--vermelho);font-weight:600;">${c['CONSULTOR']||''}</span>
      </div>`;
    });
    res.innerHTML = html + '</div>';
    return;
  }
  if (!lista.length) { res.innerHTML = '<div class="sem-acesso">Nenhum cancelamento com esses filtros.</div>'; return; }
  let html = '<div class="grid-cards">';
  lista.slice(0,150).forEach(c => {
    const cnpjC = String(c['CNPJ']||'').replace(/'/g,'');
    const nomeC = String(c['CLIENTE']||'').replace(/'/g,"\\'");
    html += `<div class="card-cli cancelado" style="cursor:pointer;" onclick="abrirFicha('${cnpjC}','${nomeC}')">
      <div class="card-cli-topo">
        <div class="card-cli-avatar" style="background:var(--vermelho-bg);color:var(--vermelho);">${iniciais(c['CLIENTE'])}</div>
        <div style="min-width:0;">
          <div class="card-cli-nome">${c['CLIENTE']||'—'}</div>
          <div class="card-cli-cnpj">${c['CNPJ']||'—'}</div>
        </div>
      </div>
      <div class="card-cli-tags">
        <span class="tag" style="background:var(--vermelho-bg);color:var(--vermelho);">${c['MOTIVO']||'Motivo n/d'}</span>
      </div>
      <div class="card-cli-linha borda"><span>Data cancelamento</span><b>${fmtDataBR(c['DATA DE CANCELAMENTO'])}</b></div>
      <div class="card-cli-linha"><span>Consultor</span><span>${c['CONSULTOR']||'—'}</span></div>
      ${c['MULTA']?`<div class="card-cli-linha"><span>Multa</span><span>${c['MULTA']}</span></div>`:''}
    </div>`;
  });
  res.innerHTML = html + '</div>';
}

// ---- Helpers de vencimento ----
function diasAteVencer(dataStr) {
  const d = parseDataReaj(dataStr);
  if (!d) return null;
  return Math.round((d - Date.now())/(1000*60*60*24));
}
function classifVenc(dias) {
  if (dias == null) return { cls:'ok', pill:'pill-ok', txt:'sem data', faixa:'sem' };
  if (dias < 0) return { cls:'venc', pill:'pill-venc', txt:'Vencido', faixa:'vencido' };
  if (dias <= 30) return { cls:'r30', pill:'pill-r30', txt:`vence em ${dias}d`, faixa:'30' };
  if (dias <= 60) return { cls:'r60', pill:'pill-r60', txt:`vence em ${dias}d`, faixa:'60' };
  return { cls:'ok', pill:'pill-ok', txt:`vence em ${dias}d`, faixa:'vigente' };
}

function rggPrecisaAcao(d) {
  const st = String(d['STATUS']||'').toLowerCase();
  if (st.includes('renova')) return false; // Em renovação não recebe
  return true;
}
function rggStatusEfetivo(d) {
  const st = String(d['STATUS']||'').toLowerCase();
  if (st.includes('pendente')) return 'pendente';
  if (st.includes('renova')) return 'em_renovacao';
  const dias = diasAteVencer(d['DATA_VALIDADE']);
  if (dias != null && dias < 0) return 'vencido';
  return 'vigente';
}

function setFiltroReg(tipo, f, el) { window._regFiltro=f; document.querySelectorAll('[id^="rgf-"]').forEach(c=>c.classList.remove('ativo')); if(el)el.classList.add('ativo'); filtraRegula(tipo); }

function filtraRegula(tipo) {
  const dados = tipo==='rgg' ? cacheRGG : cacheSIGOR;
  const termo = ((document.getElementById('reg-busca')||{}).value||'').toLowerCase();
  const f = window._regFiltro||'todos';

  let lista = dados.map(d => {
    const dias = tipo==='rgg' ? diasAteVencer(d['DATA_VALIDADE']) : null;
    return { ...d, _dias: dias, _c: classifVenc(dias), _ef: tipo==='rgg'?rggStatusEfetivo(d):null };
  });
  if (termo) lista = lista.filter(d => `${d['CLIENTE']||''} ${d['CONSULTOR']||''} ${d['RESPONSAVEL_CLIENTE']||''}`.toLowerCase().includes(termo));

  if (tipo==='rgg') {
    if (f==='venc') lista = lista.filter(d=>d._ef==='vencido');
    else if (f==='30') lista = lista.filter(d=>d._dias!=null && d._dias>=0 && d._dias<=30);
    else if (f==='60') lista = lista.filter(d=>d._dias!=null && d._dias>30 && d._dias<=60);
    else if (f==='vigente') lista = lista.filter(d=>d._ef==='vigente' && (d._dias==null||d._dias>60));
    else if (f==='pendente') lista = lista.filter(d=>d._ef==='pendente');
    else if (f==='renov') lista = lista.filter(d=>d._ef==='em_renovacao');
    lista.sort((a,b)=>(a._dias==null?99999:a._dias)-(b._dias==null?99999:b._dias));
  } else {
    const st = x => String(x['STATUS']||'').toLowerCase();
    if (f==='irregular') lista = lista.filter(d=>st(d).includes('irregular'));
    else if (f==='regular') lista = lista.filter(d=>st(d).includes('regular') && !st(d).includes('eventual'));
    else if (f==='eventual') lista = lista.filter(d=>st(d).includes('eventual'));
    else if (f==='analise') lista = lista.filter(d=>st(d).includes('análise')||st(d).includes('analise'));
  }

  const res = document.getElementById('reg-resultado');
  if (!lista.length) { res.innerHTML = '<div class="sem-acesso">Nenhum cadastro encontrado.</div>'; return; }
  let html = '<div class="grid-cards">';
  lista.slice(0,200).forEach(d => {
    if (tipo==='rgg') {
      const ef = d._ef;
      const podeEmail = ef==='vencido'||ef==='pendente'|| (d._dias!=null && d._dias>=0 && d._dias<=60);
      const podeRenovar = ef==='vencido'||ef==='pendente'|| (d._dias!=null && d._dias>=0 && d._dias<=60);
      const pillTxt = ef==='pendente'?'Sem cadastro':ef==='em_renovacao'?'Em renovação':ef==='vencido'?'Vencido':d._c.txt;
      const pillCls = ef==='pendente'?'pill-ok':ef==='em_renovacao'?'pill-r60':d._c.pill;
      const cardCls = ef==='em_renovacao'?'ok':ef==='pendente'?'ok':d._c.cls;
      const jaEnviado = d['ALERTA_ENVIADO_EM'] ? fmtDataBR(d['ALERTA_ENVIADO_EM']) : null;
      html += `<div class="reaj-card ${cardCls}" style="cursor:default;">
        <div class="reaj-topo"><div style="min-width:0;"><div class="reaj-nome">${d['CLIENTE']||'—'}</div><div class="reaj-cnpj">${d['RESPONSAVEL_CLIENTE']||''}${d['CONSULTOR']?' · '+d['CONSULTOR']:''}</div></div>
        <span class="reaj-pill ${pillCls}">${pillTxt}</span></div>
        <div class="reaj-linhas"><div><span>Validade</span><b>${fmtDataBR(d['DATA_VALIDADE'])}</b></div><div><span>Consultor</span><b style="font-size:12px;">${d['CONSULTOR']||'—'}</b></div></div>
        ${jaEnviado?`<div style="font-size:11px;color:var(--verde-ok);margin-top:8px;"><i class="ti ti-mail-check"></i> Alerta enviado em ${jaEnviado}</div>`:''}
        <div style="display:flex;gap:6px;margin-top:10px;">
          ${podeEmail?`<button class="ficha-btn-secundario" style="flex:1;padding:7px;border-radius:7px;cursor:pointer;font-size:12px;" onclick="abrirEmailAlerta('rgg','${String(d['ID']||'').replace(/'/g,'')}')"><i class="ti ti-mail"></i> Alerta</button>`:''}
          ${podeRenovar?`<button class="ficha-btn-primario" style="flex:1;padding:7px;border:none;border-radius:7px;cursor:pointer;font-size:12px;" onclick="abrirModalRenovar('${String(d['ID']||'').replace(/'/g,'')}')"><i class="ti ti-refresh"></i> Renovar</button>`:''}
        </div>
      </div>`;
    } else {
      const irreg = String(d['STATUS']||'').toLowerCase().includes('irregular');
      const jaEnviado = d['ALERTA_ENVIADO_EM'] ? fmtDataBR(d['ALERTA_ENVIADO_EM']) : null;
      const stAtual = String(d['STATUS']||'').trim();
      const OPCOES_SIT = ['Regular','Regular - Eventual','Irregular','Em análise'];
      html += `<div class="reaj-card ${irreg?'venc':'ok'}" style="cursor:default;">
        <div class="reaj-topo"><div style="min-width:0;"><div class="reaj-nome">${d['CLIENTE']||'—'}</div><div class="reaj-cnpj">${d['RESPONSAVEL_CLIENTE']||''}${d['CONSULTOR']?' · '+d['CONSULTOR']:''}</div></div>
        <span class="reaj-pill ${irreg?'pill-venc':'pill-ok'}">${d['STATUS']||'—'}</span></div>
        <div class="reaj-linhas"><div><span>Plataforma</span><b style="font-size:13px;">${d['PLATAFORMA']||'Sigor'}</b></div><div><span>Consultor</span><b style="font-size:12px;">${d['CONSULTOR']||'—'}</b></div></div>
        ${jaEnviado?`<div style="font-size:11px;color:var(--verde-ok);margin-top:8px;"><i class="ti ti-mail-check"></i> Alerta enviado em ${jaEnviado}</div>`:''}
        <div style="display:flex;gap:6px;align-items:center;margin-top:10px;">
          <select id="sit-sigor-${d['ID']}" style="flex:1;padding:6px;border:1.5px solid var(--cinza-300);border-radius:7px;font-size:12px;">
            ${OPCOES_SIT.map(o=>`<option value="${o}" ${stAtual===o?'selected':''}>${o}</option>`).join('')}
          </select>
          <button class="ficha-btn-primario" style="padding:6px 10px;border:none;border-radius:7px;cursor:pointer;font-size:12px;" onclick="salvarSituacaoSigor('${String(d['ID']||'').replace(/'/g,'')}')"><i class="ti ti-check"></i></button>
        </div>
        ${irreg?`<button class="ficha-btn-secundario" style="width:100%;margin-top:6px;padding:7px;border-radius:7px;cursor:pointer;font-size:12px;" onclick="abrirEmailAlerta('sigor','${String(d['ID']||'').replace(/'/g,'')}')"><i class="ti ti-mail"></i> Enviar alerta</button>`:''}
      </div>`;
    }
  });
  res.innerHTML = html + '</div>';
}

// normaliza uma lista de e-mails: troca / , espaço por ";" e remove duplicados/vazios
function normalizarEmails(txt) {
  if (!txt) return '';
  return [...new Set(
    String(txt).split(/[\/,;\s]+/).map(e=>e.trim()).filter(e=>e.includes('@'))
  )].join(';');
}

// salva a situação (Regular/Eventual/Irregular/Análise) de um cadastro SIGOR/MTR
async function salvarSituacaoSigor(id) {
  const sel = document.getElementById('sit-sigor-'+id);
  if (!sel) return;
  const novaSit = sel.value;
  const d = (cacheSIGOR||[]).find(x=>String(x['ID'])===String(id));
  if (!d) return;
  try {
    const resp = await fetch(API_URL, { method:'POST', body: JSON.stringify({
      acao:'salvar', aba:'SIGOR', token: sessaoToken, dados: Object.assign({}, d, { STATUS: novaSit })
    })});
    const r = await resp.json();
    if (!r.ok) { alert('Erro: '+(r.erro||'verifique se o Apps Script foi republicado.')); return; }
    d['STATUS'] = novaSit; // atualiza local
    renderRegula(document.getElementById('area-conteudo'), 'sigor');
    const av = document.createElement('div');
    av.textContent = 'Situação atualizada para: '+novaSit;
    av.style.cssText = 'position:fixed;bottom:20px;right:20px;background:var(--verde-escuro);color:white;padding:10px 18px;border-radius:8px;font-size:13px;z-index:9999;';
    document.body.appendChild(av); setTimeout(()=>av.remove(), 2200);
  } catch(e) { alert('Erro de conexão.'); }
}

function abrirEmailAlerta(tipo, id) {
  const dados = tipo==='rgg' ? cacheRGG : cacheSIGOR;
  const d = dados.find(x => String(x['ID'])===String(id));
  if (!d) { alert('Cadastro não encontrado.'); return; }

  let templateKey;
  if (tipo==='sigor') templateKey = 'sigor_irregular';
  else {
    const ef = rggStatusEfetivo(d);
    if (ef==='pendente') templateKey = 'rgg_pendente';
    else if (ef==='vencido') templateKey = 'rgg_vencido';
    else templateKey = 'rgg_a_vencer';
  }
  const tpl = TEMPLATES_EMAIL[templateKey];
  const dias = diasAteVencer(d['DATA_VALIDADE']);
  const assinatura = gerarAssinatura(d['CONSULTOR']);

  let assunto = tpl.assunto
    .replace(/{{cliente}}/g, d['CLIENTE']||'')
    .replace(/{{dias_vencer}}/g, dias!=null?Math.abs(dias):'');
  let corpo = tpl.corpo
    .replace(/{{cliente}}/g, d['CLIENTE']||'')
    .replace(/{{responsavel}}/g, d['RESPONSAVEL_CLIENTE']||'responsável')
    .replace(/{{data_vencimento}}/g, fmtDataBR(d['DATA_VALIDADE']))
    .replace(/{{dias_vencido}}/g, dias!=null?Math.abs(dias):'')
    .replace(/{{dias_vencer}}/g, dias!=null?Math.abs(dias):'')
    .replace(/{{assinatura}}/g, assinatura);

  // destinatários — normaliza qualquer separador (/ , espaço) para ";"
  const para = normalizarEmails(d['CONTATO_EMAIL'] || '');
  const consultorEmail = (DADOS_CONSULTORES[d['CONSULTOR']]||{}).email || '';
  const cc = normalizarEmails([consultorEmail, ...DIRETORES_CC].filter(Boolean).join(';'));

  // modal de pré-visualização + botão abrir e-mail
  const cont = document.getElementById('ficha-container');
  cont.innerHTML = `

          <button class="fechar" onclick="fecharFicha()"><i class="ti ti-x"></i></button>

        <div class="ficha-corpo">
          <div style="font-size:12px;color:var(--cinza-600);margin-bottom:4px;"><b>Para:</b> ${para||'(sem e-mail do responsável)'}</div>
          <div style="font-size:12px;color:var(--cinza-600);margin-bottom:4px;"><b>CC:</b> ${cc}</div>
          <div style="font-size:12px;color:var(--cinza-600);margin-bottom:10px;"><b>Assunto:</b> ${assunto}</div>
          <div style="background:var(--cinza-100);border-radius:8px;padding:14px;font-size:12.5px;white-space:pre-wrap;max-height:280px;overflow-y:auto;color:var(--cinza-800);">${corpo}</div>
          <div class="ficha-botoes">
            <button class="ficha-btn-primario" onclick="dispararMailto('${encodeURIComponent(para)}','${encodeURIComponent(cc)}','${encodeURIComponent(assunto)}', this)" data-corpo="${encodeURIComponent(corpo)}" data-tipo="${tipo}" data-id="${String(id).replace(/'/g,'')}"><i class="ti ti-external-link"></i> Abrir no meu e-mail</button>
            <button class="ficha-btn-secundario" onclick="fecharFicha()">Fechar</button>
          </div>
          <div style="font-size:11px;color:var(--cinza-500);margin-top:8px;">Abre seu programa de e-mail com tudo preenchido. Você revisa e clica enviar. Lembre de anexar a proposta se desejar.</div>
        </div>
      </div>
    </div>`;

function dispararMailto(para, cc, assunto, btn) {
  const corpo = btn.getAttribute('data-corpo');
  const tipo = btn.getAttribute('data-tipo');
  const id = btn.getAttribute('data-id');
  const link = `mailto:${decodeURIComponent(para)}?cc=${decodeURIComponent(cc)}&subject=${assunto}&body=${corpo}`;
  window.location.href = link;
  // marcar alerta enviado (visual; persistência exige ação no Apps Script - opcional)
  const dados = tipo==='rgg' ? cacheRGG : cacheSIGOR;
  const d = dados.find(x=>String(x['ID'])===String(id));
  if (d) d['ALERTA_ENVIADO_EM'] = new Date().toISOString();
  setTimeout(fecharFicha, 500);
}

async function salvarRenovacao(id) {
  const validade = document.getElementById('ren-validade').value;
  const assessoria = document.getElementById('ren-assessoria').value;
  const valor = document.getElementById('ren-valor') ? document.getElementById('ren-valor').value : '';
  if (!validade) { document.getElementById('ren-msg').innerHTML='<div class="sem-acesso" style="margin-top:10px;">Informe a nova validade.</div>'; return; }
  const d = cacheRGG.find(x=>String(x['ID'])===String(id));
  const msg = document.getElementById('ren-msg');
  msg.innerHTML = '<div style="font-size:13px;color:var(--cinza-500);margin-top:10px;"><i class="ti ti-loader"></i> Salvando no sistema...</div>';
  // converte data yyyy-mm-dd (input) para dd/mm/aaaa (padrão da planilha)
  const partes = String(validade).split('-');
  const validadeBR = partes.length===3 ? `${partes[2]}/${partes[1]}/${partes[0]}` : validade;

async function abrirEmailLoteReaj() {

  const mes = prompt('Digite o mês/ano para enviar os reajustes (ex: 06/2026):');
  if (!mes) return;
  const [mm, aaaa] = mes.split('/');
  const doMes = cacheReajustes.filter(r => {
    const d = proximoReajuste(r['DATA ÚLTIMO REAJUSTE '] || r['DATA ÚLTIMO REAJUSTE']);
    return d && (d.getMonth()+1)==parseInt(mm,10) && d.getFullYear()==parseInt(aaaa,10);
  });

    const base = parseMoedaReaj(r['VALOR REAJUSTADO'])||parseMoedaReaj(r['PREÇO ANTERIOR'])||0;
    const pct = parseFloat(r['ALIQUOTA'])*100||0;
    return { cliente:r['CLIENTE'], valorAtual:fmtMoeda(base), valorNovo:fmtMoeda(base*(1+pct/100)), percentual:pct.toFixed(1)+'%', indice:r['ÍNDICE']||'—' };

  // montar corpo do e-mail em texto (tabela alinhada) e abrir o Outlook via mailto

  ).join('\n\n');
  const para = normalizarEmails(DIRETORES_CC.join(';'));
  const assunto = encodeURIComponent(`Reajustes previstos para ${mes} — aprovação`);
  const corpo = encodeURIComponent(
`Prezados,

Seguem os ${listaEmail.length} reajustes previstos para ${mes}, para aprovação:

${linhas}

Aguardo a aprovação para aplicar os reajustes acima.

Atenciosamente,
${usuarioAtual.nome}
Ecotrans Ambiental`);
  window.location.href = `mailto:${para}?subject=${assunto}&body=${corpo}`;
}

// geocodifica um endereço -> {lat,lng} usando a Geocoding API
async function geocodificar(endereco) {
  const url = `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(endereco)}&region=br&key=${GOOGLE_MAPS_KEY}`;
  const resp = await fetch(url);
  const data = await resp.json();
  if (data.status === 'OK' && data.results[0]) {
    const loc = data.results[0].geometry.location;
    return { lat: loc.lat, lng: loc.lng };
  }
  return null;
}

// distância em linha reta (Haversine) em km — usada para achar os candidatos mais próximos
function distLinhaReta(lat1, lng1, lat2, lng2) {
  const R = 6371, rad = x => x*Math.PI/180;
  const dLat = rad(lat2-lat1), dLng = rad(lng2-lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(rad(lat1))*Math.cos(rad(lat2))*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

async function roteirizarLead(idLead) {
  const msg = document.getElementById('rot-msg-'+idLead);
  const setMsg = (t,cor) => { if(msg){ msg.textContent=t; msg.style.color=cor||'var(--cinza-500)'; } };
  const lead = (kanbanLeads||[]).find(l=>String(l['ID_LEAD'])===String(idLead));
  if (!lead) return;
  setMsg('Localizando o lead...', 'var(--cinza-500)');
  try {
    // 1) coordenada do lead (geocodifica se ainda não tem)
    let latL = parseFloat(lead['LAT']), lngL = parseFloat(lead['LNG']);
    if (isNaN(latL) || isNaN(lngL)) {
      const endLead = [lead['ENDERECO'], lead['CEP'], 'São Paulo, SP, Brasil'].filter(Boolean).join(', ');
      const geo = await geocodificar(endLead);
      if (!geo) { setMsg('Não consegui localizar o endereço do lead. Confira o endereço/CEP.', 'var(--vermelho)'); return; }
      latL = geo.lat; lngL = geo.lng;
      // salva a coordenada do lead pra não geocodificar de novo
      fetch(API_URL, { method:'POST', body: JSON.stringify({ acao:'atualizarLeadCampos', token: sessaoToken, dados:{ idLead:String(idLead), campos:{ LAT:latL, LNG:lngL } } })});
    }
    // 2) candidatos: clientes com coordenada já salva; senão geocodifica os que faltam (uma vez)
    setMsg('Comparando com os clientes...', 'var(--cinza-500)');
    const clientes = (cacheClientes||[]).filter(c => c['ENDERECO']);
    // calcula linha reta com quem já tem coordenada
    const comCoord = [];
    for (const c of clientes) {
      let la = parseFloat(c['LAT']), ln = parseFloat(c['LNG']);
      if (!isNaN(la) && !isNaN(ln)) comCoord.push({ c, lat:la, lng:ln });
    }
    // se quase ninguém tem coordenada, geocodifica os 30 mais provavelmente próximos? 
    // Estratégia: ordena por linha reta os que têm coord; pega os 10 mais perto p/ Routes API
    if (!comCoord.length) {
      setMsg('Os clientes ainda não têm coordenadas. Use o botão "Geocodificar clientes" (uma vez) no topo.', 'var(--vermelho)');
      mostrarBotaoGeocodificar();
      return;
    }
    comCoord.forEach(o => o.reta = distLinhaReta(latL, lngL, o.lat, o.lng));
    comCoord.sort((a,b)=>a.reta-b.reta);
    const top = comCoord.slice(0, 1); // o mais próximo em linha reta
    const maisProx = top[0];
    // 3) Routes API: km + tempo reais do lead até o cliente mais próximo
    setMsg('Calculando a rota real...', 'var(--cinza-500)');
    const rota = await calcularRota(latL, lngL, maisProx.lat, maisProx.lng);
    const distKm = rota ? rota.km : maisProx.reta.toFixed(1);
    const tempo = rota ? rota.tempo : '';
    // 4) salva no lead
    fetch(API_URL, { method:'POST', body: JSON.stringify({ acao:'atualizarLeadCampos', token: sessaoToken, dados:{ idLead:String(idLead), campos:{
      CLIENTE_PROX: maisProx.c['CLIENTE'], DIST_KM: distKm, TEMPO_ROTA: tempo, DATA_ROTEIRIZACAO: new Date().toISOString().slice(0,10)
    } } })});
    lead['CLIENTE_PROX']=maisProx.c['CLIENTE']; lead['DIST_KM']=distKm; lead['TEMPO_ROTA']=tempo;
    if (typeof limparCacheBusca==='function') limparCacheBusca();
    setMsg('', 'var(--cinza-500)');
    renderRoteirizacao(document.getElementById('area-conteudo'));
  } catch(e) { setMsg('Erro: '+(e.message||'verifique a chave do Google.'), 'var(--vermelho)'); }
}

// Routes API: distância e tempo de carro entre dois pontos
async function calcularRota(latO, lngO, latD, lngD) {
  try {
    const resp = await fetch('https://routes.googleapis.com/directions/v2:computeRoutes', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'X-Goog-Api-Key': GOOGLE_MAPS_KEY, 'X-Goog-FieldMask':'routes.distanceMeters,routes.duration' },
      body: JSON.stringify({
        origin:{ location:{ latLng:{ latitude:latO, longitude:lngO } } },
        destination:{ location:{ latLng:{ latitude:latD, longitude:lngD } } },
        travelMode:'DRIVE'
      })
    });
    const data = await resp.json();
    if (data.routes && data.routes[0]) {
      const m = data.routes[0].distanceMeters || 0;
      const segs = parseInt(String(data.routes[0].duration||'0').replace('s','')) || 0;
      return { km: (m/1000).toFixed(1), tempo: segs>=3600 ? Math.floor(segs/3600)+'h'+Math.round((segs%3600)/60)+'min' : Math.round(segs/60)+' min' };
    }
  } catch(e) {}
  return null;
}

async function geocodificarClientes() {
  const prog = document.getElementById('geo-prog');
  await carregarClientes();
  const semCoord = (cacheClientes||[]).filter(c => c['ENDERECO'] && (isNaN(parseFloat(c['LAT'])) || isNaN(parseFloat(c['LNG']))));
  if (!semCoord.length) { if(prog) prog.textContent = 'Todos os clientes já têm coordenadas!'; return; }
  let ok=0, falhou=0;
  for (let i=0;i<semCoord.length;i++) {
    const c = semCoord[i];
    if (prog) prog.textContent = `Geocodificando ${i+1} de ${semCoord.length}... (${c['CLIENTE']})`;
    const end = [c['ENDERECO'], c['CEP'], 'São Paulo, SP, Brasil'].filter(Boolean).join(', ');
    const geo = await geocodificar(end);
    if (geo) {
      ok++;
      await fetch(API_URL, { method:'POST', body: JSON.stringify({ acao:'atualizarCoordCliente', token: sessaoToken, dados:{ cnpj: c['CNPJ'], lat: geo.lat, lng: geo.lng } })});
      c['LAT']=geo.lat; c['LNG']=geo.lng;
    } else falhou++;
    await new Promise(r=>setTimeout(r, 120)); // respira entre chamadas
  }
  if (prog) prog.textContent = `Pronto! ${ok} geocodificados${falhou?', '+falhou+' falharam (endereço incompleto)':''}.`;
  if (typeof limparCacheBusca==='function') limparCacheBusca();
}

async function enviarSolicitacaoPreco() {
  const cliente = document.getElementById('pr-cliente').value;
  const obs = (document.getElementById('pr-obs')||{}).value || '';
  // se a tela usa itens (nova), coleta os itens; senão usa os campos antigos
  const itens = (typeof coletarItensSolic === 'function' && document.getElementById('pr-itens-solic')) ? coletarItensSolic() : [];
  let descricao, residuo;
  if (itens.length) {
    // monta descrição legível a partir dos itens
    descricao = itens.map((it,i)=>`Item ${i+1}: ${[it.residuo,it.acond,it.freq,it.qtd?('qtd '+it.qtd):''].filter(Boolean).join(' / ')}`).join(' | ');
    residuo = itens.map(it=>it.residuo).filter(Boolean).join(', ');
  } else {
    descricao = (document.getElementById('pr-desc')||{}).value || '';
    residuo = (document.getElementById('pr-residuo')||{}).value || '';
  }
  if (!cliente || (!descricao && !itens.length)) { document.getElementById('pr-msg').innerHTML='<div class="sem-acesso" style="margin-top:10px;">Adicione ao menos um item.</div>'; return; }
  const leadExiste = (kanbanLeads||[]).some(l=>String(l['CLIENTE'])===cliente);
  if (!leadExiste) { document.getElementById('pr-msg').innerHTML='<div class="sem-acesso" style="margin-top:10px;">Escolha um lead da lista. Se não existir, crie no Funil primeiro.</div>'; return; }
  const leadObj = (kanbanLeads||[]).find(l=>String(l['CLIENTE'])===cliente);
  const cnpj = leadObj && leadObj['CNPJ'] ? leadObj['CNPJ'] : '';
  document.getElementById('pr-msg').innerHTML = '<div style="text-align:center;padding:10px;color:var(--cinza-500);">Enviando...</div>';
  try {
    const resp = await fetch(API_URL, { method:'POST', body: JSON.stringify({
      acao:'solicitarPreco', token: sessaoToken, dados:{ cliente, cnpj, descricao, residuo, obs, itens: JSON.stringify(itens) }
    })});
    const r = await resp.json();
    if (!r.ok) { document.getElementById('pr-msg').innerHTML=`<div class="sem-acesso">${r.erro}</div>`; return; }
    if (typeof limparCacheBusca==='function') limparCacheBusca();
    document.getElementById('pr-msg').innerHTML = '<div style="background:var(--verde-ok-bg);border-radius:8px;padding:10px;margin-top:10px;color:var(--verde-ok);font-size:13px;"><i class="ti ti-circle-check"></i> Enviado! O Roberto verá na aba Precificação.</div>';
    setTimeout(()=>{ fecharFicha(); renderPrecificacao(document.getElementById('area-conteudo')); }, 1800);
  } catch(e) { document.getElementById('pr-msg').innerHTML='<div class="sem-acesso">Erro de conexão.</div>'; }
